<html lang="fr" style="color-scheme:dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>Islam +</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#060a0f;color:#e2e8f0;font-family:"Outfit",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
input,button,select,textarea{font-family:"Outfit",sans-serif;-webkit-appearance:none;color-scheme:dark;color:#e2e8f0}
::-webkit-scrollbar{display:none}
#app{min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:70px}
.screen.active{display:flex}
.topbar{height:56px;background:#060a0fee;border-bottom:1px solid #1e293b;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:60;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0}
.botbar{height:70px;background:#060a0fee;border-top:1px solid #1e293b;display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:#475569;font-size:.5rem;font-family:"Outfit",sans-serif;padding:6px 0;letter-spacing:.06em;text-transform:uppercase;position:relative}
.tab.on{color:#22c55e}
.tab.on::after{content:"";position:absolute;bottom:0;width:20px;height:2px;background:#22c55e;border-radius:2px 2px 0 0}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{background:#0d1420;border:1px solid #1e293b;border-radius:16px;padding:16px}
.btn{width:100%;background:#15803d;color:#fff;border:none;padding:14px;border-radius:14px;font-weight:600;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn:active{opacity:.85}
.btn.ghost{background:transparent;border:1px solid #1e293b;color:#64748b}
.inp{width:100%;background:#0d1420;border:1.5px solid #1e293b;border-radius:10px;padding:12px 14px;font-size:.88rem;outline:none;color:#e2e8f0;display:block}
.inp:focus{border-color:#22c55e}
.hr{height:1px;background:#1e293b}
.spin{width:22px;height:22px;border:2px solid #1e293b;border-top:2px solid #22c55e;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:inline-block}
.back{background:none;border:none;color:#64748b;cursor:pointer;padding:4px 8px 4px 0;display:flex;align-items:center;flex-shrink:0}
.lbl{font-size:.56rem;color:#475569;letter-spacing:.1em;display:block;margin-bottom:6px;text-transform:uppercase}
.err-box{background:#ef444415;border:1px solid #ef444430;border-radius:10px;padding:12px 14px;font-size:.78rem;color:#f87171;line-height:1.6}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 10px;font-size:.56rem;letter-spacing:.07em;font-weight:600;text-transform:uppercase}
.pill-green{background:#15803d20;border:1px solid #15803d40;color:#22c55e}
.pill-gold{background:#92400e20;border:1px solid #d9770640;color:#fbbf24}
/* Prayer screen */
.prayer-hero{background:linear-gradient(180deg,#0d1a14 0%,#060a0f 100%);padding:24px 16px 20px;position:relative;overflow:hidden;text-align:center}
.prayer-hero::before{content:"";position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:260px;height:260px;background:radial-gradient(circle,#15803d1a,transparent 70%);pointer-events:none}
.prayer-ring{width:160px;height:160px;border-radius:50%;border:2px solid #15803d30;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:16px auto;position:relative;background:radial-gradient(circle at center,#0d1a1480,#060a0f)}
.prayer-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #1e293b08;cursor:default}
.prayer-row.active{background:linear-gradient(90deg,#15803d14,transparent);border-left:3px solid #22c55e;padding-left:13px}
.prayer-row.passed{opacity:.38}
/* Quran */
.surah-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #1e293b08;cursor:pointer;transition:background .15s}
.surah-item:active{background:#0d1420}
.surah-num-box{width:40px;height:40px;border-radius:10px;background:#0d1420;border:1px solid #1e293b;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:#64748b;flex-shrink:0;font-variant-numeric:tabular-nums}
.ayah-wrap{padding:16px;border-bottom:1px solid #1e293b0a}
.ayah-ar{font-family:"Amiri",serif;font-size:1.45rem;line-height:2;color:#f1f5f9;text-align:right;direction:rtl;margin-bottom:10px}
.ayah-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#15803d18;border:1px solid #15803d30;font-size:.58rem;color:#22c55e;margin-left:6px;font-variant-numeric:tabular-nums;flex-shrink:0}
.ayah-fr{font-size:.82rem;color:#94a3b8;line-height:1.75}
.bismillah{font-family:"Amiri",serif;font-size:1.3rem;text-align:center;color:#fbbf24;direction:rtl;padding:20px 16px 8px;border-bottom:1px solid #1e293b0a}
/* Wisdom */
.wcat-btn{padding:7px 14px;border-radius:20px;border:1px solid #1e293b;background:transparent;font-size:.7rem;color:#64748b;cursor:pointer;white-space:nowrap;transition:all .15s}
.wcat-btn.on{background:#15803d20;border-color:#15803d50;color:#22c55e}
.wisdom-card{padding:20px 16px;margin:0 12px 12px;background:#0d1420;border-radius:16px;border:1px solid #1e293b}
.wisdom-ar{font-family:"Amiri",serif;font-size:1.15rem;line-height:1.85;color:#fbbf24;text-align:center;direction:rtl;margin-bottom:14px}
.wisdom-fr{font-size:.85rem;line-height:1.75;color:#e2e8f0;margin-bottom:10px;font-style:italic}
.wisdom-src{font-size:.58rem;color:#475569;letter-spacing:.08em;text-transform:uppercase}
/* Dhikr */
.dhikr-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px}
.dhikr-card{background:#0d1420;border:1px solid #1e293b;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 12px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s,border-color .2s;-webkit-tap-highlight-color:transparent;user-select:none}
.dhikr-card:active{transform:scale(.95)}
.dhikr-card.done{border-color:#22c55e40;background:#15803d10}
.dhikr-card svg.ring{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.dhikr-arabic{font-family:"Amiri",serif;font-size:1.1rem;color:#fbbf24;direction:rtl;text-align:center;margin-bottom:4px;line-height:1.4}
.dhikr-fr{font-size:.65rem;color:#64748b;text-align:center;margin-bottom:10px}
.dhikr-count{font-size:2rem;font-weight:700;color:#22c55e;font-variant-numeric:tabular-nums;line-height:1}
.dhikr-target{font-size:.6rem;color:#475569;margin-top:3px}
/* Qibla */
.compass-wrap{position:relative;width:240px;height:240px;margin:0 auto}
.compass-outer{width:100%;height:100%;border-radius:50%;border:2px solid #1e293b;background:radial-gradient(circle at center,#0d1a14,#060a0f);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.compass-marks{position:absolute;width:100%;height:100%;border-radius:50%}
.compass-needle-wrap{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.compass-needle{width:4px;height:96px;background:linear-gradient(to top,#ef4444,#ef4444 50%,#22c55e 50%);border-radius:2px}
.compass-center{position:absolute;width:14px;height:14px;border-radius:50%;background:#1e293b;border:2px solid #22c55e;z-index:2}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 #22c55e30}50%{box-shadow:0 0 0 10px #22c55e00}}
.fu{animation:fu .3s ease both}
</style>
</head>

function mk(tag,props,kids){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="cls")e.className=props[k];
    else if(k==="html")e.innerHTML=props[k];
    else if(k==="style"&&typeof props[k]==="object")Object.assign(e.style,props[k]);
    else if(k.slice(0,2)==="on")e.addEventListener(k.slice(2).toLowerCase(),props[k]);
    else e.setAttribute(k,props[k]);
  });
  if(kids)(Array.isArray(kids)?kids:[kids]).forEach(function(c){
    if(c==null||c===false)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return e;
}
function tx(s){return document.createTextNode(String(s||""));}
function hr(){return mk("div",{cls:"hr"});}
function sp(){var d=mk("div",{style:{display:"flex",justifyContent:"center",padding:"40px"}});d.appendChild(mk("div",{cls:"spin"}));return d;}

    d.appendChild(b);
  }
  var info=mk("div",{style:{flex:1,minWidth:0}});
  info.appendChild(mk("div",{style:{fontWeight:700,fontSize:"0.95rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},title));
  if(sub)info.appendChild(mk("div",{style:{fontSize:"0.57rem",color:"#475569",letterSpacing:"0.05em",marginTop:"2px"}},sub));
  d.appendChild(info);
  if(right)d.appendChild(right);
  return d;
}

function switchTab(id){
  if(S.tab===id)return;
  S.tab=id;
  document.querySelectorAll(".tab").forEach(function(b){b.className="tab"+(b.id==="tb-"+id?" on":"");});
  document.querySelectorAll(".screen").forEach(function(s){s.classList.toggle("active",s.id==="sc-"+id);});
  if(id==="prayers")renderPrayers();
  if(id==="quran"&&S.qView==="list")renderQuranList();
  if(id==="wisdom")renderWisdom();
  if(id==="dhikr")renderDhikr();
  if(id==="qibla")renderQibla();
}

/* ── PRAYERS ─────────────────────────────────────────── */
function loadPrayersByCoords(lat,lon){
  S.prayersLoad=true;S.prayersErr=null;
  var ts=Math.floor(Date.now()/1000);
  fetch("https://api.aladhan.com/v1/timings/"+ts+"?latitude="+lat+"&longitude="+lon+"&method=3")
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.code===200){
        S.prayers=d.data.timings;
        S.hijri=d.data.date.hijri;
        S.prayersLoad=false;
        startPrayerTicker();
        renderPrayers();
      } else {
        S.prayersErr="Erreur de l'API de prières.";
        S.prayersLoad=false;
        renderPrayers();
      }
    })
    .catch(function(){S.prayersErr="Impossible de charger les horaires.";S.prayersLoad=false;renderPrayers();});
}

function loadPrayersByCity(city,country){
  S.prayersLoad=true;S.prayersErr=null;
  fetch("https://api.aladhan.com/v1/timingsByCity?city="+encodeURIComponent(city)+"&country="+encodeURIComponent(country)+"&method=3")
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.code===200){
        S.prayers=d.data.timings;
        S.hijri=d.data.date.hijri;
        S.prayersLoad=false;
        startPrayerTicker();
        renderPrayers();
      } else {
        S.prayersErr="Ville introuvable. Vérifiez l'orthographe.";
        S.prayersLoad=false;
        renderPrayers();
      }
    })
    .catch(function(){S.prayersErr="Impossible de charger les horaires.";S.prayersLoad=false;renderPrayers();});
}

function startPrayerTicker(){
  if(S.ticker)clearInterval(S.ticker);
  tickPrayer();
  S.ticker=setInterval(tickPrayer,1000);
}

function tickPrayer(){
  if(!S.prayers)return;
  var now=new Date();
  var keys=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
  var next=null;
  var minDiff=Infinity;
  keys.forEach(function(k){
    var parts=S.prayers[k].split(":");
    var t=new Date(now);
    t.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
    var diff=t-now;
    if(diff>0&&diff<minDiff){minDiff=diff;next=k;}
  });
  if(!next){
    var parts=S.prayers["Fajr"].split(":");
    var t=new Date(now);
    t.setDate(t.getDate()+1);
    t.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
    minDiff=t-now;next="Fajr";
  }
  S.nextPrayer=next;
  var h=Math.floor(minDiff/3600000);
  var m=Math.floor((minDiff%3600000)/60000);
  var s=Math.floor((minDiff%60000)/1000);
  S.countdown=(h>0?pad(h)+"h ":"")+pad(m)+"m "+pad(s)+"s";
  var cd=document.getElementById("countdown-val");
  var np=document.getElementById("next-prayer-name");
  if(cd)cd.textContent=S.countdown;
  if(np)np.textContent=(PRAYERS_NAMES[next]||next)+" — "+PRAYERS_FR[next];
  var keys2=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
  keys2.forEach(function(k){
    var row=document.getElementById("prow-"+k);
    if(!row)return;
    var parts=S.prayers[k].split(":");
    var t=new Date(now);
    t.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
    var isPassed=(t-now)<0;
    var isNext=k===next;
    row.className="prayer-row fu"+(isNext?" active":isPassed?" passed":"");
  });
}

function pad(n){return n<10?"0"+n:String(n);}

function getLocation(){
  if(!navigator.geolocation){loadPrayersByCity(S.cityInput,S.countryInput);return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      S.loc={lat:pos.coords.latitude,lon:pos.coords.longitude};
      loadPrayersByCoords(S.loc.lat,S.loc.lon);
      calcQibla(S.loc.lat,S.loc.lon);
    },
    function(){
      S.locErr=true;
      loadPrayersByCity(S.cityInput,S.countryInput);
    },
    {timeout:8000}
  );
}

function renderQuranList(){
  var scr=document.getElementById("sc-quran");
  if(!scr)return;
  scr.innerHTML="";
  scr.appendChild(TopBar("Le Noble Coran","114 sourates"));

  var si=mk("input",{cls:"inp",type:"text",placeholder:"Rechercher une sourate...",style:{margin:"12px 16px",width:"calc(100% - 32px)"}});
  si.value=S.qSearch;
  var scroll=mk("div",{cls:"scroll"});

  function draw(q){
    scroll.innerHTML="";
    var filtered=SURAHS.filter(function(s){
      return !q||
        s[2].toLowerCase().indexOf(q.toLowerCase())>=0||
        s[3].toLowerCase().indexOf(q.toLowerCase())>=0||
        String(s[0]).indexOf(q)>=0||
        s[1].indexOf(q)>=0;
    });
    filtered.forEach(function(s,i){
      var item=mk("div",{cls:"surah-item fu",style:{animationDelay:Math.min(i,20)*0.03+"s"}});
      item.addEventListener("click",function(){openSurah(s[0]);});
      var numBox=mk("div",{cls:"surah-num-box"},String(s[0]));
      var info=mk("div",{style:{flex:1,minWidth:0}});
      info.appendChild(mk("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px"}},
        [mk("span",{style:{fontWeight:600,fontSize:".9rem"}},s[2]),
         mk("span",{style:{fontSize:".7rem",color:"#475569","·":""}}," · "+s[3])]
      ));
      var meta=mk("div",{style:{display:"flex",gap:"6px",alignItems:"center"}});
      meta.appendChild(mk("span",{style:{fontSize:".6rem",color:"#475569"}},s[4]+" versets"));
      meta.appendChild(mk("span",{cls:"pill "+(s[6]==="M"?"pill-gold":"pill-green"),style:{fontSize:".48rem",padding:"2px 7px"}},s[6]==="M"?"Mecquoise":"Médinoise"));
      info.appendChild(meta);
      var ar=mk("div",{style:{fontFamily:"Amiri,serif",fontSize:"1.05rem",color:"#fbbf24",direction:"rtl"}},s[1]);

  scr.appendChild(si);

function openSurah(num){
  S.qView="surah";S.surahNum=num;S.surahData=null;S.surahErr=null;S.surahLoad=true;
  renderSurah();
  fetch("https://api.alquran.cloud/v1/surah/"+num+"/editions/quran-uthmani,fr.hamidullah")
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.code===200&&Array.isArray(d.data)&&d.data.length===2){
        S.surahData=d.data;S.surahLoad=false;S.surahErr=null;
        renderSurah();
      } else {
        S.surahErr="Impossible de charger la sourate.";S.surahLoad=false;renderSurah();
      }
    })
    .catch(function(){S.surahErr="Erreur réseau.";S.surahLoad=false;renderSurah();});
}

function renderSurah(){
  var scr=document.getElementById("sc-quran");
  if(!scr)return;
  scr.innerHTML="";
  var meta=SURAHS[S.surahNum-1];
  var subtitle=meta?meta[2]+" · "+meta[4]+" versets":"";

  var scroll=mk("div",{cls:"scroll"});
  if(S.surahLoad){scroll.appendChild(sp());scr.appendChild(scroll);return;}
  if(S.surahErr){
    scroll.appendChild(mk("div",{cls:"err-box fu",style:{margin:"16px"}},S.surahErr));
    var rb=mk("button",{cls:"btn fu",style:{margin:"0 16px"},onClick:function(){openSurah(S.surahNum);}});
    rb.textContent="Réessayer";scroll.appendChild(rb);scr.appendChild(scroll);return;

  var arAyahs=S.surahData[0].ayahs;
  var frAyahs=S.surahData[1].ayahs;

  // Surah header
  var header=mk("div",{style:{textAlign:"center",padding:"20px 16px 12px",borderBottom:"1px solid #1e293b0a"}});
  header.appendChild(mk("div",{style:{fontFamily:"Amiri,serif",fontSize:"1.6rem",color:"#e2e8f0",direction:"rtl",marginBottom:"8px"}},meta[1]));
  header.appendChild(mk("div",{style:{fontSize:".72rem",color:"#475569",marginBottom:"6px"}},meta[3]+" — "+meta[2]));
  header.appendChild(mk("div",{cls:"pill pill-green",style:{display:"inline-flex"}},meta[6]==="M"?"Mecquoise":"Médinoise"));
  scroll.appendChild(header);

  // Bismillah (all except surah 9 and 1 which starts with it as first ayah)
  if(S.surahNum!==9&&S.surahNum!==1){
    scroll.appendChild(mk("div",{cls:"bismillah fu"},"بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ"));
  }

  arAyahs.forEach(function(ayah,i){
    var frAyah=frAyahs[i];
    var wrap=mk("div",{cls:"ayah-wrap fu",style:{animationDelay:Math.min(i,30)*0.02+"s"}});
    var arRow=mk("div",{style:{display:"flex",justifyContent:"flex-end",alignItems:"flex-start",flexWrap:"wrap",gap:"4px",marginBottom:"10px"}});
    var badge=mk("div",{cls:"ayah-badge"},String(ayah.numberInSurah));
    var arText=mk("div",{cls:"ayah-ar",style:{flex:"1 1 80%"}},ayah.text);

    }
    scroll.appendChild(wrap);
  });

  scroll.appendChild(mk("div",{style:{height:"20px"}}));
  scr.appendChild(scroll);
}

  var scroll=mk("div",{cls:"scroll"});

  var grid=mk("div",{cls:"dhikr-grid"});

    var card=mk("div",{cls:"dhikr-card"+(done?" done":"")});

    // SVG ring
    var size=160;var radius=72;var circ=2*Math.PI*radius;

    svg.setAttribute("viewBox","0 0 "+size+" "+size);

    var bg=document.createElementNS(svgNS,"circle");
    bg.setAttribute("cx",size/2);bg.setAttribute("cy",size/2);bg.setAttribute("r",radius);
    bg.setAttribute("fill","none");bg.setAttribute("stroke","#1e293b");bg.setAttribute("stroke-width","3");

    fg.setAttribute("fill","none");fg.setAttribute("stroke",done?"#22c55e":"#15803d");fg.setAttribute("stroke-width","3");

    fg.setAttribute("transform","rotate(-90 "+(size/2)+" "+(size/2)+")");
    svg.appendChild(bg);svg.appendChild(fg);

    card.appendChild(mk("div",{cls:"dhikr-arabic"},d.label));

    card.appendChild(mk("div",{cls:"dhikr-count"},String(d.count)));

    });

  });
  scroll.appendChild(grid);

  if(allDone){

    finale.appendChild(mk("div",{style:{fontSize:".72rem",color:"#94a3b8"}},"Allahoumma antas-salâm wa minkas-salâm"));
    scroll.appendChild(finale);

  var adhkar=mk("div",{style:{padding:"14px 16px"}});
  adhkar.appendChild(mk("div",{cls:"lbl"},"ADHKÂR DU MATIN & DU SOIR"));

    {ar:"أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ",fr:"Je cherche refuge auprès d'Allah contre le Shaytan le maudit — (au réveil)"},
    {ar:"بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ",fr:"Au nom d'Allah, avec Lui rien ne peut nuire — (×3, matin & soir)"},
    {ar:"اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا",fr:"Ô Allah, c'est par Toi que nous commençons le matin... — (matin)"},
    {ar:"آيَةُ الْكُرْسِيِّ",fr:"Verset du Trône (Al-Baqara 2:255) — (après chaque prière & au coucher)"},
    {ar:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ ١٠٠×",fr:"Soubhân Allahi wa bihamdihi — (×100 le matin)"},
    {ar:"حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ",fr:"Allah me suffit, il n'y a de dieu que Lui — (×7 matin & soir)"}
  ];

/* ── QIBLA ───────────────────────────────────────────── */
function calcQibla(lat,lon){
  var mLat=21.4225*Math.PI/180;
  var mLon=39.8262*Math.PI/180;
  var uLat=lat*Math.PI/180;
  var dLon=(mLon-lon*Math.PI/180);
  var x=Math.sin(dLon)*Math.cos(mLat);
  var y=Math.cos(uLat)*Math.sin(mLat)-Math.sin(uLat)*Math.cos(mLat)*Math.cos(dLon);
  S.qiblaAngle=((Math.atan2(x,y)*180/Math.PI)+360)%360;
  renderQibla();
}

function renderQibla(){
  var scr=document.getElementById("sc-qibla");
  if(!scr)return;
  scr.innerHTML="";
  scr.appendChild(TopBar("Qibla","Direction de La Mecque"));
  var scroll=mk("div",{cls:"scroll"});

  var center=mk("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",padding:"32px 16px 16px"}});

  if(S.qiblaAngle===null){
    center.appendChild(mk("div",{style:{fontSize:"3rem",marginBottom:"16px"}},"🧭"));
    center.appendChild(mk("div",{style:{fontWeight:600,marginBottom:"8px"}},"Localisation requise"));
    center.appendChild(mk("div",{style:{fontSize:".8rem",color:"#64748b",marginBottom:"16px",textAlign:"center"}},"Autorisez la géolocalisation pour calculer la direction de la Qibla."));
    var locBtn=mk("button",{cls:"btn",style:{maxWidth:"240px"},onClick:function(){
      navigator.geolocation&&navigator.geolocation.getCurrentPosition(function(p){
        calcQibla(p.coords.latitude,p.coords.longitude);
        S.loc={lat:p.coords.latitude,lon:p.coords.longitude};
      });
    }});
    locBtn.textContent="Activer la localisation";
    center.appendChild(locBtn);
  } else {
    var angle=S.qiblaAngle;
    var effectiveAngle=angle-(S.heading||0);

    // Compass
    var wrap=mk("div",{cls:"compass-wrap"});
    var outer=mk("div",{cls:"compass-outer"});

    // Cardinal points
    var cardinals=[{l:"N",a:0},{l:"E",a:90},{l:"S",a:180},{l:"O",a:270}];
    cardinals.forEach(function(c){
      var rad=(c.a-(S.heading||0))*Math.PI/180;
      var r=100;
      var x=120+r*Math.sin(rad);
      var y=120-r*Math.cos(rad);
      var lbl=mk("div",{style:{position:"absolute",left:x+"px",top:y+"px",transform:"translate(-50%,-50%)",fontSize:".6rem",color:"#475569",fontWeight:700}},c.l);
      outer.appendChild(lbl);
    });

    // Kaaba marker
    var kRad=(angle-(S.heading||0))*Math.PI/180;
    var kr=85;
    var kx=120+kr*Math.sin(kRad);
    var ky=120-kr*Math.cos(kRad);
    var kaaba=mk("div",{style:{position:"absolute",left:kx+"px",top:ky+"px",transform:"translate(-50%,-50%)",fontSize:"1.1rem",zIndex:3}});
    kaaba.innerHTML="🕋";
    outer.appendChild(kaaba);

    // Needle
    var needleWrap=mk("div",{cls:"compass-needle-wrap",style:{transform:"rotate("+effectiveAngle+"deg)"}});
    needleWrap.appendChild(mk("div",{cls:"compass-needle"}));
    outer.appendChild(needleWrap);
    outer.appendChild(mk("div",{cls:"compass-center"}));

    wrap.appendChild(outer);
    center.appendChild(wrap);

    center.appendChild(mk("div",{style:{marginTop:"20px",textAlign:"center"}},[
      mk("div",{style:{fontSize:"2rem",fontWeight:700,color:"#22c55e",fontVariantNumeric:"tabular-nums"}},Math.round(angle)+"°"),
      mk("div",{style:{fontSize:".7rem",color:"#64748b",marginTop:"4px"}},"depuis le Nord ("+getDirection(angle)+")")
    ]));

    if(!S.orientEvt){
      center.appendChild(mk("div",{style:{marginTop:"14px",fontSize:".72rem",color:"#fbbf24",textAlign:"center",maxWidth:"260px"}},"💡 Tournez votre téléphone pour utiliser le compas en temps réel"));
    }

    // Distance to Mecca
    if(S.loc){
      var dist=haversine(S.loc.lat,S.loc.lon,21.4225,39.8262);
      center.appendChild(mk("div",{style:{marginTop:"12px",padding:"10px 20px",background:"#0d1420",borderRadius:"10px",border:"1px solid #1e293b",fontSize:".78rem",color:"#94a3b8"}},"📍 Distance vers La Mecque : "+Math.round(dist)+" km"));
    }
  }

  scroll.appendChild(center);

  // Kaaba info
  var info=mk("div",{style:{padding:"14px 16px"}});
  info.appendChild(mk("div",{cls:"lbl"},"LA QIBLA"));
  var txt=mk("div",{style:{fontSize:".8rem",color:"#94a3b8",lineHeight:1.7}});
  txt.textContent="La Qibla est la direction de la Kaaba à La Mecque, vers laquelle les musulmans font face lors de leurs prières. Elle est l'une des conditions essentielles de la validité de la Salah.";
  info.appendChild(txt);
  info.appendChild(mk("div",{style:{fontFamily:"Amiri,serif",fontSize:"1.1rem",color:"#fbbf24",direction:"rtl",textAlign:"center",marginTop:"14px"}},"وَمِنْ حَيْثُ خَرَجْتَ فَوَلِّ وَجْهَكَ شَطْرَ الْمَسْجِدِ الْحَرَامِ"));
  info.appendChild(mk("div",{style:{fontSize:".72rem",color:"#64748b",textAlign:"center",marginTop:"6px",fontStyle:"italic"}},"« Où que tu partes, tourne ton visage en direction de la Mosquée Sacrée. » (Al-Baqara 2:149)"));
  scroll.appendChild(info);
  scroll.appendChild(mk("div",{style:{height:"20px"}}));
  scr.appendChild(scroll);
}

function getDirection(deg){
  var dirs=["N","NE","E","SE","S","SO","O","NO"];
  return dirs[Math.round(deg/45)%8];
}

function haversine(lat1,lon1,lat2,lon2){
  var R=6371;
  var dLat=(lat2-lat1)*Math.PI/180;
  var dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── INIT ────────────────────────────────────────────── */
function init(){
  var app=document.getElementById("app");
  ["prayers","quran","wisdom","dhikr","qibla"].forEach(function(id){
    app.appendChild(mk("div",{cls:"screen"+(id==="prayers"?" active":""),id:"sc-"+id}));
  });
  app.appendChild(makeBotbar());

  // Device orientation for compass
  if(window.DeviceOrientationEvent){
    function handleOrient(e){
      var h=e.webkitCompassHeading||(e.alpha?360-e.alpha:null);
      if(h!==null){
        S.heading=h;S.orientEvt=true;
        var needle=document.querySelector(".compass-needle-wrap");
        if(needle&&S.qiblaAngle!==null){
          needle.style.transform="rotate("+(S.qiblaAngle-h)+"deg)";
        }
      }
    }
    if(typeof DeviceOrientationEvent.requestPermission==="function"){
      // iOS 13+ requires permission
    } else {
      window.addEventListener("deviceorientation",handleOrient,true);
    }
  }

  renderPrayers();
  renderQuranList();
  renderWisdom();
  renderDhikr();
  renderQibla();
  getLocation();
}

init();
</script>
