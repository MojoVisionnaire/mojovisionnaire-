var WX=[{id:"prism",title:"Programme PRISM - NSA",cat:"Surveillance",mjc:220,votes:891,cred:99,summary:"La NSA espionnait via les geants du web. Revele par Snowden en 2013.",tags:["NSA","Snowden"],content:"En 2013, Edward Snowden revele que la NSA accedait aux serveurs de Google, Apple, Facebook et Microsoft via PRISM. Des millions de communications mondiales interceptees sans mandat. Confirme par le Congres americain et les entreprises elles-memes."},{id:"echelon",title:"Reseau ECHELON",cat:"Surveillance",mjc:190,votes:654,cred:97,summary:"Reseau mondial d'espionnage des communications gerant par les Five Eyes depuis 1960.",tags:["NSA","GCHQ","Five Eyes"],content:"ECHELON est un reseau d'interception des communications mondiales opere par les Etats-Unis, Royaume-Uni, Canada, Australie et Nouvelle-Zelande. Confirme officiellement par le Parlement europeen en 2001. Il capte satellites, cables sous-marins, et communications radio."},{id:"five_eyes",title:"Alliance Five Eyes",cat:"Surveillance",mjc:185,votes:612,cred:98,summary:"Accord secret d'espionnage mutuel entre 5 nations anglophones depuis 1941.",tags:["NSA","GCHQ","espionnage"],content:"Cree en 1941 via l'accord UKUSA, Five Eyes permet a cinq pays de partager leurs renseignements et d'espionner mutuellement leurs citoyens pour contourner les lois nationales. Snowden en a revele l'etendue complete en 2013."},{id:"xkeyscore",title:"XKeyscore - Tout voir, tout lire",cat:"Surveillance",mjc:175,votes:589,cred:97,summary:"Systeme NSA capable de voir pratiquement toute l'activite internet en temps reel.",tags:["NSA","Snowden","internet"],content:"XKeyscore est une interface NSA qui permet d'acceder en temps reel aux emails, historiques de navigation, chats et documents de pratiquement n'importe qui. Snowden a declare qu'il pouvait surveiller n'importe qui sans mandat. Confirme par The Guardian en 2013."},{id:"muscular",title:"Operation MUSCULAR",cat:"Surveillance",mjc:170,votes:543,cred:97,summary:"NSA et GCHQ infiltrent les cables internes de Google et Yahoo.",tags:["NSA","GCHQ","Google"],content:"Revele par le Washington Post en 2013, MUSCULAR permettait a la NSA et au GCHQ d'acceder aux cables de fibre optique reliant les datacenters de Google et Yahoo, en dehors des Etats-Unis, contournant ainsi les protections legales. Des millions de comptes compromis quotidiennement."},{id:"tempora",title:"Tempora - GCHQ",cat:"Surveillance",mjc:165,votes:498,cred:96,summary:"Les Britanniques stockaient tout le trafic internet mondial pendant 30 jours.",tags:["GCHQ","Royaume-Uni","cables"],content:"Le programme TEMPORA du GCHQ interceptait l'integralite du trafic passant par les cables de fibre optique transatlantiques. Environ 600 cables surveilles, 21 petabytes de donnees par jour stockes pendant 30 jours. Revele par Snowden en 2013."},{id:"bullrun",title:"Operation BULLRUN",cat:"Surveillance",mjc:160,votes:467,cred:95,summary:"NSA a deliberement affaibli les standards de chiffrement mondiaux.",tags:["NSA","chiffrement","backdoor"],content:"BULLRUN est un programme classifie de la NSA visant a affaiblir les standards de chiffrement internationaux et inserer des backdoors dans les produits commerciaux. Cela a compromis la securite globale d'internet. Revele par Snowden, confirme par le NIST."},{id:"ant_catalog",title:"Catalogue ANT - NSA",cat:"Surveillance",mjc:155,votes:445,cred:96,summary:"Catalogue secret d'outils d'espionnage materiel de la NSA - rootkits, implants firmware.",tags:["NSA","malware","materiel"],content:"Le catalogue ANT (Access Network Technology) de la NSA liste des dizaines d'outils d'implants physiques et logiciels: rootkits dans les firmwares de disques durs, cables USB espions, antennes cachees. Publie par Der Spiegel en 2013 a partir des documents Snowden."},{id:"vault7",title:"Vault 7 - CIA Hacking Tools",cat:"Surveillance",mjc:180,votes:678,cred:98,summary:"WikiLeaks revele l'arsenal de cyberespionnage complet de la CIA.",tags:["CIA","WikiLeaks","cyberespionnage"],content:"En 2017, WikiLeaks publie Vault 7: 8 761 documents decrivant les outils de hacking de la CIA. TV connectees transformees en micros, smartphones compromis, exploits zero-day. La CIA avait perdu le controle de son arsenal qui circulait dans la nature."},{id:"jtrig",title:"JTRIG - Operations Psychologiques GCHQ",cat:"Surveillance",mjc:150,votes:432,cred:95,summary:"GCHQ menait des operations de manipulation en ligne et de sabotage psychologique.",tags:["GCHQ","manipulation","psyops"],content:"The Intercept revele les documents JTRIG (Joint Threat Research Intelligence Group) du GCHQ: techniques pour detruire la reputation de personnes en ligne, infiltrer groupes internet, injecter de fausses informations. Un programme de guerre psychologique contre des civils."},{id:"room641a",title:"Salle 641A - AT&T San Francisco",cat:"Surveillance",mjc:145,votes:389,cred:96,summary:"AT&T donnait a la NSA un acces direct a tout son trafic internet via une salle secrete.",tags:["NSA","AT&T","backbone internet"],content:"Le technicien Mark Klein revele en 2006 l'existence de la salle 641A dans les locaux AT&T de San Francisco: une piece secrete ou la NSA interceptait tout le trafic internet du backbone. Des splitters optiques dupliquaient l'integralite des communications vers la NSA."},{id:"shamrock",title:"Operation SHAMROCK",cat:"Surveillance",mjc:140,votes:367,cred:97,summary:"De 1945 a 1975, toutes les communications telegraphiques des USA interceptees.",tags:["NSA","telegraphe","Cold War"],content:"De 1945 a 1975, les principales compagnies de telegraphe americaines (RCA, ITT, Western Union) remettaient chaque jour des copies de tous les messages telegraphiques entrant ou sortant des USA a la NSA. Revele par la Commission Church en 1975."},{id:"minaret",title:"Operation MINARET",cat:"Surveillance",mjc:138,votes:354,cred:97,summary:"NSA surveillait des personnalites americaines: MLK, Jane Fonda, politiciens.",tags:["NSA","espionnage interieur","MLK"],content:"Parallele a SHAMROCK, MINARET ciblait des citoyens americains sous pretexte de securite nationale: Martin Luther King, Muhammad Ali, Jane Fonda, des senateurs. Programme illegal qui violait directement le 1er et 4e amendement. Stoppe en 1973."},{id:"mkUltra",title:"Operation MKUltra",cat:"Medical",mjc:150,votes:342,cred:98,summary:"Programme secret CIA de controle mental via LSD, hypnose et torture. Declassifie en 1977.",tags:["CIA","LSD","controle mental"],content:"De 1953 a 1973, la CIA finance plus de 150 projets de recherche sur le controle mental impliquant LSD, hypnose, privation de sommeil et torture. Des sujets civils utilises sans consentement. Des documents partiellement detruits, partiellement declassifies en 1977 apres le Watergate."},{id:"artichoke",title:"Projet ARTICHOKE",cat:"Medical",mjc:135,votes:312,cred:95,summary:"Predecesseur de MKUltra: interrogatoires par drogues et hypnose pour effacer la memoire.",tags:["CIA","hypnose","interrogatoire"],content:"De 1951 a 1953, le projet ARTICHOKE de la CIA testait des methodes d'interrogatoire utilisant morphine, heroine, mescaline et hypnose pour obtenir des aveux et effacer des souvenirs. Direct predecesseur de MKUltra. Declassifie partiellement."},{id:"midnight_climax",title:"Operation Midnight Climax",cat:"Medical",mjc:130,votes:298,cred:96,summary:"La CIA droguait des prostituees au LSD pour tester les effets sur des clients a l'insu.",tags:["CIA","LSD","San Francisco"],content:"Sous-projet de MKUltra, Midnight Climax utilisait des maisons closes gerees par la CIA a San Francisco et New York. Des prostituees droguaient leurs clients au LSD pendant que des agents observaient derriere des miroirs. Dirige par Sidney Gottlieb. Confirme par l'enquete du Senat en 1977."},{id:"cameron",title:"Ewen Cameron - Psychic Driving",cat:"Medical",mjc:128,votes:287,cred:95,summary:"Psychiatre finance par la CIA pour effacer et reprogrammer des cerveaux humains.",tags:["CIA","psychiatrie","Canada"],content:"Le Dr Ewen Cameron, financee secretement par la CIA via MKUltra, soumettait ses patients a des mois d'electrochocs, de comas induits et de messages enregistres en boucle pour effacer leur personnalite et la remplacer. Des dizaines de victimes canadiennes indemnisees par le gouvernement."},{id:"tuskegee",title:"Etude Tuskegee - Syphilis",cat:"Medical",mjc:175,votes:534,cred:99,summary:"Le gouvernement US a laisse 399 Noirs mourir de syphilis sans les traiter pendant 40 ans.",tags:["USPHS","racisme","syphilis"],content:"De 1932 a 1972, le US Public Health Service a suivi 399 hommes noirs atteints de syphilis en Alabame SANS les traiter, meme apres la decouverte de la penicilline en 1947. L'objectif: observer la progression naturelle de la maladie. Scandale revele en 1972 par Associated Press. Clinton s'est excuse officiellement en 1997."},{id:"guatemala",title:"Experiences Guatemala - Syphilis",cat:"Medical",mjc:168,votes:489,cred:99,summary:"Des soldats et prisonniers guatevalteques deliberement infectes par des maladies sexuelles par des medecins americains.",tags:["USPHS","Guatemala","syphilis"],content:"De 1946 a 1948, des scientifiques americains ont deliberement infecte plus de 1300 Guatemalteques (soldats, prisonniers, patients psychiatriques) avec syphilis, gonorrhee et chancre mou sans leur consentement. Revele en 2010 par la chercheuse Susan Reverby. Obama s'est excuse."},{id:"unit731",title:"Unite 731 - Crimes de Guerre Japonais",cat:"Militaire",mjc:162,votes:467,cred:99,summary:"Unité secrete japonaise experimentait sur des prisonniers: vivisection, armes biologiques, gelure.",tags:["Japon","guerre biologique","vivisection"],content:"De 1936 a 1945, l'Unite 731 de l'armee imperiale japonaise experimentait sur des prisonniers chinois et russes: vivisections sans anesthesie, infections deliberees, expositions au froid extreme. Plus de 3000 victimes. Les responsables gracies par les USA en echange des donnees."},{id:"sea_spray",title:"Operation Sea Spray - Bacteries sur NYC",cat:"Medical",mjc:145,votes:398,cred:97,summary:"L'armee US a repandu des bacteries sur San Francisco pour tester la vulnerabilite de la population.",tags:["armee","bacteries","San Francisco"],content:"En 1950, l'armee US a libere des nuages de Serratia marcescens (bacterie supposee inoffensive) sur San Francisco depuis des navires. Au moins un mort par infection. La CIA et l'armee ont mene des dizaines d'experiences similaires sur des populations civiles americaines."},{id:"edgewood",title:"Experiences Edgewood Arsenal",cat:"Medical",mjc:140,votes:376,cred:98,summary:"Des milliers de soldats americains utilises comme cobayes pour tester des armes chimiques et drogues.",tags:["armee","armes chimiques","soldats"],content:"De 1955 a 1975, l'arsenal d'Edgewood (Maryland) a teste sur 7000 soldats americains des agents chimiques (gaz neurotoxiques, BZ, LSD). Sans consentement eclaire. Des veterans souffrent encore de sequelles. Programme confirme par le GAO en 1994."},{id:"radiation",title:"Experiences de Radiation - Patients Cancereux",cat:"Medical",mjc:138,votes:354,cred:98,summary:"Des patients cancereux americains irradies a doses massives sans information ni consentement.",tags:["DOE","radiation","cobaye"],content:"De 1945 a 1962, le gouvernement americain a finance des experiences d'irradiation sur des patients hospitalisés sans leur consentement, souvent des pauvres et des Noirs. Revele en 1993 par Eileen Welsome du Albuquerque Tribune. Clinton a ordonne une enquete; des excuses officielles et compensations ont suivi."},{id:"agent_orange",title:"Agent Orange au Vietnam",cat:"Militaire",mjc:172,votes:521,cred:99,summary:"Herbicide defoliant americain qui a provoque des malformations genetiques sur des generations au Vietnam.",tags:["Vietnam","dioxine","Monsanto"],content:"De 1961 a 1971, les USA repandent 76 millions de litres d'Agent Orange (herbicide contenant de la dioxine) sur le Vietnam. Trois millions de Vietnamiens affectes, des malformations congenitales sur trois generations. Les fabricants (Monsanto, Dow) ont paye 180M$ aux veterans americains en 1984 mais nie toute responsabilite au Vietnam."},{id:"naomi",title:"Projet NAOMI - Armes Biologiques CIA",cat:"Medical",mjc:135,votes:312,cred:94,summary:"La CIA developpait des agents biologiques pour eliminations ciblees et infections de masse.",tags:["CIA","armes biologiques","assassinat"],content:"Projet NAOMI etait le programme d'armes biologiques de la CIA developpe dans les annees 1950-60. Il incluait des toxines pour assassinats cibles (poison a aiguille de parapluie) et l'etude d'agents pathogenes pour contaminations de masse. Partiellement revele par la Commission Church."},{id:"northwoods",title:"Operation Northwoods",cat:"Faux Drapeau",mjc:180,votes:567,cred:97,summary:"Les chefs militaires US proposaient de simuler des attentats contre leurs propres citoyens pour justifier une invasion de Cuba.",tags:["Cuba","JCS","false flag"],content:"En 1962, les chefs d'etat-major americains soumettent au secretaire a la Defense Robert McNamara le plan Northwoods: simuler des attaques terroristes sur sol americain, couler des bateaux de refugies cubains, bombarder Guantanamo, pour justifier une invasion de Cuba. Kennedy refuse et renvoie Lemnitzer."},{id:"tonkin",title:"Incident du Golfe du Tonkin",cat:"Faux Drapeau",mjc:178,votes:598,cred:99,summary:"L'attaque du 4 aout 1964 contre des navires americains n'a jamais eu lieu. Mais elle a justifie la guerre du Vietnam.",tags:["Vietnam","LBJ","menssonge d'Etat"],content:"Le 4 aout 1964, Johnson annonce qu'un destroyer americain a ete attaque dans le Golfe du Tonkin. Cette attaque n'a jamais eu lieu selon les propres documents de la NSA declassifies en 2005. Pourtant, le Congres vote la resolution du Tonkin autorisant la guerre au Vietnam qui fera 58 000 morts americains."},{id:"pentagon_papers",title:"Pentagon Papers",cat:"Gouvernement",mjc:190,votes:712,cred:99,summary:"7000 pages prouvant que les presidents americains mentaient systematiquement sur la guerre du Vietnam.",tags:["Vietnam","McNamara","mensonge"],content:"En 1971, Daniel Ellsberg publie via le New York Times 7000 pages d'une etude classifiee du Pentagone montrant que les administrations Truman, Eisenhower, Kennedy et Johnson savaient la guerre du Vietnam ingagnable mais continuaient tout en mentant au public. Nixon tente de faire interdire la publication."},{id:"phoenix",title:"Programme Phoenix",cat:"Militaire",mjc:165,votes:476,cred:98,summary:"Programme CIA-armee US d'assassinat systematique de suspects Viet-Cong au Vietnam - 20 000 morts.",tags:["CIA","Vietnam","assassinat"],content:"De 1965 a 1972, le programme Phoenix visait a neutraliser l'infrastructure politique du Viet-Cong. Resultat: 26 000 personnes tuees, 55 000 emprisonnees, dont beaucoup sans preuve. Des methodes de torture documentees par des veterans americains lors des auditions du Congres."},{id:"menu",title:"Operation Menu - Cambodge",cat:"Militaire",mjc:160,votes:445,cred:99,summary:"Nixon bombarde secretement le Cambodge neutre pendant 14 mois en mentant au Congres.",tags:["Nixon","Cambodge","bombardement secret"],content:"De 1969 a 1970, Nixon et Kissinger organisent le bombardement secret du Cambodge (Operation Menu) tout en declarant publiquement respecter la neutralite cambodgienne. Plus de 100 000 tonnes de bombes largees sur un pays neutre, sans autorisation du Congres. Revele par le New York Times en 1969."},{id:"cyclone",title:"Operation Cyclone - Financement des Talibans",cat:"Gouvernement",mjc:175,votes:534,cred:98,summary:"La CIA a arme et finance les moudjahidines afghans qui devinrent Al-Qaeda.",tags:["CIA","Taliban","Afghanistan"],content:"De 1979 a 1989, la CIA depense 3 milliards de dollars pour armer les moudjahidines afghans contre l'URSS via Operation Cyclone. Parmi les beneficiaires: Oussama Ben Laden. Ces armes et formations militaires ont directement contribue a la creation d'Al-Qaeda. Confirme par Robert Gates, ex-directeur CIA."},{id:"timber_sycamore",title:"Operation Timber Sycamore - Syrie",cat:"Gouvernement",mjc:158,votes:423,cred:95,summary:"La CIA armait secretement des groupes rebelles syriens dont certains rejoignirent Daesh.",tags:["CIA","Syrie","Daesh"],content:"De 2012 a 2017, la CIA et l'Arabie Saoudite finançaient et armaient des groupes rebelles syriens dans le cadre d'Operation Timber Sycamore. Le NYT et le Washington Post ont revele que certaines de ces armes ont termine dans les mains de Daesh. Programme stoppe par Trump en 2017."},{id:"condor",title:"Operation Condor",cat:"Gouvernement",mjc:170,votes:512,cred:99,summary:"Les USA coordinaient les dictatures d'Amerique du Sud pour eliminer les opposants politiques.",tags:["CIA","Amerique Latine","disparitions"],content:"De 1975 a 1983, la CIA coordonnait les services secrets d'Argentine, Chili, Uruguay, Paraguay, Bresil et Bolivie pour traquer et eliminer les opposants politiques en dehors de leurs frontieres. Environ 60 000 personnes tuees, 400 000 emprisonnees. Confirme par des documents declassifies en 2016."},{id:"gladio",title:"Operation Gladio",cat:"Militaire",mjc:168,votes:487,cred:99,summary:"L'OTAN maintenait des reseaux secrets de guerilleros en Europe pour evenements post-invasion. Certains lies au terrorisme.",tags:["OTAN","terrorisme","stay-behind"],content:"Apres 1945, l'OTAN et la CIA etablissent des reseaux stay-behind secrets en Europe (Gladio en Italie) en cas d'invasion sovietique. Ces reseaux ont ete impliques dans des attentats terroristes en Italie (massacre de Bologne, 1980: 85 morts). Revele par le Premier ministre Andreotti en 1990."},{id:"school_americas",title:"Ecole des Ameriques",cat:"Militaire",mjc:162,votes:456,cred:98,summary:"Fort Benning formait les tortionnaires et dictateurs d'Amerique Latine.",tags:["armee US","torture","Amerique Latine"],content:"Situee a Fort Benning, Georgie, l'Ecole des Ameriques formait les officiers militaires latino-americains. Parmi ses alumni: Manuel Noriega, Hugo Banzer, et des responsables de massacres en El Salvador et Guatemala. Des manuels de torture ont ete retrouves dans ses cours. Renommee WHINSEC en 2001."},{id:"abu_ghraib",title:"Torture Abu Ghraib",cat:"Militaire",mjc:185,votes:689,cred:99,summary:"Soldats americains torturant des prisonniers irakiens, photos publiees en 2004.",tags:["Irak","torture","Pentagon"],content:"En 2004, des photos publiees par CBS et le New Yorker montrent des soldats americains torturant, humiliant et abusant sexuellement des prisonniers irakiens a Abu Ghraib. Le rapport Taguba confirme des crimes systemiques. Onze soldats condamnes. Aucun officier superieur poursuivi."},{id:"cia_torture",title:"Programme de Torture CIA post-9/11",cat:"Gouvernement",mjc:182,votes:623,cred:99,summary:"La CIA utilisait le waterboarding et d'autres formes de torture dans des sites secrets mondiaux.",tags:["CIA","torture","waterboarding"],content:"Apres le 11 septembre, la CIA etablit des sites de detention secrets (black sites) dans des pays tiers. Le rapport du Senat de 2014 (6700 pages) documente le waterboarding, la privation de sommeil jusqu'a 180h, le rectal feeding et d'autres formes de torture. Ces methodes ont ete approuvees au plus haut niveau par Bush et Cheney."},{id:"ajax",title:"Operation Ajax - Iran 1953",cat:"Gouvernement",mjc:172,votes:534,cred:99,summary:"La CIA renverse le premier ministre democratiquement elu d'Iran pour proteger le petrole britannique.",tags:["CIA","Iran","petrole"],content:"En 1953, la CIA (Operation AJAX) et le MI6 britannique organisent le coup d'etat contre Mossadegh, premier ministre iranien democratiquement elu qui avait nationalise le petrole. La CIA admit sa responsabilite en 2013. Ce coup d'etat a directement conduit a la Revolution Islamique de 1979."},{id:"pbsuccess",title:"Operation PBSUCCESS - Guatemala 1954",cat:"Gouvernement",mjc:168,votes:498,cred:99,summary:"La CIA renverse le president guatemalteque Arbenz pour proteger les bananes United Fruit.",tags:["CIA","Guatemala","United Fruit"],content:"En 1954, la CIA organise le renversement du president Jacobo Arbenz qui avait voulu redistribuer les terres de la United Fruit Company. La CIA forma une armee de mercenaires, bombarda la capitale. Arbenz renverse, remplace par une dictature militaire. Des dizaines d'annees de guerre civile s'ensuivent."},{id:"paperclip",title:"Operation Paperclip",cat:"Gouvernement",mjc:165,votes:476,cred:99,summary:"Les USA recrutaient secretement des scientifiques nazis apres la guerre pour leur programme spatial et militaire.",tags:["Nazis","NASA","Pentagon"],content:"Apres 1945, le gouvernement americain recrute secretement plus de 1600 scientifiques nazis sous Operation Paperclip, dont Wernher von Braun (V2/NASA) et Kurt Blome (armes biologiques). Leurs dossiers criminels effaces. Ce programme jeta les bases du programme spatial americain et de la guerre biologique americaine."},{id:"iran_contra",title:"Iran-Contra",cat:"Gouvernement",mjc:178,votes:612,cred:99,summary:"Reagan vendait des armes a l'Iran (ennemi officiel) pour financer illegalement des rebelles nicaraguayens.",tags:["Reagan","CIA","Nicaragua"],content:"Revele en 1986, le scandale Iran-Contra: l'administration Reagan vendait secretement des armes a l'Iran (sous embargo) et utilisait les profits pour financer les Contras nicaraguayens, en violation d'une loi du Congres. 14 inculpes, aucun condamne definitivement. Reagan pretend ne rien savoir."},{id:"church",title:"Rapport Church - Crimes CIA",cat:"Gouvernement",mjc:175,votes:567,cred:99,summary:"La Commission Church revele en 1975 l'etendue des crimes de la CIA: assassinats, surveillance, destabilisations.",tags:["CIA","FBI","Congres"],content:"La Commission Church (1975-1976) enquete sur les services de renseignement americains et revele: des plans d'assassinat de Fidel Castro, Patrice Lumumba, Salvador Allende; COINTELPRO contre les Noirs americains; SHAMROCK et MINARET. Elle conduit a des reformes majeures des services de renseignement."},{id:"cointelpro",title:"COINTELPRO - FBI",cat:"Gouvernement",mjc:195,votes:712,cred:96,summary:"Programme FBI pour surveiller, infiltrer et detruire les mouvements politiques americains.",tags:["FBI","MLK","Black Panthers"],content:"De 1956 a 1971, le FBI infiltre et destabilise les Black Panthers, le mouvement pour les droits civiques, des groupes antinucleaires. Le FBI envoya une lettre anonyme a MLK l'incitant au suicide. Confirme par la Commission Church et des documents obtenus via FOIA."},{id:"watergate",title:"Watergate",cat:"Gouvernement",mjc:188,votes:712,cred:99,summary:"Nixon fait espionner ses opposants puis obstrue la justice. Premier president contraint de demissionner.",tags:["Nixon","FBI","Democratic Party"],content:"En juin 1972, des operatifs du Comite de reelection de Nixon cambriolent le siege du Parti Democrate au Watergate. Nixon organise la dissimulation pendant deux ans. Les enregistrements revelent sa complicite. Il demissionne en aout 1974 sous menace d'impeachment, seul president americain a l'avoir fait."},{id:"jfk",title:"Assassination JFK - Documents Classifies",cat:"Gouvernement",mjc:182,votes:698,cred:90,summary:"Des milliers de documents CIA sur l'assassinat de Kennedy toujours partiellement classes en 2023.",tags:["CIA","Kennedy","Oswald"],content:"Malgre la loi de 1992 ordonnant la declassification totale des documents sur l'assassinat de JFK, des milliers de pages CIA restent partiellement censures en 2023. Le directeur de la CIA a convaincu Trump et Biden de ne pas tout publier pour proteger des sources et methodes. Ce que cachent ces documents reste inconnu."},{id:"gary_webb",title:"Gary Webb - L'Affaire Dark Alliance",cat:"Gouvernement",mjc:165,votes:489,cred:96,summary:"La CIA tolerait le trafic de cocaine des Contras qui inondait les ghettos americains.",tags:["CIA","cocaine","Nicaragua"],content:"En 1996, le journaliste Gary Webb publie Dark Alliance dans le San Jose Mercury News: la CIA avait connaissance, voire facilitait, le trafic de cocaine des Contras nicaraguayens qui alimentait le crack dans les ghettos de Los Angeles. La CIA admit partiellement en 1998. Webb trouva la mort en 2004 avec deux balles dans la tete, classe suicide."},{id:"plame",title:"Affaire Valerie Plame",cat:"Gouvernement",mjc:160,votes:445,cred:99,summary:"La Maison Blanche a devoile l'identite d'une agent CIA pour se venger de son mari critique.",tags:["CIA","Bush","Irak"],content:"En 2003, pour se venger de l'ambassadeur Joseph Wilson qui avait critique les mensonges sur les ADM en Irak, la Maison Blanche revele que sa femme Valerie Plame est agent CIA sous couverture. Scooter Libby condamne pour parjure en 2007, grâcie par Bush. Plame dut quitter la CIA."},{id:"yellowcake",title:"Mensonge du Yellowcake - Niger",cat:"Gouvernement",mjc:172,votes:534,cred:99,summary:"Bush affirme que l'Irak achetait de l'uranium au Niger. Un faux document forge en Italie.",tags:["Bush","Irak","faux document"],content:"Dans son discours sur l'Etat de l'Union 2003, Bush affirme que l'Irak tentait d'acheter de l'uranium (yellowcake) au Niger pour fabriquer une bombe atomique. Ce document s'est avere etre un faux grossier forge en Italie. L'AIEA l'avait signale des fevrier 2003. Utilise pour justifier la guerre."},{id:"wmd_iraq",title:"Armes de Destruction Massive - Irak",cat:"Gouvernement",mjc:195,votes:756,cred:99,summary:"La guerre en Irak basee sur des preuves fabriquees. Aucune ADM trouvee.",tags:["Bush","Irak","Powell","mensonge"],content:"En 2003, Colin Powell presente au Conseil de Securite de l'ONU des preuves d'ADM irakiennes (tubes d'aluminium, fioles de spores). Toutes fabrications. La CIA avait des doutes internes ignores. 4500 soldats americains morts, des centaines de milliers d'Irakiens tues, pays destabilise pendant 20 ans. Aucun responsable poursuivi."},{id:"911_28pages",title:"11 Septembre - Les 28 Pages",cat:"Gouvernement",mjc:178,votes:589,cred:95,summary:"28 pages classifiees sur les liens entre Arabie Saoudite et le 11-Septembre, publiees en 2016.",tags:["11 Septembre","Arabie Saoudite","FBI"],content:"Le rapport du Congres de 2002 sur le 11-Septembre contenait 28 pages classifiees sur le financement saoudien des pirates de l'air. Publiees en 2016 sous pression, elles revelent des liens entre des agents du gouvernement saoudien et les terrorists de Mohamed Atta. L'Arabie Saoudite nommee dans plusieurs procès."},{id:"fast_furious",title:"Fast and Furious - ATF",cat:"Gouvernement",mjc:148,votes:398,cred:97,summary:"Le gouvernement US laissait deliberement des armes traverser vers les cartels mexicains pour les tracer.",tags:["ATF","DOJ","cartels"],content:"Operation Fast and Furious: l'ATF (Bureau des alcools, tabacs et armes) permettait deliberement a des acheteurs suspects d'acheminer des milliers d'armes au Mexique pour les cartels afin de les tracer. Une arme retrouvee sur le site de l'assassinat d'un agent border patrol. Eric Holder tenu en outrage du Congres."},{id:"bohemian_grove",title:"Bohemian Grove",cat:"Gouvernement",mjc:145,votes:412,cred:88,summary:"Elite politique et economique americaine se reunissait dans une foret pour des rituels secrets.",tags:["elite","rituel","californie"],content:"Chaque juillet, des centaines de dirigeants americains (presidents, PDG, militaires) se reunissent dans le Bohemian Grove en Californie pour deux semaines de festivites incluant le rituel Cremation of Care pres d'une statue de hibou. Alex Jones a filme une ceremonie en 2000. L'existence est confirmee; la nature exacte des rituels debattue."},{id:"family_jewels",title:"Family Jewels - CIA",cat:"Gouvernement",mjc:168,votes:487,cred:99,summary:"Document interne CIA de 702 pages listant ses propres activites illegales entre 1959 et 1973.",tags:["CIA","crimes","Watergate"],content:"En 1973, le directeur CIA James Schlesinger ordonne de compiler toutes les activites potentiellement illegales. Resultat: 702 pages (Family Jewels) listant: plans d'assassinat, surveillance de journalistes, ouverture de courrier, infiltration de groupes politiques. Partiellement declassifie en 2007."},{id:"fukushima",title:"Fukushima - Dissimulation TEPCO",cat:"Gouvernement",mjc:155,votes:423,cred:94,summary:"TEPCO et le gouvernement japonais ont cache pendant des jours la gravite de la fusion des reacteurs.",tags:["Japon","nucleaire","TEPCO"],content:"Apres le tsunami de 2011, TEPCO et le gouvernement japonais ont deliberement minimise la gravite des fusions de reacteurs de Fukushima pendant plusieurs jours, permettant des evacuations insuffisantes. Des emails internes ont revele que les autorites connaissaient la situation reelle mais communiquaient des informations erronees."},{id:"bcci",title:"BCCI - La Banque de la CIA",cat:"Finance",mjc:162,votes:478,cred:98,summary:"La BCCI etait une banque internationale blanchissant l'argent de la drogue, du terrorisme et de la CIA.",tags:["CIA","blanchiment","Pakistan"],content:"La Bank of Credit and Commerce International (BCCI) etait utilisee par la CIA pour financer des operations clandestines, blanchir l'argent des Contras et des cartels, et financer des reseaux terroristes. Fermee en 1991, elle avait des filiales dans 78 pays. Robert Mueller (FBI) enqueta dessus sans jamais poursuivre les donneurs d'ordre americains."},{id:"libor",title:"Manipulation du LIBOR",cat:"Finance",mjc:170,votes:523,cred:99,summary:"Les grandes banques mondiales manipulaient le taux d'interet de reference de 350 000 milliards de dollars.",tags:["banques","taux","manipulation"],content:"De 2003 a 2012, des traders de Barclays, UBS, Deutsche Bank et d'autres manipulaient le LIBOR (London Interbank Offered Rate), taux de reference pour 350 000 milliards de dollars de produits financiers mondiaux. Des emails montrent des traders se felicitant de la manipulation. Amendes de 9 milliards de dollars, aucun dirigeant emprisonne."},{id:"panama",title:"Panama Papers",cat:"Finance",mjc:185,votes:678,cred:99,summary:"11,5 millions de documents revelant comment les ultra-riches cachent leur argent dans des paradis fiscaux.",tags:["evasion fiscale","Panama","oligarques"],content:"En 2016, le Consortium International de Journalistes publie 11,5 millions de documents du cabinet Mossack Fonseca revealant les structures d'evasion fiscale de 214 000 societes-ecrans utilisees par des chefs d'Etat, oligarques et milliardaires. 12 dirigeants mondiaux directement cites. La Panama Papers provoque des resignations et enquetes dans des dizaines de pays."},{id:"pandora",title:"Pandora Papers",cat:"Finance",mjc:180,votes:623,cred:99,summary:"12 millions de documents sur les paradis fiscaux de 35 dirigeants mondiaux et 300 fonctionnaires.",tags:["evasion fiscale","paradis fiscaux","oligarques"],content:"En 2021, le ICIJ publie les Pandora Papers: 12 millions de documents revealant que 35 chefs d'Etat et de gouvernement (dont le roi du Maroc, Tony Blair, le president ukrainien Zelensky) utilisaient des societes offshore pour cacher leurs richesses. Le roi de Jordanie seul a cache 70 millions d'euros de proprietes."},{id:"vw_dieselgate",title:"Dieselgate Volkswagen",cat:"Finance",mjc:175,votes:589,cred:99,summary:"VW equipait 11 millions de vehicules d'un logiciel tricheur pour passer les tests anti-pollution.",tags:["VW","pollution","triche"],content:"En 2015, l'EPA americaine revele que Volkswagen avait installe dans 11 millions de voitures diesel un logiciel detestant les tests d'emission et activant alors les filtres anti-pollution, qui etaient desactives en usage reel. Emissions reelles: 40 fois la norme. Amende de 25 milliards, PDG condamne. D'autres constructeurs (Renault, PSA) subsequemment impliques."},{id:"big_tobacco",title:"Big Tobacco - 50 ans de mensonges",cat:"Finance",mjc:188,votes:712,cred:99,summary:"Les cigarettiers savaient depuis 1950 que la cigarette tue et ont finance des etudes pour le nier.",tags:["tabac","mensonge","cancer"],content:"Des documents internes de Philip Morris et RJ Reynolds, rendus publics lors des proces des annees 1990, revelent que les fabricants de cigarettes savaient depuis les annees 1950 que le tabac causait le cancer, mais ont finance des etudes de desinformation et paye des scientifiques pour semer le doute. Settlement de 246 milliards de dollars en 1998."},{id:"sugar_industry",title:"Industrie du Sucre - Etudes Harvard",cat:"Finance",mjc:165,votes:478,cred:99,summary:"L'industrie sucriere a paye des scientifiques Harvard pour incriminer les graisses et innocenter le sucre.",tags:["sucre","Harvard","nutrition"],content:"Un article de JAMA Internal Medicine (2016) basé sur des documents internes revele qu'en 1965, la Sugar Research Foundation a paye des chercheurs Harvard pour publier des etudes pointant les graisses comme cause des maladies cardiovasculaires, detournant l'attention du sucre. Ces fausses etudes ont influence 50 ans de politiques nutritionnelles."},{id:"leaded_gasoline",title:"Essence au Plomb - Petrole vs Science",cat:"Finance",mjc:170,votes:512,cred:99,summary:"L'industrie petroliere savait que l'essence au plomb etait toxique et a finance le silence scientifique pendant 50 ans.",tags:["plomb","petrole","Standard Oil"],content:"Thomas Midgley (Standard Oil) invente l'essence au plomb en 1921 sachant qu'elle est toxique. Des etudes des annees 1920 le confirment, étouffées par l'industrie. Des generations intoxiquees. Le Dr Clair Patterson, geochimiste, lutta seul pendant 20 ans avant son interdiction definitive aux USA en 1996 (en Europe 2000)."},{id:"asbestos",title:"Amiante - L'Industrie Savait",cat:"Finance",mjc:168,votes:498,cred:99,summary:"Les fabricants d'amiante savaient depuis les annees 1930 que l'amiante tue et ont paye pour le dissimuler.",tags:["amiante","mesotheliome","industrie"],content:"Des documents internes de Johns-Manville et Raybestos-Manhattan, reveles lors de proces, montrent que ces entreprises savaient depuis les annees 1930 que l'exposition a l'amiante causait des cancers fatals (mesotheliome), mais ont supprime des etudes et continue leur commercialisation. Des millions de victimes dans le monde."},{id:"opioid",title:"Crise des Opioides - Purdue Pharma",cat:"Finance",mjc:175,votes:545,cred:99,summary:"Purdue Pharma a deliberement cree une epidemie d'addiction aux opioides en corrompant des medecins.",tags:["Purdue","OxyContin","epidemie"],content:"La famille Sackler (Purdue Pharma) a commercialise l'OxyContin en corrompant des medecins pour prescrire massivement, minimisant deliberement les risques d'addiction. 500 000 morts d'overdose aux USA entre 1999 et 2019. Purdue plaide coupable en 2020. La famille Sackler, apres avoir transfere des milliards personnellement, echappe a la prison via un reglement de 6 milliards."},{id:"mockingbird",title:"Operation Mockingbird",cat:"Medias",mjc:160,votes:467,cred:95,summary:"La CIA recrutait des journalistes de grands medias pour influencer l'opinion publique americaine.",tags:["CIA","journalisme","medias"],content:"Revele par la Commission Church en 1975, Operation Mockingbird: la CIA avait recrute plus de 400 journalistes dans des grandes medias americains (New York Times, CBS, Time) pour planter des articles favorables a ses operations. Carl Bernstein a documente l'etendue du programme dans Rolling Stone en 1977."},{id:"fb_experiment",title:"Experimentation Emotionnelle Facebook",cat:"Medias",mjc:155,votes:423,cred:99,summary:"Facebook manipule les fils d'actualite de 700 000 utilisateurs a leur insu pour etudier la contagion emotionnelle.",tags:["Facebook","manipulation","emotions"],content:"En 2014, des chercheurs de Facebook et Cornell revelent dans PNAS qu'ils ont manipule les fils d'actualite de 689 003 utilisateurs pendant une semaine sans leur consentement pour observer si les emotions etaient contagieuses. L'experience est confirmee. Facebook s'excuse timidement. Aucune sanction significative."},{id:"cambridge",title:"Cambridge Analytica",cat:"Medias",mjc:178,votes:634,cred:99,summary:"Donnees de 87 millions de profils Facebook utilisees pour cibler psychologiquement des electeurs a leur insu.",tags:["Facebook","election","microtargeting"],content:"En 2018, le lanceur d'alerte Christopher Wylie revele que Cambridge Analytica a collecte sans consentement les donnees de 87 millions de profils Facebook pour construire des profils psychologiques et cibler des electeurs americains avec des publicites politiques personnalisees durant la campagne Trump 2016. Facebook amende de 5 milliards."},{id:"stellarwind",title:"STELLARWIND - Surveillance Massive post-9/11",cat:"Surveillance",mjc:165,votes:478,cred:99,summary:"Bush autorise illegalement la NSA a surveiller tous les Americains apres le 11 Septembre.",tags:["NSA","Bush","9/11"],content:"Apres le 11 Septembre, Bush autorise secretement la NSA a intercepter les communications de citoyens americains sur sol americain sans mandat - illicite en vertu du Foreign Intelligence Surveillance Act. Programme STELLARWIND revele par Thomas Tamm (DOJ) en 2005 au NY Times. Plusieurs juges du FISC demissionnent en protestation."},{id:"patriot_act",title:"USA PATRIOT Act - Surveillance Legalisee",cat:"Gouvernement",mjc:160,votes:456,cred:99,summary:"Loi adoptee 6 semaines apres le 11-Septembre permettant la surveillance de masse des citoyens americains.",tags:["surveillance","terrorisme","libertes civiles"],content:"Le PATRIOT Act (adopte en 45 jours apres le 11/09, sans debate substantiel) a legalise la surveillance de masse: ecoutes sans mandat, acces aux bibliotheques et dossiers medicaux, detention sans charges. La section 215, revele par Snowden, permettait la collecte en masse des metadonnees telephoniques de tous les Americains. Plusieurs sections jugees inconstitutionnelles."},{id:"stuxnet",title:"Stuxnet - La Premiere Cyberarme",cat:"Militaire",mjc:170,votes:512,cred:98,summary:"USA et Israel ont cree le premier ver informatique a detruire physiquement des centrifugeuses iraniennes.",tags:["NSA","Israel","Iran","cyberguerre"],content:"Stuxnet, decouvert en 2010, est le premier malware concu pour causer des dommages physiques: il a sabote et detruit 1000 centrifugeuses d'enrichissement d'uranium iranien a Natanz. Cree conjointement par la NSA et l'Unite 8200 israelienne. Obama en parle dans son autobiographie. Premier acte de cyberguerre entre Etats."},{id:"promis",title:"Logiciel PROMIS - Backdoor CIA",cat:"Gouvernement",mjc:152,votes:412,cred:88,summary:"La CIA aurait insere une backdoor dans un logiciel de gestion judiciaire vendu a des gouvernements etrangers.",tags:["CIA","logiciel","backdoor","Inslaw"],content:"Dans les annees 1980, le DOJ vole le logiciel PROMIS a la societe Inslaw, lui insere une backdoor, puis le vend a des gouvernements etrangers pour espionner leurs systemes judiciaires. Danny Casolaro, journaliste enquetant sur cette affaire, est trouve mort en 1991, officiellement suicide."},{id:"aim",title:"COINTELPRO contre l'AIM",cat:"Gouvernement",mjc:148,votes:389,cred:97,summary:"Le FBI a mene une guerre clandestine contre le Mouvement Indien Americain dans les annees 1970.",tags:["FBI","Indiens Americains","AIM"],content:"Le FBI a cible le American Indian Movement (AIM) avec des techniques COINTELPRO: infiltration d'informateurs, provocations, arrestations fabriquees. Sur la reservation de Pine Ridge (1973-1976), 64 membres AIM sont tues dans des conditions suspectes. Leonard Peltier, condamne sur la base de preuves fabriquees, est toujours emprisonne."},{id:"gladio_b",title:"Gladio B - Reseaux Islamistes post-Guerre Froide",cat:"Militaire",mjc:145,votes:367,cred:85,summary:"L'ex-agente FBI Sibel Edmonds allegue que la NATO maintenait des reseaux islamistes comme successeur de Gladio.",tags:["OTAN","islamisme","Turquie"],content:"L'ex-agente FBI Sibel Edmonds, interdite de temoigner publiquement, allegue l'existence de Gladio B: des reseaux d'islamistes extremistes maintenus par l'OTAN via la Turquie pour usage geopolitique, similairement aux reseaux stay-behind de la Guerre Froide. Allegation partiellement corroboree par des investigateurs europeens."},{id:"business_plot",title:"Business Plot 1933",cat:"Gouvernement",mjc:142,votes:356,cred:90,summary:"Des industriels americains auraient comploté de renverser Roosevelt et instaurer une dictature fasciste.",tags:["Roosevelt","fascisme","Wall Street"],content:"En 1934, le general Smedley Butler temoigne devant le Congres qu'un groupe d'hommes d'affaires (dont des representants de DuPont et Morgan) lui avaient propose de diriger une armee de 500 000 veterans pour renverser Roosevelt et instaurer un gouvernement fasciste. Le comite du Congres confirme l'essentiel. Aucune poursuite."},{id:"merlin",title:"Operation Merlin - Faux Plans Nucleaires",cat:"Gouvernement",mjc:148,votes:389,cred:94,summary:"La CIA a fourni deliberement de faux plans nucleaires a l'Iran, qui contenaient un defaut cache.",tags:["CIA","Iran","nucleaire"],content:"Operation Merlin: en 2000, la CIA utilise un savant nucleaire russe pour remettre a l'Iran des plans defectueux d'une bombe atomique, esperant le faire reculer de 5 ans. Le Russe, realisant les defauts, les signale a l'Iran dans une note jointe. Revele par James Risen du NY Times dans son livre 'State of War' (2006)."},{id:"echelon_eco",title:"ECHELON Economique - Espionnage Industriel",cat:"Surveillance",mjc:155,votes:412,cred:95,summary:"Les USA utilisaient ECHELON pour espionner des entreprises europeennes et avantager des firmes americaines.",tags:["ECHELON","espionnage industriel","Boeing","Airbus"],content:"Le rapport Schmid du Parlement Europeen (2001) documente l'utilisation d'ECHELON pour l'espionnage economique: Airbus perd un contrat de 6 milliards avec l'Arabie Saoudite apres que la NSA intercepte ses communications et transmet a Boeing; Thomson-CSF perd un contrat bresilien de 1,4 milliard au profit de Raytheon."},{id:"extraordinary_rendition",title:"Restitutions Extraordinaires - Vols CIA",cat:"Gouvernement",mjc:162,votes:456,cred:99,summary:"La CIA operait un systeme de transfert de prisonniers vers des pays pratiquant la torture.",tags:["CIA","torture","vols secrets"],content:"Apres le 11 Septembre, la CIA etablit un reseau de vols secrets pour transporter des suspects dans des pays tiers pratiquant la torture (Egypte, Syrie, Maroc), dans ce qu'on appelle les restitutions extraordinaires. Khaled el-Masri, citoyen allemand, enleve par erreur au Macedonia et torture en Afghanistan pendant 5 mois. La CEDH condamne la Macedoine en 2012."}];
