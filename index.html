{id:"paperclip",title:"Opération Paperclip",cat:"Militaire",mjc:175,votes:489,cred:98,summary:"1 600 scientifiques nazis recrutés secrètement par les USA après la guerre pour leurs programmes.",tags:["CIA","Militaire"],content:"À partir de 1945, les États-Unis recrutent secrètement plus de 1 600 scientifiques, ingénieurs et techniciens nazis dans le cadre de l'Opération Paperclip. Parmi eux : Wernher von Braun (directeur du programme Apollo), Kurt Blome (expériences biologiques sur des prisonniers de Dachau), et Georg Rickhey (travail forcé dans des usines souterraines). Les dossiers criminels sont modifiés pour effacer leurs affiliations nazies. Déclassifié dans les années 1990."},
{id:"mockingbird",title:"Opération Mockingbird",cat:"Medias",mjc:200,votes:556,cred:94,summary:"La CIA infiltre les grands médias américains pour contrôler l'information au profit de ses opérations.",tags:["CIA","Médias"],content:"Depuis les années 1950, la CIA recrute des journalistes et rédacteurs dans les plus grands médias américains — New York Times, Washington Post, CBS, Time Magazine, Newsweek. Ces agents diffusent des informations favorables aux opérations de la CIA et enterrent des articles gênants. Révélé lors des auditions du Comité Church en 1975. Le directeur de la CIA William Colby confirme que plus de 400 journalistes travaillaient pour l'agence à titre de correspondants ou de rédacteurs."},
{id:"ajax",title:"Opération Ajax — Coup Iran 1953",cat:"Gouvernement",mjc:195,votes:677,cred:99,summary:"La CIA et le MI6 renversent le Premier ministre démocratiquement élu d'Iran pour protéger le pétrole.",tags:["CIA","Iran"],content:"En août 1953, la CIA (Opération Ajax) et le MI6 britannique (Opération Boot) orchestrent le coup d'État qui renverse Mohammed Mossadegh, Premier ministre iranien démocratiquement élu qui avait nationalisé le pétrole iranien. Des agents CIA distribuent de l'argent pour acheter des manifestants et des militaires. Le Shah Mohammad Reza Pahlavi, pro-occidental, est réinstallé. La CIA reconnaît officiellement son rôle dans un document déclassifié publié en août 2013."},
{id:"condor",title:"Opération Condor",cat:"Gouvernement",mjc:215,votes:592,cred:97,summary:"Réseau CIA de 6 dictatures sud-américaines pour traquer et éliminer des opposants politiques.",tags:["CIA","Amérique du Sud"],content:"De 1975 à 1983, la CIA coordonne un réseau entre les dictatures militaires d'Argentine, du Chili, de l'Uruguay, du Paraguay, de la Bolivie et du Brésil pour traquer, torturer et éliminer des opposants politiques à travers les frontières. Estimations : 60 000 morts, 400 000 prisonniers politiques. Des documents déclassifiés en 2000 et 2016 prouvent l'implication directe de Henry Kissinger, secrétaire d'État, qui donne son feu vert opérationnel."},
{id:"echelon",title:"Réseau ECHELON",cat:"Surveillance",mjc:185,votes:423,cred:97,summary:"Réseau de surveillance mondiale des communications opéré par 5 pays depuis les années 1960.",tags:["NSA","GCHQ","Surveillance"],content:"Depuis les années 1960, les États-Unis, le Royaume-Uni, le Canada, l'Australie et la Nouvelle-Zélande opèrent ECHELON, un réseau mondial d'interception des communications satellites, télex et téléphones. Stations d'interception dans plus de 120 pays. Confirmé officiellement par un rapport du Parlement européen en 2001, qui conclut également qu'ECHELON est utilisé pour de l'espionnage économique au profit des entreprises américaines et britanniques."},
{id:"irancontra",title:"Affaire Iran-Contra",cat:"Gouvernement",mjc:190,votes:745,cred:99,summary:"L'administration Reagan vend des armes à l'Iran sous embargo pour financer illégalement des guérilleros.",tags:["CIA","Reagan"],content:"De 1985 à 1986, des membres de l'administration Reagan vendent secrètement des armes à l'Iran (sous embargo américain) et utilisent les profits pour financer les Contras nicaraguayens en violation d'une loi du Congrès (Amendement Boland). Le lieutenant-colonel Oliver North coordonne l'opération depuis le Conseil de sécurité nationale. L'affaire éclate en novembre 1986. 14 membres de l'administration sont inculpés. Reagan prétend ne pas être au courant, puis admet avoir approuvé les livraisons."},
{id:"vault7",title:"Vault 7 — Arsenal CIA",cat:"Surveillance",mjc:200,votes:534,cred:98,summary:"WikiLeaks publie 8 761 documents sur l'arsenal de hacking de la CIA : smartphones, TV, voitures.",tags:["CIA","WikiLeaks","Hacking"],content:"En mars 2017, WikiLeaks publie Vault 7, la plus grande fuite de données de l'histoire de la CIA. 8 761 documents révèlent que la CIA dispose d'outils pour pirater iPhones, Android, smart TV Samsung (allumées en mode éteint pour écouter), ordinateurs Windows, Linux et macOS, et même les systèmes de navigation des voitures connectées. La CIA peut également usurper la signature électronique d'autres services de renseignement pour dissimuler ses cyberattaques."},
{id:"cambridge",title:"Cambridge Analytica",cat:"Surveillance",mjc:175,votes:867,cred:99,summary:"87 millions de profils Facebook utilisés pour manipuler les élections américaines et le Brexit.",tags:["Facebook","Données","Élections"],content:"Cambridge Analytica collecte illégalement les données personnelles de 87 millions d'utilisateurs Facebook via une application de quiz tierce. Ces profils psychologiques détaillés permettent de cibler des électeurs indécis avec des messages de peur personnalisés lors de la campagne Trump 2016 et du référendum Brexit. Révélé par le lanceur d'alerte Christopher Wylie au Guardian en mars 2018. Facebook écope d'une amende de 5 milliards de dollars de la FTC."},
{id:"xkeyscore",title:"XKeyscore — NSA",cat:"Surveillance",mjc:195,votes:468,cred:98,summary:"La NSA peut accéder en temps réel à l'intégralité de la vie numérique de n'importe quel internaute.",tags:["NSA","Snowden"],content:"XKeyscore est un programme NSA qui indexe et analyse en quasi-temps réel les données internet mondiales : emails, historiques de navigation, recherches Google, chats, activités sur les réseaux sociaux. Un analyste peut accéder à l'historique complet d'un individu avec un simple formulaire interne, sans autorisation judiciaire préalable. Selon les documents Snowden, XKeyscore collectait 41 milliards d'enregistrements en un seul mois en 2012."},
{id:"watergate",title:"Scandale Watergate",cat:"Gouvernement",mjc:185,votes:934,cred:100,summary:"Nixon autorise l'espionnage de ses adversaires politiques. Premier président américain à démissionner.",tags:["Nixon","FBI"],content:"Le 17 juin 1972, cinq hommes liés au Comité pour la réélection du Président sont arrêtés en train d'installer des micros au siège du Parti démocrate, dans l'hôtel Watergate à Washington. Les enquêtes du Washington Post (Bob Woodward et Carl Bernstein) et du Congrès révèlent que Nixon a personnellement autorisé et supervisé l'opération d'espionnage, puis ordonné son camouflage. Les enregistrements secrets de la Maison Blanche le prouvent. Nixon démissionne le 9 août 1974."},
{id:"seasray",title:"Opération Sea Spray",cat:"Medical",mjc:170,votes:298,cred:97,summary:"L'armée américaine répand des bactéries sur San Francisco à l'insu des 800 000 habitants.",tags:["Militaire","Santé"],content:"En septembre 1950, l'armée américaine mène l'Opération Sea Spray : des navires militaires répandent pendant 6 jours des bactéries (Serratia marcescens et Bacillus globigii) au-dessus de San Francisco pour tester la vulnérabilité de la ville à une attaque biologique soviétique. Des centaines d'habitants sont contaminés. Un patient immunodéprimé hospitalisé, Edward Nevin, meurt d'une infection à Serratia. La famille attaque l'État en 1981. L'armée reconnaît les faits en 1977 devant le Sénat."},
{id:"projet112",title:"Projet 112 — Tests chimiques sur soldats",cat:"Medical",mjc:175,votes:234,cred:97,summary:"Le Pentagone teste des agents chimiques et biologiques sur des milliers de soldats sans consentement.",tags:["Militaire","Santé"],content:"De 1963 à 1969, le Projet 112 expose des milliers de militaires américains à des agents chimiques (VX, sarin, gaz moutarde) et biologiques lors d'exercices présentés comme normaux. L'opération SHAD (Shipboard Hazard and Defense) test ces agents depuis des navires militaires sur des équipages. Le Pentagone reconnaît officiellement l'existence du programme en 2002 après 30 ans de déni total, suite aux plaintes de vétérans malades."},
{id:"bcci",title:"Scandale BCCI",cat:"Finance",mjc:220,votes:287,cred:96,summary:"La banque des cartels, terroristes et services secrets. 23 milliards de fraudes dans 73 pays.",tags:["Finance","CIA","Blanchiment"],content:"La Bank of Credit and Commerce International est utilisée simultanément par la CIA pour financer des opérations secrètes, par les cartels colombiens pour blanchir des milliards, par Saddam Hussein, par Manuel Noriega et par des réseaux terroristes. Présente dans 73 pays avec 400 succursales. Fermée par les régulateurs mondiaux en juillet 1991 après la révélation de fraudes pour 23 milliards de dollars. Le sénateur John Kerry dirige une enquête qui conclut que la CIA avait connaissance des activités criminelles."},
{id:"church",title:"Rapport Church — 1975",cat:"Gouvernement",mjc:160,votes:312,cred:99,summary:"Le Sénat américain révèle 40 ans d'abus de la CIA, NSA et FBI : assassinats, coups d'État, torture.",tags:["CIA","FBI","NSA","Sénat"],content:"Le Comité Church, présidé par le sénateur Frank Church, publie en 1975 un rapport en 14 volumes documentant les abus des agences américaines depuis 1936 : plans d'assassinat contre Fidel Castro, Patrice Lumumba, Rafael Trujillo ; surveillance illégale de MLK ; expériences MKUltra ; infiltration de groupes politiques ; manipulation des élections étrangères. La commission conclut que la CIA avait opéré comme un État dans l'État, sans contrôle démocratique."},
{id:"minaret",title:"Projet MINARET — NSA",cat:"Surveillance",mjc:180,votes:267,cred:97,summary:"La NSA surveille illégalement MLK, Muhammad Ali, Jane Fonda et des journalistes américains.",tags:["NSA","FBI"],content:"De 1967 à 1973, la NSA surveille illégalement les communications d'Américains figurant sur une liste secrète établie par le FBI et la CIA. Parmi les cibles : Martin Luther King, Muhammad Ali, Jane Fonda, des sénateurs américains et des journalistes. Aucune autorisation judiciaire. Les rapports sont partagés directement avec la Maison Blanche. Révélé lors des auditions du Comité Church en 1975. Le directeur de la NSA Lew Allen reconnaît que le programme était vraisemblablement illégal."},
{id:"jfkfiles",title:"Dossiers JFK — Déclassification",cat:"Gouvernement",mjc:210,votes:1243,cred:85,summary:"Après 60 ans de secret, les documents révèlent des contacts CIA-Oswald délibérément cachés.",tags:["CIA","FBI","Assassinat"],content:"L'assassinat de Kennedy le 22 novembre 1963 est officiellement attribué à Lee Harvey Oswald, lui-même assassiné 48 heures plus tard. La commission Warren conclut à un tireur isolé. Depuis 1992, la loi JFK Records impose la déclassification des archives. En 2022-2023, Biden libère des milliers de pages révélant : des contacts réguliers entre Oswald et la CIA dans les mois précédant l'assassinat, une surveillance de la CIA sur Oswald au Mexique non communiquée à la commission Warren, et des informations délibérément retenues aux enquêteurs."},
{id:"patriotact",title:"USA PATRIOT Act",cat:"Surveillance",mjc:155,votes:589,cred:99,summary:"Voté 45 jours après le 11/09 : autorise la surveillance de masse sans mandat judiciaire.",tags:["NSA","Gouvernement"],content:"Le PATRIOT Act est signé par George W. Bush le 26 octobre 2001, soit 45 jours après le 11 septembre — délai insuffisant pour une lecture sérieuse du texte de 342 pages par la majorité des élus. Il donne à la NSA, FBI et CIA des pouvoirs sans précédent : écoutes sans mandat spécifique, accès aux dossiers bancaires et médicaux, surveillance des communications étrangères et domestiques. La section 215 autorise la collecte en masse des métadonnées téléphoniques de l'ensemble des citoyens américains — révélée par Snowden en 2013 et déclarée illégale par un tribunal fédéral en 2020."},
{id:"pbsuccess",title:"Opération PBSUCCESS — Coup Guatemala",cat:"Gouvernement",mjc:185,votes:445,cred:99,summary:"La CIA renverse le président démocratique du Guatemala pour protéger les intérêts de United Fruit.",tags:["CIA","Amérique Latine"],content:"En 1954, la CIA organise le coup d'État contre Jacobo Árbenz, président démocratiquement élu du Guatemala, après qu'il tente de nationaliser des terres appartenant à la United Fruit Company (liée à la CIA via son directeur Allen Dulles et son frère John Foster Dulles, secrétaire d'État). L'opération PBSUCCESS comprend désinformation, attaques aériennes simulées et mercenaires. Déclenche 40 ans de guerre civile. La CIA reconnaît sa responsabilité dans un document déclassifié en 1997."},
{id:"tonkin",title:"Incident du Golfe du Tonkin",cat:"Faux Drapeau",mjc:200,votes:723,cred:99,summary:"L'attaque qui a justifié la guerre du Vietnam n'a jamais eu lieu. Fabriquée de toutes pièces.",tags:["Militaire","Faux Drapeau"],content:"Le 4 août 1964, l'administration Johnson affirme que des destroyers américains ont été attaqués par des torpilleurs nord-vietnamiens dans le Golfe du Tonkin. Cet incident sert de prétexte au Congrès pour voter la résolution autorisant l'entrée en guerre au Vietnam. Des documents déclassifiés par la NSA en 2005 et les mémoires de Robert McNamara confirment que la seconde attaque n'a jamais eu lieu. Les opérateurs radio avaient mal interprété leurs propres échos radar. 58 000 soldats américains et 2 millions de Vietnamiens morts."},
{id:"phoenix",title:"Programme Phoenix — Vietnam",cat:"Militaire",mjc:195,votes:389,cred:97,summary:"Programme CIA d'assassinats ciblés au Vietnam : 20 000 à 40 000 civils éliminés.",tags:["CIA","Vietnam"],content:"De 1965 à 1972, le Programme Phoenix est coordonné par la CIA pour identifier et neutraliser l'infrastructure politique du Viet Cong. Les méthodes officiellement documentées incluent : arrestations arbitraires, tortures, assassinats extrajudiciaires. Estimations officielles du gouvernement américain : 20 587 morts. Estimations indépendantes : jusqu'à 40 000 civils tués, dont beaucoup n'avaient aucun lien avec le Viet Cong. William Colby, directeur du programme, témoigne devant le Congrès en 1971."},
{id:"guatemala46",title:"Expériences Guatemala 1946-1948",cat:"Medical",mjc:225,votes:534,cred:100,summary:"Des chercheurs américains infectent délibérément des Guatémaltèques avec la syphilis et la gonorrhée.",tags:["Gouvernement","Santé"],content:"De 1946 à 1948, des chercheurs du Service de santé publique américain infectent délibérément 1 308 Guatémaltèques — prisonniers, soldats, patients psychiatriques et orphelins — avec la syphilis, la gonorrhée et le chancre mou, sans leur consentement. L'objectif : tester l'efficacité de la pénicilline. Ces expériences sont menées en secret et ne sont révélées que par la chercheuse Susan Reverby en 2010. Le président Obama présente des excuses officielles au Guatemala. Une action en justice est intentée contre le gouvernement américain."},
{id:"cyclone",title:"Opération Cyclone — Afghanistan",cat:"Militaire",mjc:190,votes:612,cred:99,summary:"La CIA finance et arme les moudjahidines afghans, dont Oussama Ben Laden, contre l'URSS.",tags:["CIA","Afghanistan"],content:"De 1979 à 1989, la CIA conduit l'Opération Cyclone : le plus grand et le plus coûteux programme d'action secrète de l'histoire américaine. Des milliards de dollars en armes et financement sont acheminés vers les groupes islamistes moudjahidines afghans pour combattre l'invasion soviétique. Oussama Ben Laden et le réseau Al-Qaïda sont formés et équipés dans ce cadre, avec l'aide des services secrets pakistanais. Zbigniew Brzezinski confirme en 1998 que l'opération avait été lancée avant l'invasion soviétique pour la provoquer."},
{id:"stuxnet",title:"Stuxnet — Arme Cyber USA-Israël",cat:"Surveillance",mjc:205,votes:489,cred:98,summary:"Premier virus d'État connu : sabote les centrifugeuses nucléaires iraniennes sans déclaration de guerre.",tags:["NSA","Israël","Iran","Hacking"],content:"Stuxnet est un ver informatique découvert en 2010, conçu conjointement par la NSA américaine et l'Unité 8200 israélienne. Il infecte les systèmes de contrôle industriel Siemens des centrifugeuses d'enrichissement d'uranium de Natanz (Iran) et les détruit progressivement tout en affichant des données normales aux opérateurs. Considéré comme la première arme cyber déployée par des États contre une infrastructure civile. Le New York Times confirme l'opération en 2012. Aucun pays ne l'admet officiellement."},
{id:"torture",title:"Programme de Torture CIA — post-2001",cat:"Gouvernement",mjc:215,votes:678,cred:100,summary:"Le Sénat américain documente officiellement la torture systématique de prisonniers par la CIA.",tags:["CIA","Torture","Droits humains"],content:"Après le 11 septembre 2001, la CIA met en place un programme d'interrogatoires dits EIT (Enhanced Interrogation Techniques) : noyade simulée (waterboarding), privation de sommeil jusqu'à 180 heures, confinement en boîte, coups, enveloppement dans des couvertures glacées. Le rapport du Sénat américain (SSCI) de 600 pages, rendu public en 2014, conclut que ces techniques constituent de la torture, qu'elles n'ont fourni aucune information utile pour prévenir des attentats, et que la CIA a systématiquement menti au Congrès et à la Maison Blanche sur l'efficacité du programme."},
{id:"rendition",title:"Restitutions Extraordinaires CIA",cat:"Gouvernement",mjc:200,votes:456,cred:100,summary:"La CIA enlève et transfère des suspects vers des pays pratiquant la torture, contournant le droit américain.",tags:["CIA","Torture"],content:"Après 2001, la CIA crée un réseau de transferts clandestins : des suspects sont enlevés dans des pays tiers et transférés vers des pays pratiquant la torture (Egypte, Syrie, Jordanie, Maroc, Ouzbékistan) ou vers des prisons secrètes CIA (black sites) en Pologne, Roumanie, Lituanie et Thaïlande. La Cour européenne des droits de l'homme condamne plusieurs pays européens pour complicité. Des documents déclassifiés confirment l'existence de 54 pays coopérants. Au moins 136 personnes transférées, dont certaines s'avèrent innocentes."},
{id:"menu",title:"Opération Menu — Cambodge",cat:"Militaire",mjc:180,votes:334,cred:99,summary:"Nixon bombarde secrètement le Cambodge pendant 14 mois sans en informer le Congrès ni le peuple.",tags:["Nixon","Militaire","Vietnam"],content:"De mars 1969 à mai 1970, l'administration Nixon ordonne secrètement 3 630 bombardements sur le Cambodge neutre, larguant 110 000 tonnes de bombes — sans en informer le Congrès, le peuple américain, ni même la majorité de l'état-major. Les rapports officiels mentionnent des cibles au Vietnam du Sud. L'opération est révélée par le New York Times en mai 1969, mais Nixon la nie. Un émetteur radar secret au Cambodge permet de guider les bombes. Révélé officiellement lors des audiences du Watergate en 1973."},
{id:"radiation",title:"Expériences de Radiation sur des civils",cat:"Medical",mjc:210,votes:412,cred:100,summary:"De 1944 à 1974, le gouvernement US irradie des milliers de civils sans consentement pour l'effort nucléaire.",tags:["Gouvernement","Santé","Nucléaire"],content:"De 1944 à 1974, le gouvernement américain conduit au moins 4 000 expériences d'irradiation sur des civils non consentants : injection de plutonium à des malades hospitalisés, exposition de prisonniers aux rayonnements, irradiation d'enfants handicapés, tests sur des soldats après les essais nucléaires. Une commission présidentielle (ACHRE) révèle l'ampleur des faits en 1994. Le président Clinton présente des excuses officielles en 1995 et crée un fonds d'indemnisation."},
{id:"shamrock",title:"Projet SHAMROCK — NSA",cat:"Surveillance",mjc:175,votes:289,cred:98,summary:"La NSA intercepte tous les télégrammes internationaux entrant et sortant des USA pendant 30 ans.",tags:["NSA","Surveillance"],content:"De 1945 à 1975, la NSA obtient la coopération secrète de trois grandes compagnies de télégraphes américaines (Western Union, ITT, RCA Global) pour accéder à l'intégralité des télégrammes internationaux traversant les USA — environ 150 000 messages par mois à partir des années 1960. Le programme est révélé par les auditions du Comité Church. Le directeur de la NSA Lew Allen le qualifie lui-même de probablement illégal. Le programme est stoppé en mai 1975, la veille de la publication du rapport."},
{id:"businessplot",title:"Business Plot — Coup contre Roosevelt",cat:"Gouvernement",mjc:185,votes:267,cred:94,summary:"Des industriels américains recrutent le général Butler pour renverser Roosevelt et instaurer un régime fasciste.",tags:["Finance","Gouvernement","Fascisme"],content:"En 1933-1934, un groupe d'industriels et de financiers américains (dont des représentants de JP Morgan, DuPont et Remington Arms) approchent le général Smedley Butler pour recruter une armée de 500 000 vétérans et renverser le président Roosevelt, à l'image des coups fascistes en Europe. Butler refuse et témoigne devant le Congrès en novembre 1934. Le comité confirme la réalité du complot mais aucune inculpation n'est prononcée contre les commanditaires. Butler déclare ensuite que la guerre est un racket."},
{id:"timbersycamore",title:"Opération Timber Sycamore — Syrie",cat:"Militaire",mjc:195,votes:378,cred:98,summary:"La CIA arme secrètement des groupes armés syriens pour 1 milliard de dollars par an.",tags:["CIA","Syrie"],content:"De 2012 à 2017, la CIA conduit l'Opération Timber Sycamore : le plus grand programme d'armement secret depuis la Guerre froide. Plus d'un milliard de dollars par an en armes, financement et formation acheminés vers des groupes armés opposés à Assad en Syrie, via la Jordanie, la Turquie et l'Arabie Saoudite. Une partie de ces armes se retrouve entre les mains de groupes jihadistes dont Jabhat al-Nusra (branche d'Al-Qaïda). Trump met fin au programme en 2017. Confirmé par le Washington Post et des documents déclassifiés."},
{id:"stellarwind",title:"STELLARWIND — NSA post-11/09",cat:"Surveillance",mjc:185,votes:434,cred:99,summary:"La NSA surveille illégalement les communications des citoyens américains dès 2001, sans mandat.",tags:["NSA","Gouvernement"],content:"Lancé par Bush/Cheney immédiatement après le 11 septembre 2001, STELLARWIND autorise la NSA à surveiller les communications téléphoniques et emails de citoyens américains sans aucun mandat judiciaire, en violation directe du Foreign Intelligence Surveillance Act (FISA). Le programme est tenu secret même aux membres du Congrès. Des analystes de la NSA s'opposent en interne, deux responsables du DOJ (dont le procureur général adjoint James Comey) menacent de démissionner. Partiellement révélé par USA Today en 2006, confirmé par les documents Snowden en 2013."},
{id:"schoolamericas",title:"École des Amériques",cat:"Militaire",mjc:190,votes:512,cred:99,summary:"Les USA forment les bourreaux et tortionnaires des dictatures latino-américaines depuis 1946.",tags:["CIA","Militaire","Amérique Latine"],content:"Fondée en 1946 au Panama, l'École des Amériques (SOA) forme des militaires de toute l'Amérique latine aux techniques de contre-insurrection, interrogatoire et opérations psychologiques. Des documents déclassifiés en 1996 révèlent que les manuels d'enseignement recommandent explicitement la torture, les exécutions et les menaces contre des proches. Parmi les anciens élèves : Manuel Noriega, les généraux responsables du massacre d'El Mozote (El Salvador, 900 morts), et des dizaines d'officiers condamnés pour crimes contre l'humanité. Renommée WHINSEC en 2001."},
{id:"abugraib",title:"Tortures Abu Ghraib",cat:"Militaire",mjc:195,votes:891,cred:100,summary:"Des soldats américains torturent et humilient systématiquement des prisonniers irakiens en 2003-2004.",tags:["Militaire","Torture","Iraq"],content:"Entre 2003 et 2004, des membres de la 372e compagnie de Police Militaire américaine torturent et humilient systématiquement des prisonniers irakiens à la prison d'Abu Ghraib. Les méthodes incluent : nudité forcée, pyramides humaines, simulations d'électrocution, agressions sexuelles, mise en laisse. Des centaines de photos prouvent les faits. CBS News les publie en avril 2004. Le Pentagone avait connaissance des abus depuis janvier 2004. 11 soldats condamnés, aucun officier supérieur poursuivi. Le Sénat confirme l'existence d'une politique de torture institutionnalisée."},
{id:"panamas",title:"Panama Papers",cat:"Finance",mjc:210,votes:1567,cred:100,summary:"11,5 millions de documents révèlent comment les élites mondiales cachent leur argent dans des paradis fiscaux.",tags:["Finance","Paradis Fiscal","Élites"],content:"En avril 2016, le Consortium international de journalistes d'investigation publie 11,5 millions de documents du cabinet panaméen Mossack Fonseca, révélant comment 140 dirigeants politiques, 12 chefs d'État et des milliers de milliardaires cachent leur argent via des sociétés offshore. Parmi les personnalités citées : Vladimir Poutine (via des proches), le premier ministre islandais (démissionne en 48h), des proches de Xi Jinping, Petro Porochenko. La fuite représente 2,6 teraoctets de données, la plus grande de l'histoire du journalisme."},
{id:"libor",title:"Scandale LIBOR",cat:"Finance",mjc:200,votes:345,cred:100,summary:"Les plus grandes banques mondiales manipulent le taux d'intérêt de référence de 350 000 milliards de dollars.",tags:["Finance","Banques"],content:"Le LIBOR (London Interbank Offered Rate) est le taux d'intérêt de référence mondial utilisé pour 350 000 milliards de dollars de produits financiers — prêts immobiliers, obligations, swaps. À partir de 2012, il est révélé que Barclays, Deutsche Bank, UBS, JPMorgan, Citigroup et d'autres grandes banques manipulaient quotidiennement ce taux depuis 2003 pour réaliser des profits sur leurs positions de trading. Amendes cumulées : plus de 9 milliards de dollars. Aucun dirigeant bancaire n'est incarcéré dans les pays anglo-saxons."},
{id:"fiveeyes",title:"Alliance Five Eyes",cat:"Surveillance",mjc:175,votes:398,cred:99,summary:"USA, UK, Canada, Australie et NZ partagent toutes leurs données de surveillance pour contourner les lois nationales.",tags:["NSA","GCHQ","Surveillance"],content:"L'alliance Five Eyes, héritière du pacte UKUSA de 1946, est un accord de partage total du renseignement entre USA (NSA), Royaume-Uni (GCHQ), Canada (CSE), Australie (ASD) et Nouvelle-Zélande (GCSB). Chaque pays surveille les citoyens des autres, puis partage les données — contournant ainsi les lois qui interdisent à chaque service d'espionner ses propres ressortissants. Les documents Snowden confirment que GCHQ récoltait 600 millions d'événements téléphoniques par jour via les câbles sous-marins atlantiques."},
{id:"edgewood",title:"Programme Edgewood Arsenal",cat:"Medical",mjc:175,votes:267,cred:98,summary:"L'armée US teste des agents chimiques (sarin, LSD, BZ) sur 7 000 soldats sans consentement éclairé.",tags:["Militaire","Santé"],content:"De 1955 à 1975, l'armée américaine expose environ 7 000 soldats volontaires à plus de 250 agents chimiques au centre de recherche d'Edgewood (Maryland), sans leur révéler la nature exacte des substances testées. Parmi les agents : sarin, LSD, BZ (agent incapacitant), gaz moutarde, PCP. De nombreux vétérans subissent des séquelles neurologiques permanentes. La commission des anciens combattants reconnaît le programme en 1994. Un tribunal fédéral autorise en 2009 une action collective des vétérans contre l'armée."},
{id:"colby",title:"Famille de Bijoux — Révélations CIA",cat:"Gouvernement",mjc:165,votes:213,cred:97,summary:"Le directeur de la CIA divulgue au Congrès 693 pages d'abus secrets : assassinats, coups d'État, mail opening.",tags:["CIA","Sénat"],content:"En décembre 1974, le journaliste Seymour Hersh révèle dans le New York Times que la CIA a conduit depuis les années 1950 une vaste opération d'espionnage intérieur illégale (MHCHAOS). Le directeur de la CIA William Colby décide de coopérer avec le Congrès et remet un dossier de 693 pages surnommé la Family Jewels, documentant les crimes de l'agence : plans d'assassinat contre Castro, Lumumba et d'autres dirigeants, tests de drogues sur des citoyens, ouverture illégale du courrier de 215 000 personnes, opérations paramilitaires non autorisées. Le document est partiellement déclassifié en 2007."},
{id:"unit731",title:"Unité 731 — Expériences Japon & Couverture US",cat:"Medical",mjc:235,votes:789,cred:99,summary:"Le Japon expérimente sur 10 000 prisonniers. Les USA couvrent les crimes en échange des données scientifiques.",tags:["Militaire","Japon","Santé"],content:"De 1937 à 1945, l'Unité 731 de l'armée japonaise conduit des expériences biologiques et chimiques sur au moins 10 000 prisonniers (Chinois, Coréens, Soviétiques, Américains) à Pingfang, Mandchourie. Vivisections sans anesthésie, injections de peste et choléra, expositions au froid jusqu'à la gangrène, tests de pression atmosphérique. À la fin de la guerre, les USA accordent l'immunité totale au général Shirō Ishii et à son équipe en échange de l'intégralité des données scientifiques — qui alimentent le programme d'armes biologiques américain. Aucune poursuite judiciaire."},
{id:"bullrun",title:"BULLRUN — NSA affaiblit le chiffrement mondial",cat:"Surveillance",mjc:215,votes:512,cred:99,summary:"La NSA et le GCHQ sabotent délibérément les standards de chiffrement pour pouvoir tout lire.",tags:["NSA","GCHQ","Chiffrement"],content:"BULLRUN (NSA) et EDGEHILL (GCHQ) sont des programmes classifiés révélés par Snowden en 2013. La NSA a délibérément introduit des backdoors dans des standards de chiffrement commerciaux, versé 10 millions de dollars à RSA Security pour adopter un générateur de nombres aléatoires défectueux (Dual EC DRBG), et collaboré avec des fabricants de puces pour affaiblir le chiffrement matériel. En rendant le chiffrement mondial volontairement cassable, la NSA peut déchiffrer des communications que des milliards d'utilisateurs croyaient sécurisées."},
{id:"muscular",title:"MUSCULAR — NSA dans les data centers Google",cat:"Surveillance",mjc:200,votes:445,cred:99,summary:"La NSA et le GCHQ interceptent les données de Google et Yahoo directement dans leurs câbles internes.",tags:["NSA","GCHQ","Google"],content:"Révélé par Snowden en octobre 2013 : la NSA et le GCHQ avaient secrètement accédé aux liens de communications internes de Google et Yahoo — les câbles reliant leurs data centers à travers le monde — et aspiraient l'intégralité du trafic. Contrairement à PRISM (coopération légale), MUSCULAR était une interception non autorisée des sociétés elles-mêmes. Google et Yahoo déclarent avoir appris l'existence du programme par la presse. En un mois, la NSA recueillait 181 millions d'enregistrements via ce canal."},
{id:"tempora",title:"Tempora — GCHQ et les câbles sous-marins",cat:"Surveillance",mjc:190,votes:389,cred:99,summary:"Le GCHQ intercepte physiquement 200 câbles de fibre optique transatlantiques et stocke toutes les données.",tags:["GCHQ","Surveillance","UK"],content:"Révélé par Snowden en juin 2013 : le GCHQ britannique a secrètement connecté des capteurs à plus de 200 câbles de fibre optique transatlantiques avec la coopération des opérateurs télécom (sous coercition légale). En 2012, le système Tempora permet d'intercepter 21 pétaoctets de données par jour — soit 192 fois la quantité totale d'informations stockées dans la Bibliothèque du Congrès américain. Les données sont stockées 3 jours pour le contenu et 30 jours pour les métadonnées. Partagées avec la NSA."},
{id:"jtrig",title:"JTRIG — GCHQ manipulation de l'opinion en ligne",cat:"Surveillance",mjc:185,votes:312,cred:98,summary:"Le GCHQ opère une unité secrète pour manipuler l'opinion, détruire des réputations et fabriquer du faux.",tags:["GCHQ","Désinformation","UK"],content:"Le Joint Threat Research Intelligence Group (JTRIG) est une unité du GCHQ révélée par Snowden. Ses missions documentées incluent : créer de faux comptes sur les réseaux sociaux, publier de la désinformation pour discréditer des cibles, infiltrer des groupes en ligne, manipuler les votes sur des sondages, envoyer de faux emails de la part de cibles pour détruire leur réputation, et corrompre des données informatiques d'adversaires. Les documents confirment que ces opérations ciblent des civils, pas seulement des terroristes."},
{id:"cameronmk",title:"Ewen Cameron — MKUltra à McGill",cat:"Medical",mjc:195,votes:367,cred:98,summary:"Un psychiatre financé par la CIA détruit la mémoire de patients pour créer une personnalité de zéro.",tags:["CIA","MKUltra","Canada"],content:"De 1957 à 1964, le Dr Ewen Cameron, directeur de l'Institut psychiatrique Allan Memorial à Montréal (McGill), est financé par la CIA via des organismes de façade pour conduire des expériences de psychic driving : il plonge ses patients dans un sommeil artificiel pendant des semaines, leur diffuse des messages en boucle (jusqu'à 500 000 fois), les soumet à des électrochocs massifs et à des déprivations sensorielles prolongées — pour effacer leur personnalité et la reconstruire. Des dizaines de Canadiens ont subi des dommages cérébraux irréversibles. Le gouvernement canadien indemnise les victimes en 1992."},
{id:"wmd_iraq",title:"Mensonge des ADM irakiennes",cat:"Faux Drapeau",mjc:210,votes:1456,cred:100,summary:"Colin Powell présente de fausses preuves d'armes de destruction massive à l'ONU pour justifier la guerre.",tags:["CIA","Iraq","Faux Drapeau"],content:"Le 5 février 2003, le secrétaire d'État Colin Powell présente au Conseil de sécurité de l'ONU des preuves — photos satellites, interceptionsaudio, tubes d'aluminium — affirmant qu'Iraq possède des armes biologiques et chimiques actives. Des analystes de la CIA avertissent en interne que les preuves sont douteuses. La Maison Blanche écarte ces avertissements. Aucune arme n'est trouvée après l'invasion. La commission Chilcot (UK, 2016) et le rapport Robb-Silberman (US, 2005) concluent que les renseignements ont été délibérément biaisés. Powell dira avant sa mort en 2021 que cette présentation était une honte."},
{id:"pentagon_papers",title:"Pentagon Papers — McNamara ment sur Vietnam",cat:"Gouvernement",mjc:190,votes:678,cred:100,summary:"Un rapport secret de 7 000 pages prouve que le gouvernement mentait au peuple américain sur le Vietnam depuis 1945.",tags:["Militaire","Gouvernement","Vietnam"],content:"En juin 1971, l'analyste Daniel Ellsberg publie via le New York Times les Pentagon Papers : une étude secrète de 7 000 pages commandée par McNamara prouvant que les administrations Truman, Eisenhower, Kennedy et Johnson ont délibérément menti au peuple et au Congrès américains sur l'ampleur de l'engagement au Vietnam. Chaque administration savait que la guerre ne pouvait pas être gagnée mais continuait pour ne pas perdre la face. Nixon tente de bloquer la publication. La Cour Suprême autorise la publication. Ellsberg est inculpé pour espionnage, le procès est annulé pour abus gouvernemental."},
{id:"plameaffair",title:"Affaire Plame — CIA outed par la Maison Blanche",cat:"Gouvernement",mjc:175,votes:489,cred:100,summary:"La Maison Blanche révèle l'identité d'une agente CIA sous couverture pour punir son mari journaliste.",tags:["CIA","Bush","Irak"],content:"En juillet 2003, la Maison Blanche de George W. Bush fait fuiter l'identité de Valerie Plame, agente de la CIA sous couverture travaillant sur la prolifération nucléaire, pour se venger de son mari Joseph Wilson. Wilson avait publiquement démenti les allégations de Bush sur l'uranium nigérien. Cette révélation brise des années de couverture et compromet l'ensemble de son réseau. Lewis Libby, chef de cabinet de Cheney, est condamné en 2007 pour parjure et obstruction. Bush commue sa peine. Obama refuse de le gracier. Trump le gracie finalement en 2018."},
{id:"room641a",title:"Salle 641A — NSA dans AT&T",cat:"Surveillance",mjc:185,votes:423,cred:100,summary:"La NSA installe secrètement une salle d'interception dans le siège d'AT&T pour copier tout le trafic internet.",tags:["NSA","AT&T","Surveillance"],content:"En 2006, le technicien AT&T Mark Klein révèle l'existence de la salle 641A dans le siège de la compagnie à San Francisco. Cette pièce secrète, accessible uniquement aux agents habilités NSA, contient un dispositif Narus STA 6400 capable de copier et analyser en temps réel l'intégralité du trafic internet transitant par AT&T — soit des pétaoctets quotidiens. Des équipements similaires ont été installés dans au moins 15 autres nœuds internet majeurs américains. Le programme est confirmé par les documents Snowden en 2013. AT&T nie toute coopération volontaire."},
{id:"cointelpro_aim",title:"COINTELPRO contre l'AIM",cat:"Gouvernement",mjc:185,votes:312,cred:97,summary:"Le FBI détruit le Mouvement amérindien par infiltration, criminalisation et meurtres d'activistes.",tags:["FBI","Amérindiens"],content:"De 1970 à 1979, le FBI conduit une campagne intensive contre l'American Indian Movement (AIM), mouvement de défense des droits des Amérindiens. Méthodes documentées : 62 agents infiltrés, fabrication de preuves criminelles, manipulation du système judiciaire, et implication probable dans l'assassinat de plus de 60 membres sur la réserve de Pine Ridge entre 1973 et 1976. Leonard Peltier est emprisonné depuis 1977 sur la base de preuves que le FBI reconnaît plus tard avoir été falsifiées. L'ONU a demandé sa libération à plusieurs reprises."},
{id:"mk_naomi",title:"Projet NAOMI — Programme Bio CIA",cat:"Medical",mjc:180,votes:234,cred:96,summary:"La CIA développe un arsenal d'agents biologiques et de toxines pour des assassinats indétectables.",tags:["CIA","Biologique"],content:"Le Projet NAOMI est le programme d'armes biologiques clandestin de la CIA, révélé lors des auditions du Comité Church en 1975. La CIA stockait des agents létaux (venin de coquille de noix, toxine botulique, Shellfish toxin) suffisants pour tuer des milliers de personnes, en violation directe d'une directive présidentielle de Nixon de 1969 ordonnant la destruction de toutes les armes biologiques. L'arsenal était conservé dans une armoire réfrigérée secrète au quartier général de la CIA. Le directeur Richard Helms avait personnellement ordonné que cette information ne soit jamais divulguée."},
{id:"operationmerlin",title:"Opération Merlin — CIA piège l'Iran",cat:"Gouvernement",mjc:190,votes:287,cred:97,summary:"La CIA fournit délibérément à l'Iran des plans nucléaires défectueux pour saborder son programme.",tags:["CIA","Iran","Nucléaire"],content:"En 2000, la CIA conduit l'Opération Merlin : un scientifique nucléaire russe recruté par la CIA remet à l'Iran des plans de composants de bombe atomique contenant délibérément des défauts techniques. L'objectif : faire perdre des années à l'Iran en le mettant sur une fausse piste. Mais le scientifique russe, réalisant les défauts, les signale lui-même aux Iraniens dans sa lettre d'accompagnement — compromettant potentiellement l'opération. Révélé par le journaliste James Risen en 2006 dans son livre State of War. Le journaliste est poursuivi pour espionnage par Obama."},
{id:"yellowcake",title:"Uranium Niger — Faux Documents",cat:"Faux Drapeau",mjc:195,votes:534,cred:100,summary:"Des documents forgés sur l'uranium nigérien servent de prétexte à la guerre en Irak. La CIA savait qu'ils étaient faux.",tags:["CIA","Irak","Faux Drapeau"],content:"En 2002-2003, l'administration Bush affirme avoir des preuves qu'Iraq a tenté d'acheter de l'uranium (yellowcake) au Niger pour fabriquer des armes nucléaires. Ces preuves reposent sur des documents forgés grossièrement — le Niger n'avait plus de gouvernement capable de signer de tels accords depuis des années. L'ambassadeur Joseph Wilson est envoyé au Niger, conclut que les documents sont faux, et le dit publiquement en juillet 2003. La Maison Blanche rétorque en faisant outing sa femme (agent CIA Plame). Le gouvernement italien reconnaît que ses services ont produit les faux documents."},
{id:"pandora_papers",title:"Pandora Papers",cat:"Finance",mjc:205,votes:1023,cred:100,summary:"11,9 millions de documents révèlent comment 35 chefs d'État et 330 dirigeants cachent leurs fortunes offshore.",tags:["Finance","Paradis Fiscal","Élites"],content:"En octobre 2021, le Consortium international de journalistes d'investigation publie les Pandora Papers : 11,9 millions de documents de 14 cabinets offshore révélant les montages financiers secrets de 35 chefs d'État en exercice, 330 dirigeants politiques, 130 milliardaires et des célébrités dans 91 pays. Parmi les personnalités : le roi de Jordanie Abdallah II (300 millions en propriétés secrètes), le Premier ministre tchèque Andrej Babiš, et l'entourage du président ukrainien Zelensky. Le président de la République tchèque démissionne suite aux révélations."},
{id:"gladiob",title:"Opération Gladio B — Turquie et Asie centrale",cat:"Militaire",mjc:195,votes:267,cred:88,summary:"Extension post-Guerre froide de Gladio : réseaux paramilitaires islamistes utilisés comme proxy par l'OTAN.",tags:["OTAN","CIA","Turquie"],content:"Selon les témoignages de Sibel Edmonds, ancienne traductrice du FBI lancée d'alerte en 2002, et des enquêtes parlementaires européennes, Gladio B désigne la continuation post-1990 des réseaux stay-behind de l'OTAN — cette fois via des groupes islamistes en Turquie, dans les républiques d'Asie centrale et dans les Balkans. Des connexions sont documentées entre les services spéciaux turcs (MIT), des groupes nationalistes armés et des réseaux d'al-Qaïda, utilisés comme proxies dans des régions stratégiques pour les intérêts américains et otaniens. Le FBI classe secrètement ces informations."},
{id:"fukushima",title:"Fukushima — Dissimulation TEPCO",cat:"Medical",mjc:175,votes:623,cred:97,summary:"TEPCO dissimule l'ampleur réelle de la catastrophe et le niveau de contamination des eaux pendant des années.",tags:["Nucléaire","Japon","Santé"],content:"Suite au tremblement de terre du 11 mars 2011, la centrale nucléaire de Fukushima Daiichi subit trois fusions de cœurs — niveau 7 sur l'échelle INES, le plus élevé possible. TEPCO et le gouvernement japonais tardent à reconnaître la gravité, maintenant la classification à niveau 5 pendant un mois. Des documents internes révélés en 2012 montrent que TEPCO savait dès les premières heures. En 2013, TEPCO admet que des eaux hautement radioactives se déversent dans l'océan Pacifique depuis 2011. En 2023, malgré des protestations internationales, le Japon commence à rejeter les eaux de refroidissement traitées dans l'océan."}

function aiValidate(art){
  var title=art.title||"";var summary=art.summary||"";var content=art.content||"";
  if(title.length<4)return{ok:false,reason:"Titre trop court."};
  if(content.length<60)return{ok:false,reason:"Dossier insuffisant (min. 60 caractères)."};
  var upper=(content.match(/[A-Z]/g)||[]).length;
  if(content.length>20&&upper/content.length>0.5)return{ok:false,reason:"Contenu non lisible (trop de majuscules)."};
  if(/https?:\/\/|www\./i.test(content+summary))return{ok:false,reason:"Les liens externes ne sont pas autorisés."};
  var txt=(title+" "+summary+" "+content).toLowerCase();
  var kw=["gouvernement","cia","fbi","nsa","opération","programme","surveillance","militaire","document","déclassifié","classifié","secret","archive","enquête","preuve","témoignage","rapport","révélé","prouvé","complot","manipulation","contrôle","pouvoir","agence","service","renseignement","politique","historique","officiel","autorité"];
  var hits=kw.filter(function(k){return txt.indexOf(k)>=0;});
  if(hits.length===0)return{ok:false,reason:"Contenu hors sujet ou trop vague."};
  return{ok:true};
}
async function doVote(art){
  var vr=await api.castVote(art.id,S.user.id);
  if(vr&&vr.__e){
    var m=vr.msg||"";
    if(m.indexOf("duplicate")>=0||m.indexOf("unique")>=0||m.indexOf("23505")>=0){showToast("Déjà validé.",true);}
    else{showToast(m||"Erreur.",true);}
    renderSubmit();return;
  }
  var newCount=(art.votes_count||0)+1;
  var votesOk=newCount>=10;
  if(votesOk){
    var ai=aiValidate(art);
    if(!ai.ok){
      await api.patchWiki(art.id,{votes_count:newCount,status:"rejected",rejection_reason:ai.reason});
      S.pendingArticles=S.pendingArticles.filter(function(a){return a.id!==art.id;});

  } else {

}

function doEventCheckin(code){
  var c=san.t(code,6).replace(/\D/g,"");

  api.findEventByCode(c).then(function(evs){
    if(!Array.isArray(evs)||!evs.length){showToast("Code invalide ou pointage inactif.",true);return;}
    var ev=evs[0];
    if(S.revMyCheckins[ev.id]){showToast("Vous êtes déjà enregistré pour cet événement.",true);return;}
    api.doCheckin({event_id:ev.id,user_id:S.user.id}).then(function(cr){
      if(cr&&cr.__e){
        var m=cr.msg||"";
        if(m.indexOf("duplicate")>=0||m.indexOf("23505")>=0){showToast("Déjà enregistré ✓",true);}
        else{showToast(m||"Erreur pointage.",true);}
        return;
      }
      S.revMyCheckins[ev.id]=true;
      api.getUser(S.user.id).then(function(us){
        var bal=(Array.isArray(us)&&us[0])?us[0].mojocoin_balance||0:S.user.mojocoin_balance||0;
        var newBal=bal+10;
        api.r("PATCH","/rest/v1/users?id=eq."+encodeURIComponent(S.user.id),{mojocoin_balance:newBal});
        api.r("POST","/rest/v1/transactions",{user_id:S.user.id,amount:10,type:"earn",label:"Pointage: "+san.t(ev.title||"Événement",50)});
        S.user.mojocoin_balance=newBal;
        try{localStorage.setItem("mj_usr",JSON.stringify(S.user));}catch(e){}
      });
      api.r("PATCH","/rest/v1/events?id=eq."+encodeURIComponent(ev.id),{attendees_count:(ev.attendees_count||0)+1});
      if(ev.organizer_id&&ev.organizer_id!==S.user.id){api.r("GET","/rest/v1/users?select=mojocoin_balance&id=eq."+encodeURIComponent(ev.organizer_id)).then(function(ores){var obal=(Array.isArray(ores)&&ores[0])?ores[0].mojocoin_balance||0:0;api.r("PATCH","/rest/v1/users?id=eq."+encodeURIComponent(ev.organizer_id),{mojocoin_balance:obal+5});api.r("POST","/rest/v1/transactions",{user_id:ev.organizer_id,amount:5,type:"earn",label:"Participant à votre événement: "+san.t(ev.title||"Événement",50)});});}

  });
