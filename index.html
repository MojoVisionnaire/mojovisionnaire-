function aiValidate(art){
  var title=art.title||"";var summary=art.summary||"";var content=art.content||"";
  if(title.length<4)return{ok:false,reason:"Titre trop court."};
  if(content.length<60)return{ok:false,reason:"Dossier insuffisant (min. 60 caractères)."};
  var upper=(content.match(/[A-Z]/g)||[]).length;
  if(content.length>20&&upper/content.length>0.5)return{ok:false,reason:"Contenu non lisible (trop de majuscules)."};
  if(/https?:\/\/|www\./i.test(content+summary))return{ok:false,reason:"Les liens externes ne sont pas autorisés."};
  var txt=(title+" "+summary+" "+content).toLowerCase();
  var kw=["gouvernement","cia","fbi","nsa","opération","programme","surveillance","militaire","document","déclassifié","classifié","secret","archive","enquête","preuve","témoignage","rapport","révélé","prouvé","complot","manipulation","contrôle","pouvoir","agence","service","renseignement","politique","historique","officiel","autorité"];
  var hits=kw.filter(function(k){return txt.indexOf(k)>=0;});
  if(hits.length===0)return{ok:false,reason:"Contenu hors sujet ou trop vague."};
  return{ok:true};
}

function doEventCheckin(code){
  var c=san.t(code,6).replace(/\D/g,"");
  if(c.length!==6){showToast("Code à 6 chiffres requis.",true);return;}
  api.findEventByCode(c).then(function(evs){
    if(!Array.isArray(evs)||!evs.length){showToast("Code invalide ou pointage inactif.",true);return;}
    var ev=evs[0];
    if(S.revMyCheckins[ev.id]){showToast("Vous êtes déjà enregistré pour cet événement.",true);return;}
    api.doCheckin({event_id:ev.id,user_id:S.user.id}).then(function(cr){
      if(cr&&cr.__e){
        var m=cr.msg||"";
        if(m.indexOf("duplicate")>=0||m.indexOf("23505")>=0){showToast("Déjà enregistré ✓",true);}
        else{showToast(m||"Erreur pointage.",true);}
        return;
      }
      S.revMyCheckins[ev.id]=true;
      api.getUser(S.user.id).then(function(us){
        var bal=(Array.isArray(us)&&us[0])?us[0].mojocoin_balance||0:S.user.mojocoin_balance||0;
        var newBal=bal+10;
        api.r("PATCH","/rest/v1/users?id=eq."+encodeURIComponent(S.user.id),{mojocoin_balance:newBal});
        api.r("POST","/rest/v1/transactions",{user_id:S.user.id,amount:10,type:"earn",label:"Pointage: "+san.t(ev.title||"Événement",50)});
        S.user.mojocoin_balance=newBal;
        try{localStorage.setItem("mj_usr",JSON.stringify(S.user));}catch(e){}
      });
      api.r("PATCH","/rest/v1/events?id=eq."+encodeURIComponent(ev.id),{attendees_count:(ev.attendees_count||0)+1});
      S.revCheckinCode="";
      showToast("✓ Présence enregistrée ! +10 MJC");
      renderRevolution();
    });
  });
}
