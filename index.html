.tab.on{color:#6e72ff}
.tab.on::after{content:"";position:absolute;bottom:0;width:18px;height:2px;background:#6e72ff;border-radius:2px 2px 0 0}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.inp{width:100%;background:#131420;border:1.5px solid #ffffff14;border-radius:10px;padding:13px 15px;font-size:.88rem;outline:none;color:#dde0ec;display:block}

.btn{width:100%;background:#6e72ff;color:#fff;border:none;padding:14px;border-radius:14px;font-weight:700;font-size:.92rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:"Outfit",sans-serif}
.btn:disabled{background:#131420;color:#383a52}
.btn.ghost{background:none;border:1px solid #ffffff14;color:#7a7d9a}
.btn.amber{background:#ffb547;color:#000}
.err{background:#ff4d6d18;border:1px solid #ff4d6d33;border-radius:7px;padding:10px 13px;font-size:.78rem;color:#ff4d6d;margin-bottom:10px;word-break:break-word;line-height:1.5}
.hr{height:1px;background:#ffffff0a}
.spin{width:15px;height:15px;border:2px solid #ffffff14;border-top:2px solid #6e72ff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;flex-shrink:0}
.card{background:#0d0e18;border:1px solid #ffffff0a;border-radius:14px;padding:14px}
.post{padding:12px 16px;cursor:pointer}
.post:active{background:#0d0e18}
.wiki-item{padding:13px 16px;cursor:pointer}
.wiki-item:active{background:#0d0e18}
.paste-btn{background:#6e72ff18;border:1px solid #6e72ff30;color:#6e72ff;padding:0 14px;border-radius:10px;cursor:pointer;font-size:.7rem;font-weight:600;white-space:nowrap;min-height:48px;font-family:"Outfit",sans-serif}
.copy-btn{background:#131420;border:1px solid #ffffff14;color:#7a7d9a;padding:5px 11px;border-radius:7px;cursor:pointer;font-size:.7rem;font-weight:600;white-space:nowrap;font-family:"Outfit",sans-serif}
.copy-btn.ok{background:#3ddc84;color:#000}
.back-btn{background:none;border:none;color:#7a7d9a;cursor:pointer;padding:4px 6px 4px 0;display:flex;align-items:center;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fu{animation:fu .25s ease both}
</style>

var e = document.createElement(tag);

else if (k === “style” && typeof props[k] === “object”) Object.assign(e.style, props[k]);

async function doSubmit() {

if(!email){showErr(“Email invalide.”);return;}

if(!Array.isArray(refs)||refs.length===0){showErr(“Code parrain introuvable. Verifiez la lettre O (pas le chiffre 0).”);setLoad(false);return;}

if(!res.user){showErr(“Erreur serveur. Reessayez.”);setLoad(false);return;}
var uid=res.user.id;
if(res.access_token){window._mjtok=res.access_token;try{localStorage.setItem(“mj_tok”,res.access_token);}catch(e){}}
var myCode=“MOJO-”+alias.toUpperCase().replace(/[^A-Z0-9]/g,””).slice(0,5)+”-”+Math.random().toString(36).substring(2,6).toUpperCase();

if(ins&&ins.__e){showErr(“Profil: “+ins.msg);setLoad(false);return;}
await api.addRef({referrer_id:referrer.id,referred_id:uid});
var u={id:uid,email:email,alias:alias,level:“Nouveau”,mojocoin_balance:0,referral_code:myCode,subscription_active:false,months_active:0};
try{localStorage.setItem(“mj_usr”,JSON.stringify(u));}catch(e){}
setLoad(false); startApp(u);
} else {
setLoad(true);
var res=await api.login(email,pw);
if(res.error){showErr(res.error.message||“Email ou mot de passe incorrect.”);setLoad(false);return;}
if(!res.access_token){showErr(“Erreur authentification.”);setLoad(false);return;}
window._mjtok=res.access_token;
try{localStorage.setItem(“mj_tok”,res.access_token);}catch(e){}
var users=await api.getUser(res.user.id);
if(!Array.isArray(users)||!users[0]){showErr(“Profil introuvable.”);setLoad(false);return;}
var u=users[0];
try{localStorage.setItem(“mj_usr”,JSON.stringify(u));}catch(e){}
setLoad(false); startApp(u);
}
}

renderFields();
root.appendChild(inner);
return root;
}

retc.appendChild(prog(months,5,”#3ddc84”,“Anciennete (mois)”));
retc.appendChild(mk(“p”,{style:{fontSize:“0.68rem”,color:”#383a52”,marginTop:“8px”}},“1 MJC = 0.10 EUR - Virement sous 3-5 jours”));
ret.appendChild(retc);scroll.appendChild(ret);scroll.appendChild(hr());

// Transactions
var txs=mk(“div”,{style:{padding:“14px 16px”}});
txs.appendChild(mk(“div”,{cls:“lbl”},“TRANSACTIONS”));
if(!S.txs||!S.txs.length){txs.appendChild(mk(“p”,{style:{fontSize:“0.78rem”,color:”#7a7d9a”}},“Aucune transaction.”));}
else S.txs.forEach(function(tx){
var row=mk(“div”,{style:{display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:“9px 0”,borderBottom:“1px solid #ffffff0a”}});
var l=mk(“div”);
l.appendChild(mk(“div”,{style:{fontWeight:500,fontSize:“0.8rem”,marginBottom:“1px”}},san.t(tx.label||“Transaction”,100)));
l.appendChild(mk(“div”,{style:{color:”#383a52”,fontSize:“0.6rem”,fontFamily:“Fira Code,monospace”}},new Date(tx.created_at).toLocaleDateString(“fr-FR”)));
row.appendChild(l);
row.appendChild(mk(“span”,{style:{color:tx.type===“earn”?”#3ddc84”:”#ff4d6d”,fontWeight:700,fontFamily:“Fira Code,monospace”,fontSize:“0.78rem”,marginLeft:“10px”}},(tx.amount>0?”+”:””)+tx.amount+” MJC”));
txs.appendChild(row);
});
scroll.appendChild(txs);
scroll.appendChild(mk(“div”,{style:{height:“20px”}}));
scr.appendChild(scroll);
}

// START APP
function startApp(user) {
S.user=user;
var app=document.getElementById(“app”);
app.innerHTML=””;
[“feed”,“wiki”,“msgs”,“submit”,“profile”].forEach(function(id){
app.appendChild(mk(“div”,{cls:“screen”+(id===“feed”?” active”:””),id:“s-”+id}));
});
app.appendChild(makeBotbar());
renderFeed();renderWiki();renderMsgs();renderSubmit();renderProfile();
loadPosts();loadTxs();
}

// BOOT
(function(){
try {
var tok=localStorage.getItem(“mj_tok”);
var usr=localStorage.getItem(“mj_usr”);
if(tok&&usr){
var u=JSON.parse(usr);
if(u&&u.id){window._mjtok=tok;startApp(u);return;}
}
} catch(e) {}
document.getElementById(“app”).appendChild(renderAuth());
})();
</script>
