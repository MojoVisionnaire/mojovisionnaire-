<!DOCTYPE html>

<html lang="fr" style="color-scheme:dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="color-scheme" content="dark"/>
<title>mojoVisionnaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#07080e}
body{background:#07080e;color:#dde0ec;font-family:"Outfit",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button,input,textarea,select{font-family:"Outfit",sans-serif;-webkit-appearance:none;appearance:none;color-scheme:dark}
input,textarea,select{color:#dde0ec}
::-webkit-scrollbar{display:none}
::placeholder{color:#2e3048}
#splash{position:fixed;inset:0;background:#07080e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px}
.sp-logo{font-family:"DM Serif Display",serif;font-size:2.8rem;color:#dde0ec}
.sp-logo span{color:#6e72ff}
.sp-bar{width:140px;height:3px;background:#1a1a2e;border-radius:3px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#6e72ff,#00d2ff);border-radius:3px;animation:ld 4s ease forwards}
.sp-sub{font-size:0.62rem;font-family:"Fira Code",monospace;color:#383a52;letter-spacing:.1em}
@keyframes ld{0%{width:0}60%{width:70%}90%{width:90%}100%{width:100%}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pi{0%{transform:scale(.93);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0);opacity:0}40%{transform:scale(1);opacity:1}}
.fu{animation:fu .28s ease both}
.fi{animation:fi .2s ease both}
.su{animation:su .35s cubic-bezier(.16,1,.3,1) both}
.pi{animation:pi .2s cubic-bezier(.16,1,.3,1) both}
.tap{transition:transform .08s,opacity .08s}
.tap:active{transform:scale(.96);opacity:.82}
.typing span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#6e72ff;margin:0 2px;animation:dotPulse 1.4s ease infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-logo">mojo<span>Visionnaire</span></div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
  <div class="sp-sub" id="sp-status">Initialisation...</div>
</div>
<div id="root"></div>

<script>

window.__CODE__ = 'const{useState,useEffect,useRef,useCallback}=React;\n\n/* ══ CONFIG SUPABASE — remplacez par vos vraies clés ══ */\nconst SUPA_URL = \'https://alydmyjnbdyrdioipkek.supabase.co\';\nconst SUPA_KEY = \'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFseWRteWpuYmR5cmRpb2lwa2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzgzNjksImV4cCI6MjA5MzcxNDM2OX0.l7dnJNUTQxdNIXlQKEDbPcx-wO3MXExYrbAbCuRdjtY\';\n\nconst supa = {\n  async query(table, opts={}){\n    let url = `${SUPA_URL}/rest/v1/${table}?`;\n    if(opts.select) url += `select=${opts.select}&`;\n    if(opts.filter) url += `${opts.filter}&`;\n    if(opts.order) url += `order=${opts.order}&`;\n    if(opts.limit) url += `limit=${opts.limit}&`;\n    const res = await fetch(url, {\n      headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+SUPA_KEY,\'Content-Type\':\'application/json\',\'Prefer\':\'return=representation\'}\n    });\n    return res.json();\n  },\n  async insert(table, data){\n    const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {\n      method:\'POST\',\n      headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+(window.__token||SUPA_KEY),\'Content-Type\':\'application/json\',\'Prefer\':\'return=representation\'},\n      body: JSON.stringify(data)\n    });\n    return res.json();\n  },\n  async update(table, data, filter){\n    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?${filter}`, {\n      method:\'PATCH\',\n      headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+(window.__token||SUPA_KEY),\'Content-Type\':\'application/json\',\'Prefer\':\'return=representation\'},\n      body: JSON.stringify(data)\n    });\n    return res.json();\n  },\n  async auth_signup(email, password, alias){\n    const res = await fetch(`${SUPA_URL}/auth/v1/signup`, {\n      method:\'POST\',\n      headers:{\'apikey\':SUPA_KEY,\'Content-Type\':\'application/json\'},\n      body: JSON.stringify({email, password, options:{data:{alias}}})\n    });\n    return res.json();\n  },\n  async auth_login(email, password){\n    const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {\n      method:\'POST\',\n      headers:{\'apikey\':SUPA_KEY,\'Content-Type\':\'application/json\'},\n      body: JSON.stringify({email, password})\n    });\n    return res.json();\n  },\n  async auth_logout(){\n    await fetch(`${SUPA_URL}/auth/v1/logout`, {\n      method:\'POST\',\n      headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+(window.__token||SUPA_KEY)}\n    });\n    window.__token = null;\n    window.__user = null;\n    localStorage.removeItem(\'mojo_token\');\n    localStorage.removeItem(\'mojo_user\');\n  }\n};\n\n/* ══ WIKI EXAMPLES (toujours en dur) ══ */\nconst WIKI_EXAMPLES=[\n  {id:\'mkUltra\',title:"Operation MKUltra",cat:"Gouvernement",year:1953,end:1973,mjc:150,votes:342,cred:98,\n   summary:"Programme secret CIA de contrôle mental via drogues et torture. Déclassifié en 1977.",\n   tags:["CIA","Contrôle Mental"],\n   content:"En 1953, la CIA lance MKUltra, un programme top secret utilisant le LSD, la privation de sommeil et la torture psychologique sur des sujets non consentants. En 1977, des documents déclassifiés révèlent l\'ampleur du programme suite aux travaux du Comité Church.",\n   links:[\'prism\',\'cointelpro\']},\n  {id:\'prism\',title:"Programme PRISM — NSA",cat:"Surveillance",year:2007,end:2013,mjc:220,votes:891,cred:99,\n   summary:"La NSA espionnait massivement via les géants du web. Révélé par Snowden en 2013.",\n   tags:["NSA","Big Tech"],\n   content:"En juin 2013, Edward Snowden révèle que la NSA accédait directement aux serveurs de Google, Apple, Facebook via PRISM. Des millions de données collectées sans mandat judiciaire.",\n   links:[\'northwoods\']},\n  {id:\'northwoods\',title:"Opération Northwoods",cat:"Faux Drapeau",year:1962,end:1962,mjc:180,votes:567,cred:97,\n   summary:"Plan militaire US pour simuler des attentats contre ses propres citoyens.",\n   tags:["Militaire","Cuba"],\n   content:"En 1962, les chefs d\'état-major proposent à Kennedy de simuler des attaques terroristes pour justifier une invasion de Cuba. Kennedy refuse et limoge le général Lemnitzer. Déclassifié en 1997.",\n   links:[\'mkUltra\']},\n  {id:\'cointelpro\',title:"COINTELPRO — FBI",cat:"Gouvernement",year:1956,end:1971,mjc:195,votes:712,cred:96,\n   summary:"Programme secret FBI pour surveiller et détruire les mouvements politiques américains.",\n   tags:["FBI","Surveillance"],\n   content:"De 1956 à 1971, le FBI mène COINTELPRO ciblant les Black Panthers, MLK, NAACP. Méthodes : infiltration, désinformation, chantage. Révélé en 1971 après le cambriolage du bureau FBI de Media.",\n   links:[\'mkUltra\']},\n];\n\n/* ══ TOKENS ══ */\nconst C={\n  bg:\'#07080e\',surf:\'#0d0e18\',surf2:\'#131420\',surf3:\'#191a28\',\n  border:\'#ffffff0a\',border2:\'#ffffff14\',border3:\'#ffffff1e\',\n  accent:\'#6e72ff\',green:\'#3ddc84\',amber:\'#ffb547\',red:\'#ff4d6d\',cyan:\'#00d2ff\',\n  text:\'#dde0ec\',text2:\'#7a7d9a\',text3:\'#383a52\',\n  r:\'14px\',r2:\'10px\',r3:\'7px\',\n};\nconst SANS="\'Outfit\',sans-serif";\nconst SERIF="\'DM Serif Display\',serif";\nconst MONO="\'Fira Code\',monospace";\nconst CAT_COL={Gouvernement:C.accent,Surveillance:C.cyan,Finance:C.amber,\'Faux Drapeau\':C.red,Médical:\'#c084fc\',Militaire:\'#fb923c\',Histoire:C.green,Médias:\'#f472b6\'};\nconst LVL_COL={Oracle:C.amber,Sentinel:C.red,Archiviste:C.green,Éveillé:C.cyan,Nouveau:C.text3};\nconst LVL_BG={Oracle:\'#ffb54718\',Sentinel:\'#ff4d6d18\',Archiviste:\'#3ddc8418\',Éveillé:\'#00d2ff18\',Nouveau:\'#38385218\'};\n\n/* ══ ATOMS ══ */\nconst Coin=({v,sm})=>(\n  <span style={{display:\'inline-flex\',alignItems:\'center\',gap:3,color:C.amber,fontWeight:600,fontSize:sm?\'0.68rem\':\'0.78rem\',fontFamily:MONO}}>\n    <span style={{width:sm?12:14,height:sm?12:14,borderRadius:\'50%\',background:\'linear-gradient(135deg,#ffb547,#ff7c00)\',display:\'flex\',alignItems:\'center\',justifyContent:\'center\',fontSize:sm?\'0.35rem\':\'0.42rem\',color:\'#000\',fontWeight:900,flexShrink:0}}>M</span>+{v}\n  </span>\n);\nconst Pill=({level})=>(<span style={{fontSize:\'0.56rem\',fontFamily:MONO,color:LVL_COL[level]||C.text3,background:LVL_BG[level]||\'#38385218\',padding:\'2px 7px\',borderRadius:20,whiteSpace:\'nowrap\'}}>{level}</span>);\nconst CTag=({t})=>(<span style={{fontSize:\'0.56rem\',color:CAT_COL[t]||C.text2,background:(CAT_COL[t]||C.text2)+\'15\',border:\'1px solid \'+(CAT_COL[t]||C.text2)+\'25\',padding:\'2px 7px\',borderRadius:20,fontFamily:MONO,whiteSpace:\'nowrap\'}}>#{t}</span>);\nconst Bar=({s,sm})=>{const col=s>=80?C.green:s>=55?C.amber:C.red;return(<div style={{display:\'flex\',alignItems:\'center\',gap:5}}><div style={{flex:1,height:sm?2:3,background:\'#ffffff08\',borderRadius:4,overflow:\'hidden\'}}><div style={{width:s+\'%\',height:\'100%\',background:col,borderRadius:4,transition:\'width 1s cubic-bezier(.16,1,.3,1)\'}}/></div><span style={{fontSize:sm?\'0.54rem\':\'0.6rem\',color:col,fontFamily:MONO,fontWeight:600,minWidth:24}}>{s}%</span></div>);};\nconst Ava=({alias,level,size=36})=>(<div style={{width:size,height:size,borderRadius:\'50%\',background:`linear-gradient(135deg,${LVL_COL[level]||C.accent}20,${LVL_COL[level]||C.accent}40)`,border:`1.5px solid ${LVL_COL[level]||C.accent}35`,display:\'flex\',alignItems:\'center\',justifyContent:\'center\',fontSize:size*.38+\'px\',fontWeight:700,color:LVL_COL[level]||C.accent,flexShrink:0,fontFamily:SANS}}>{alias?alias[0]:\'?\'}</div>);\nconst Spin=()=><div style={{width:15,height:15,border:\'2px solid \'+C.border2,borderTop:\'2px solid \'+C.accent,borderRadius:\'50%\',animation:\'spin .6s linear infinite\'}}/>;\nconst HR=()=><div style={{height:1,background:C.border}}/>;\nconst Err=({msg})=>msg?<div style={{background:C.red+\'18\',border:\'1px solid \'+C.red+\'33\',borderRadius:C.r3,padding:\'10px 13px\',fontSize:\'0.8rem\',color:C.red,marginBottom:10}}>{msg}</div>:null;\n\n/* ══ AI CALL ══ */\nconst callAI=async(prompt,max=500)=>{\n  try{\n    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages:[{role:"user",content:prompt}]})});\n    const d=await r.json();\n    return JSON.parse(d.content?.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim());\n  }catch(e){return null;}\n};\nconst callAIText=async(prompt,max=800)=>{\n  try{\n    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,messages:[{role:"user",content:prompt}]})});\n    const d=await r.json();\n    return d.content?.map(i=>i.text||"").join("").trim();\n  }catch(e){return null;}\n};\n\n/* ══ TOPBAR ══ */\nconst TopBar=({title,sub,onBack,right})=>(\n  <div style={{height:52,background:C.bg+\'ee\',borderBottom:\'1px solid \'+C.border,display:\'flex\',alignItems:\'center\',padding:\'0 16px\',gap:10,position:\'sticky\',top:0,zIndex:60,backdropFilter:\'blur(24px)\',WebkitBackdropFilter:\'blur(24px)\'}}>\n    {onBack&&<button onClick={onBack} style={{background:\'none\',border:\'none\',color:C.text2,cursor:\'pointer\',padding:\'4px 6px 4px 0\',display:\'flex\',alignItems:\'center\',flexShrink:0}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>}\n    <div style={{flex:1,minWidth:0}}>\n      <div style={{fontWeight:700,fontSize:\'0.98rem\',letterSpacing:\'-.02em\',overflow:\'hidden\',textOverflow:\'ellipsis\',whiteSpace:\'nowrap\',lineHeight:1.2}}>{title}</div>\n      {sub&&<div style={{fontSize:\'0.58rem\',color:C.text3,fontFamily:MONO,marginTop:1}}>{sub}</div>}\n    </div>\n    {right&&<div style={{display:\'flex\',gap:7,alignItems:\'center\',flexShrink:0}}>{right}</div>}\n  </div>\n);\n\n/* ══ BOTTOM BAR ══ */\nconst TABS=[\n  {id:\'feed\',label:\'Flux\',ic:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill={a?"currentColor":"none"} stroke="currentColor" strokeWidth={a?0:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>},\n  {id:\'wiki\',label:\'Wiki\',ic:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>},\n  {id:\'msgs\',label:\'Messages\',ic:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill={a?"currentColor":"none"} stroke="currentColor" strokeWidth={a?0:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>},\n  {id:\'submit\',label:\'Déposer\',ic:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.8} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>},\n  {id:\'profile\',label:\'Profil\',ic:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill={a?"currentColor":"none"} stroke="currentColor" strokeWidth={a?0:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},\n];\nconst BotBar=({tab,setTab,unread})=>(\n  <div style={{height:64,background:C.bg+\'ee\',borderTop:\'1px solid \'+C.border,display:\'flex\',alignItems:\'stretch\',position:\'fixed\',bottom:0,left:0,right:0,zIndex:60,backdropFilter:\'blur(24px)\',WebkitBackdropFilter:\'blur(24px)\',paddingBottom:\'env(safe-area-inset-bottom)\'}}>\n    {TABS.map(t=>{\n      const active=tab===t.id;\n      const badge=t.id===\'msgs\'?unread:0;\n      return(\n        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:\'flex\',flexDirection:\'column\',alignItems:\'center\',justifyContent:\'center\',gap:3,background:\'none\',border:\'none\',cursor:\'pointer\',color:active?C.accent:C.text3,transition:\'color .18s\',position:\'relative\',padding:\'6px 0\'}}>\n          <div style={{position:\'relative\',transition:\'transform .18s\',transform:active?\'translateY(-1px)\':\'none\'}}>\n            {t.ic(active)}\n            {badge>0&&<div style={{position:\'absolute\',top:-3,right:-5,width:14,height:14,borderRadius:\'50%\',background:C.red,fontSize:\'0.48rem\',display:\'flex\',alignItems:\'center\',justifyContent:\'center\',color:\'#fff\',fontWeight:700,border:\'1.5px solid \'+C.bg}}>{badge}</div>}\n          </div>\n          <span style={{fontSize:\'0.54rem\',fontWeight:active?700:400,letterSpacing:\'.02em\'}}>{t.label}</span>\n          {active&&<div style={{position:\'absolute\',bottom:0,width:18,height:2,background:C.accent,borderRadius:\'2px 2px 0 0\'}}/>}\n        </button>\n      );\n    })}\n  </div>\n);\n\n/* ══ AUTH ══ */\nfunction Auth({onAuth}){\n  const[mode,setMode]=useState(\'login\');\n  const[email,setEmail]=useState(\'\');\n  const[password,setPassword]=useState(\'\');\n  const[alias,setAlias]=useState(\'\');\n  const[refCode,setRefCode]=useState(\'\');\n  const[loading,setLoading]=useState(false);\n  const[err,setErr]=useState(\'\');\n  const[typed,setTyped]=useState(\'\');\n  const full=\'La vérité que l\\\'histoire a confirmée.\';\n  useEffect(()=>{let i=0;const t=setInterval(()=>{if(i<full.length)setTyped(full.slice(0,++i));else clearInterval(t);},55);return()=>clearInterval(t);},[]);\n\n  const submit=async()=>{\n    setErr(\'\');setLoading(true);\n    try{\n      if(mode===\'register\'){\n        if(!alias||!email||!password||!refCode){setErr(\'Tous les champs sont requis.\');setLoading(false);return;}\n        // Vérifier le code parrain\n        const refs=await supa.query(\'users\',{filter:`referral_code=eq.${refCode}`,select:\'id,alias\'});\n        if(!refs||!refs.length){setErr(\'Code parrain invalide.\');setLoading(false);return;}\n        const referrer=refs[0];\n        // Créer le compte\n        const res=await supa.auth_signup(email,password,alias);\n        if(res.error){setErr(res.error.message||\'Erreur inscription\');setLoading(false);return;}\n        window.__token=res.access_token;\n        window.__user={...res.user,alias,level:\'Nouveau\',mojocoin_balance:0};\n        localStorage.setItem(\'mojo_token\',res.access_token);\n        // Insérer dans users\n        await supa.insert(\'users\',{id:res.user.id,email,alias,referral_code:\'MOJO-\'+alias.toUpperCase().slice(0,5)+\'-\'+Math.random().toString(36).substring(2,6).toUpperCase(),referred_by:referrer.id,subscription_active:false,months_active:0});\n        // Créer le parrainage\n        await supa.insert(\'referrals\',{referrer_id:referrer.id,referred_id:res.user.id});\n        onAuth({id:res.user.id,alias,level:\'Nouveau\',mojocoin_balance:0,months_active:0,subscription_active:false,referral_code:\'MOJO-\'+alias.toUpperCase().slice(0,5)+\'-???\'});\n      } else {\n        const res=await supa.auth_login(email,password);\n        if(res.error){setErr(\'Email ou mot de passe incorrect.\');setLoading(false);return;}\n        window.__token=res.access_token;\n        localStorage.setItem(\'mojo_token\',res.access_token);\n        // Récupérer profil\n        const users=await supa.query(\'users\',{filter:`id=eq.${res.user.id}`,select:\'*\'});\n        if(!users||!users.length){setErr(\'Profil introuvable.\');setLoading(false);return;}\n        const u=users[0];\n        window.__user=u;\n        localStorage.setItem(\'mojo_user\',JSON.stringify(u));\n        onAuth(u);\n      }\n    }catch(e){setErr(\'Erreur réseau. Vérifiez votre connexion.\');}\n    setLoading(false);\n  };\n\n  const inp={width:\'100%\',background:C.surf2,border:\'1.5px solid \'+C.border2,b cielles."});\n    setAiLoad(false);\n  },[]);\n\n  const handleType=(v)=>{setNewPost(v);clearTimeout(deb.current);deb.current=setTimeout(()=>analyzeRT(v),800);};\n\n  const publish=async()=>{\n    if(!newPost.trim())return;\n    const p={author_id:user.id,content:newPost,tags:[],mojocoin_reward:2};\n    const res=await supa.insert(\'posts\',p);\n    if(Array.isArray(res)&&res[0]){\n      setPosts(prev=>[{...res[0],users:{alias:user.alias,level:user.level,verified:user.verified}},...prev]);\n    }\n    setNewPost(\'\');setAiScore(null);setCompose(false);\n  };\n\n  const toggleLike=async(post)=>{\n    if(liked[post.id]){\n      setLiked(l=>({...l,[post.id]:false}));\n      setPosts(ps=>ps.map(p=>p.id===post.id?{...p,likes_count:(p.likes_count||0)-1}:p));\n    } else {\n      setLiked(l=>({...l,[post.id]:true}));\n      setPosts(ps=>ps.map(p=>p.id===post.id?{...p,likes_count:(p.likes_count||0)+1}:p));\n      await supa.insert(\'likes\',{user_id:user.id,post_id:post.id});\n    }\n  };\n\n  if(detail){\n    const p=detail;\n    const alias=p.users?.alias||\'Anonyme\';\n    const level=p.users?.level||\'Nouveau\';\n    const linked=p.wiki_id?WIKI_EXAMPLES.find(w=>w.id===p.wiki_id):null;\n    return(\n      <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:64}}>\n        <TopBar title={alias} sub={level} onBack={()=>setDetail(null)} right={<Pill level={level}/>}/>\n        <div style={{flex:1,overflowY:\'auto\',padding:\'16px\'}}>\n          <div className="fi">\n            <div style={{display:\'flex\',gap:11,marginBottom:13}}>\n              <Ava alias={alias} level={level} size={44}/>\n              <div style={{flex:1}}>\n                <div style={{display:\'flex\',gap:6,alignItems:\'center\',flexWrap:\'wrap\',marginBottom:5}}>\n                  <span style={{fontWeight:700}}>{alias}</span>\n                  {p.users?.verified&&<span style={{color:C.accent,fontSize:\'0.7rem\'}}>✦</span>}\n                </div>\n                <p style= "/></svg>\n                    {(p.likes_count||0)+(liked[p.id]?1:0)}\n                  </button>\n                  <span style={{color:C.text3,fontSize:\'0.74rem\',display:\'flex\',alignItems:\'center\',gap:4}}>\n                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>\n                    {p.comments_count||0}\n                  </span>\n                </div>\n              </div>\n              <HR/>\n            </div>\n          );\n        })}\n        <div style={{height:20}}/>\n      </div>\n    </div>\n  );\n}\n\n/* ══ WIKI ══ */\nfunction Wiki({initialArticle,onClearInitial}){\n  const[selected,setSelected]=useState(initialArticle||null);\n  const[search,setSearch]=useState(\'\');\n  const[dbArticles,setDbArticles]=useState([]);\n  const[aiAn,setAiAn]=useState(null);\n  const[aiLoad,setAiLoad]=useState(false);\n  const[commentTxt,setCommentTxt]=useState(\'\');\n  const[comments,setComments]=useState({});\n\n  useEffect(()=>{if(initialArticle){setSelected(initialArticle);onClearInitial&&onClearInitial();}}, [initialArticle]);\n  useEffect(()=>{loadDbArticles();},[]);\n\n  const loadDbArticles=async()=>{\n    const data=await supa.query(\'wiki_articles\',{select:\'*\',filter:\'status=eq.verified\',order:\'created_at.desc\'});\n    if(Array.isArray(data)) setDbArticles(data);\n  };\n\n  const allArticles=[...WIKI_EXAMPLES,...dbArticles.filter(d=>!WIKI_EXAMPLES.find(e=>e.id===d.id))];\n  const filtered=allArticles.filter(r=>r.title.toLowerCase().includes(search.toLowerCase())||r.cat?.toLowerCase().includes(search.toLowerCase())||r.summary?.toLowerCase().includes(search.toLowerCase()));\n\n  const analyze=async(r)=>{\n    setAiLoad(true);setAiAn(null);\n    const res=await callAI(\'Expert fact-checking. Titre: "\'+r.title+\'". Résumé: "\'+r.summary+\'". Contenu: "\'+r.content+\'". JSON: {"score":0-100,"verdict":"phrase courte","facts":["f1","f2"],"sources":["s1"],"danger":"faible|moyen|élevé"}\');\n    setAiAn(res||{score:95,verdict:"Révélation documentée par des archives officielles",facts:["Documents déclassifiés","Reconnu officiellement"],sources:["Archives nationales"],danger:"élevé"});\n    setAiLoad(false);\n  };\n\n  if(selected){\n    const r=selected;\n    const revC=comments[r.id]||[];\n    return(\n      <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:64}}>\n        <TopBar title={r.title} onBack={()=>{setSelected(null);setAiAn(null);}}\n          right={<span style={{fontSize:\'0.56rem\',color:C.green,background:C.green+\'12\',border:\'1px solid \'+C.green+\'28\',padding:\'2px 7px\',borderRadius:20,fontFamily:MONO}}>✦ VÉRIFIÉ</span>}/>\n        <div style={{flex:1,overflowY:\'auto\',padding:\'16px\'}}>\n          <div style={{display:\'flex\',gap:5,flexWrap:\'wrap\',marginBottom:11}}>{[r.cat,...(r.tags||[])].filter(Boolean).map(t=><CTag key={t} t={t}/>)}</div>\n          <p style={{fontFamily:SERIF,fontSize:\'0.98rem\',lineHeight:1.65,color:C.text2,fontStyle:\'italic\',marginBottom:13}}>{r.summary}</p>\n          <div style={{display:\'flex\',gap:11,alignItems:\'center\',marginBottom:14,flexWrap:\'wrap\'}}>\n            <Coin v={r.mjc}/><span style={{color:C.text3,fontSize:\'0.66rem\',fontFamily:MONO}}>↑{r.votes} votes</span>\n            <div style={{flex:1,minWidth:70}}><Bar s={r.cred} sm/></div>\n            {r.year&&<span style={{fontSize:\'0.58rem\',color:C.text3,fontFamily:MONO}}>{r.year}–{r.end}</span>}\n          </div>\n          <HR/>\n          <div style={{padding:\'13px 0\'}}>\n            <div style={{fontSize:\'0.56rem\',color:C.text3,fontFamily:MONO,letterSpacing:\'.1em\',marginBottom:9}}>DOSSIER</div>\n            <p style={{fontFamily:SERIF,lineHeight:1.8,fontSize:\'0.9rem\',color:C.text2}}>{r.content}</p>\n          </div>\n          <HR/>\n          <div style={{padding:\'13px 0\'}}>\n            <div style={{display:\'flex\',justifyContent:\'space-between\',alignItems:\'center\',marginBottom:9}}>\n              <div style={{fontSize:\'0.56rem\',color:C.text3,fontFamily:MONO,letterSpacing:\'.1em\'}}>ANALYSE IA CLAUDE</div>\n              {!aiAn&&<button onClick={()=>analyze(r)} disabled={aiLoad} className="tap" style={{background:C.cyan,color:\'#000\',border:\'none\',padding:\'5px 12px\',borderRadius:20,fontSize:\'0.66rem\',cursor:\'pointer\',fontWeight:700,display:\'flex\',alignItems:\'center\',gap:5}}>\n                {aiLoad?<><Spin/><span>Analyse...</span></>:<span>🤖 Analyser</span>}\n              </button>}\n            </div>\n            {aiAn&&(\n              <div className="pi" style={{background:C.surf,borderRadius:C.r2,padding:\'12px\',border:\'1px solid \'+C.border2}}>\n                <div style={{display:\'flex\',gap:11,marginBottom:8,flexWrap:\'wrap\'}}>\n                  <div style={{flex:1,minWidth:90}}><div style={{fontSize:\'0.52rem\',color:C.text3,fontFamily:MONO,marginBottom:3}}>CRÉDIBILITÉ</div><Bar s={aiAn.score} sm/></div>\n                  <div><div style={{fontSize:\'0.52rem\',color:C.text3,fontFamily:MONO,marginBottom:3}}>DANGER</div>\n                    <span style={{fontSize:\'0.6rem\',fontFamily:MONO,fontWeight:700,color:(aiAn.danger||\'\')===\'élevé\'?C.red:(aiAn.danger||\'\')===\'moyen\'?C.amber:C.green}}>{(aiAn.danger||\'\').toUpperCase()}</span>\n                  </div>\n                </div>\n                <p style={{fontSize:\'0.8rem\',color:C.accent,fontStyle:\'italic\',marginBottom:8,fontFamily:SERIF}}>"{aiAn.verdict}"</p>\n                <div style={{display:\'grid\',gridTemplateColumns:\'1fr 1fr\',gap:9}}>\n                  <div><div style={{fontSize:\'0.52rem\',color:C.text3,fontFamily:MONO,marginBottom:3}}>FAITS</div>{(aiAn.facts||[]).map(f=><div key={f} style={{fontSize:\'0.68rem\',color:C.green+\'80\',marginBottom:2}}>✓ {f}</div>)}</div>\n                  <div><div style={{fontSize:\'0.52rem\',color:C.text3,fontFamily:MONO,marginBottom:3}}>SOURCES</div>{(aiAn.sources||[]).map(s=><div key={s} style={{fontSize:\'0.68rem\',color:C.text2,marginBottom:2}}>◆ {s}</div>)}</div>\n                </div>\n              </div>\n            )}\n          </div>\n          <HR/>\n          <div style={{padding:\'13px 0\'}}>\n            <div style={{fontSize:\'0.56rem\',color:C.text3,fontFamily:MONO,letterSpacing:\'.1em\',marginBottom:11}}>COMMENTAIRES ({revC.length})</div>\n            {revC.map((c,i)=>(\n              <div key={i} style={{display:\'flex\',gap:8,marginBottom:12}}>\n                <Ava alias={c.alias} level={c.level||\'Nouveau\'} size={26}/>\n                <div style={{flex:1}}>\n                  <div style={{display:\'flex\',gap:5,alignItems:\'center\',marginBottom:3,flexWrap:\'wrap\'}}>\n                    <span style={{fontWeight:700,fontSize:\'0.76rem\'}}>{c.alias}</span>\n                    <Pill level={c.level||\'Nouveau\'}/>\n                    <span style={{color:C.text3,fontSize:\'0.6rem\',marginLeft:\'auto\',fontFamily:MONO}}>{c.time}</span>\n                  </div>\n                  <p style={{fontSize:\'0.81rem\',color:C.text2,lineHeight:1.55,fontFamily:SERIF}}>{c.text}</p>\n                </div>\n              </div>\n            ))}\n            <div style={{display:\'flex\',gap:7,marginTop:5}}>\n              <input value={commentTxt} onChange={e=>setCommentTxt(e.target.value)} placeholder="Commenter..." style={{flex:1,background:C.surf2,border:\'1.5px solid \'+C.border,borderRadius:20,padding:\'9px 13px\',fontSize:\'0.83rem\',outline:\'none\',color:C.text}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>\n              <button onClick={()=>{if(commentTxt.trim()){setComments(m=>({...m,[r.id]:[...revC,{alias:\'Vous\',level:\'Nouveau\',text:commentTxt,time:\'maintenant\'}]}));setCommentTxt(\'\');}}} style={{width:38,height:38,borderRadius:\'50%\',background:C.accent,b :\'1px solid \'+C.green+\'28\',padding:\'2px 6px\',borderRadius:20,fontFamily:MONO}}>✦ VÉRIFIÉ</span>\n                {r.cat&&<CTag t={r.cat}/>}\n                <div style={{marginLeft:\'auto\'}}><Bar s={r.cred||95} sm/></div>\n              </div>\n              <h3 style={{fontFamily:SERIF,fontSize:\'0.98rem\',fontWeight:400,marginBottom:4,lineHeight:1.3}}>{r.title}</h3>\n              <p style={{fontSize:\'0.78rem\',color:C.text2,lineHeight:1.5,marginBottom:8}}>{r.summary}</p>\n              <div style={{display:\'flex\',gap:8,alignItems:\'center\',flexWrap:\'wrap\'}}>\n                <Coin v={r.mjc||0} sm/><span style={{color:C.text3,fontSize:\'0.65rem\',fontFamily:MONO}}>↑{r.votes||0}</span>\n                {(r.tags||[]).map(t=><CTag key={t} t={t}/>)}\n              </div>\n            </div>\n            <HR/>\n          </div>\n        ))}\n        <div style={{height:20}}/>\n      </div>\n    </div>\n  );\n}\n\n/* ══ MESSAGES ══ */\nfunction Messages({user}){\n  const[convs,setConvs]=useState([]);\n  const[active,setActive]=useState(null);\n  const[messages,setMessages]=useState([]);\n  const[input,setInput]=useState(\'\');\n  const[loading,setLoading]=useState(true);\n  const[users,setUsers]=useState([]);\n  const[showNew,setShowNew]=useState(false);\n  const msgEnd=useRef(null);\n\n  useEffect(()=>{loadConvs();},[]);\n\n  const loadConvs=async()=>{\n    setLoading(true);\n    const data=await supa.query(\'conversations\',{\n      select:\'*,user1:users!conversations_user1_id_fkey(alias,level,verified),user2:users!conversations_user2_id_fkey(alias,level,verified)\',\n      filter:`user1_id=eq.${user.id},user2_id=eq.${user.id}`,\n      order:\'last_message_at.desc\'\n    });\n    if(Array.isArray(data)) setConvs(data);\n    setLoading(false);\n  };\n\n  const openConv=async(conv)=>{\n    setActive(conv);\n    const data=await supa.query(\'messages\',{filter:`conversation_id=eq.${conv.id}`,order:\'created_at.asc\',select:\'*\'});\n    if(Array.isArray(data)) setMessages(data);\n    setTimeout(()=>msgEnd.current?.scrollIntoView({behavior:\'smooth\'}),100);\n  };\n\n  const sendMsg=async()=>{\n    if(!input.trim()||!active)return;\n    const msg={conversation_id:active.id,sender_id:user.id,content:input};\n    const res=await supa.insert(\'messages\',msg);\n    if(Array.isArray(res)&&res[0]){\n      setMessages(m=>[...m,res[0]]);\n      await supa.update(\'conversations\',{last_message:input,last_message_at:new Date().toISOString()},`id=eq.${active.id}`);\n      setInput(\'\');\n      setTimeout(()=>msgEnd.current?.scrollIntoView({behavior:\'smooth\'}),80);\n    }\n  };\n\n  const getOther=(conv)=>{\n    if(conv.user1_id===user.id) return conv.user2;\n    return conv.user1;\n  };\n\n  if(active){\n    const other=getOther(active);\n    return(\n      <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:0}}>\n        <TopBar title={other?.alias||\'Conversation\'} sub={other?.level+\' · Chiffré E2E\'} onBack={()=>{setActive(null);setMessages([]);}}\n          right={<div style={{display:\'flex\',alignItems:\'center\',gap:5}}><div style={{width:6,height:6,borderRadius:\'50%\',background:C.green,animation:\'pulse 2s infinite\'}}/><span style={{fontSize:\'0.56rem\',color:C.green,fontFamily:MONO}}>En ligne</span></div>}\n        />\n        <div style={{flex:1,overflowY:\'auto\',padding:\'12px 16px\',display:\'flex\',flexDirection:\'column\',gap:8}}>\n          {messages.map(m=>{\n            const mine=m.sender_id===user.id;\n            return(\n              <div key={m.id} className="fi" style={{display:\'flex\',flexDirection:\'column\',alignItems:mine?\'flex-end\':\'flex-start\'}}>\n                <div style={{maxWidth:\'78%\',background:mine?C.accent:C.surf2,color:mine?\'#fff\':C.text,borderRadius:mine?\'14px 14px 2px 14px\':\'14px 14px 14px 2px\',padding:\'9px 13px\',fontSize:\'0.86rem\',lineHeight:1.5,border:mine?\'none\':\'1px solid \'+C.border2}}>\n                  {m.content}\n                </div>\n                <div style={{fontSize:\'0.56rem\',color:C.text3,fontFamily:MONO,marginTop:2}}>{new Date(m.created_at).toLocaleTimeString(\'fr-FR\',{hour:\'2-digit\',minute:\'2-digit\'})}</div>\n              </div>\n            );\n          })}\n          <div ref={msgEnd}/>\n        </div>\n        <div style={{padding:\'10px 16px\',background:C.bg,borderTop:\'1px solid \'+C.border,paddingBottom:\'max(10px,env(safe-area-inset-bottom))\'}}>\n          <div style={{display:\'flex\',gap:7,alignItems:\'center\'}}>\n            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key===\'Enter\'&&!e.shiftKey){e.preventDefault();sendMsg();}}} placeholder="Message chiffré..." style={{flex:1,background:C.surf2,border:\'1.5px solid \'+C.border,borderRadius:20,padding:\'10px 14px\',color:C.text,fontSize:\'0.86rem\',outline:\'none\'}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>\n            <button onClick={sendMsg} style={{width:36,height:36,borderRadius:\'50%\',background:input.trim()?C.accent:C.surf2,border:\'none\',cursor:\'pointer\',color:input.trim()?\'#fff\':C.text3,display:\'flex\',alignItems:\'center\',justifyContent:\'center\',flexShrink:0,transition:\'all .18s\'}}>\n              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>\n            </button>\n          </div>\n        </div>\n      </div>\n    );\n  }\n\n  return(\n    <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:64}}>\n      <TopBar title="Messages" sub="Chiffrés de bout en bout"/>\n      <div style={{padding:\'10px 16px\',background:C.green+\'06\',borderBottom:\'1px solid \'+C.green+\'18\',display:\'flex\',gap:7,alignItems:\'center\'}}>\n        <div style={{width:7,height:7,borderRadius:\'50%\',background:C.green,flexShrink:0}}/>\n        <span style={{fontSize:\'0.62rem\',color:C.green,fontFamily:MONO}}>Chiffrement E2E actif</span>\n      </div>\n      <div style={{flex:1,overflowY:\'auto\'}}>\n        {loading&&<div style={{display:\'flex\',justifyContent:\'center\',padding:\'40px\'}}><Spin/></div>}\n        {!loading&&convs.length===0&&(\n          <div style={{textAlign:\'center\',padding:\'48px 24px\',color:C.text2}}>\n            <div style={{fontSize:\'2rem\',marginBottom:12}}>💬</div>\n            <p style={{fontFamily:SERIF,fontSize:\'1rem\'}}>Aucun message pour l\'instant.</p>\n            <p style={{fontSize:\'0.78rem\',marginTop:6}}>Interagissez avec des membres pour démarrer une conversation.</p>\n          </div>\n        )}\n        {convs.map(conv=>{\n          const other=getOther(conv);\n          return(\n            <div key={conv.id}>\n              <button onClick={()=>openConv(conv)} style={{width:\'100%\',background:\'none\',border:\'none\',cursor:\'pointer\',padding:\'13px 16px\',textAlign:\'left\',display:\'flex\',gap:11,alignItems:\'center\'}} onMouseEnter={e=>e.currentTarget.style.background=C.surf} onMouseLeave={e=>e.currentTarget.style.background=\'none\'}>\n                <Ava alias={other?.alias||\'?\'} level={other?.level||\'Nouveau\'} size={44}/>\n                <div style={{flex:1,minWidth:0}}>\n                  <div style={{display:\'flex\',justifyContent:\'space-between\',alignItems:\'center\',marginBottom:3}}>\n                    <div style={{display:\'flex\',gap:5,alignItems:\'center\'}}>\n                      <span style={{fontWeight:600,fontSize:\'0.88rem\'}}>{other?.alias||\'Anonyme\'}</span>\n                      {other?.verified&&<span style={{color:C.accent,fontSize:\'0.65rem\'}}>✦</span>}\n                      <Pill level={other?.level||\'Nouveau\'}/>\n                    </div>\n                    <span style={{fontSize:\'0.6rem\',color:C.text3,fontFamily:MONO,flexShrink:0}}>{new Date(conv.last_message_at).toLocaleDateString(\'fr-FR\')}</span>\n                  </div>\n                  <p style={{fontSize:\'0.78rem\',color:C.text2,overflow:\'hidden\',textOverflow:\'ellipsis\',whiteSpace:\'nowrap\'}}>{conv.last_message||\'Démarrer la conversation\'}</p>\n                </div>\n              </button>\n              <HR/>\n            </div>\n          );\n        })}\n        <div style={{height:20}}/>\n      </div>\n    </div>\n  );\n}\n\n/* ══ SUBMIT ══ */\nfunction Submit({user}){\n  const[step,setStep]=useState(\'form\');\n  const[form,setForm]=useState({title:\'\',cat:\'\',summary:\'\',content:\'\',sources:\'\'});\n  const[aiRT,setAiRT]=useState(null);\n  const[loadRT,setLoadRT]=useState(false);\n  const[aiPre,setAiPre]=useState(null);\n  const[loadPre,setLoadPre]=useState(false);\n  const[loading,setLoading]=useState(false);\n  const deb=useRef(null);\n\n  const analyzeRT=useCallback(async(text)=>{\n    if(text.length<28){setAiRT(null);return;}\n    setLoadRT(true);\n    const r=await callAI(\'Analyse ce texte: "\'+text+\'". JSON: {"score":0-100,"tip":"conseil max 8 mots"}\',200);\n    setAiRT(r||{score:Math.min(80,28+text.length/3),tip:"Ajoutez sources primaires officielles."});\n    setLoadRT(false);\n  },[]);\n\n  const handleChange=(k,v)=>{\n    setForm(f=>({...f,[k]:v}));\n    if(k===\'title\'||k===\'summary\'){clearTimeout(deb.current);deb.current=setTimeout(()=>analyzeRT((form.title+\' \'+v).trim()),800);}\n  };\n\n  const preAnalyze=async()=>{\n    if(!form.title||!form.summary)return;\n    setLoadPre(true);\n    const r=await callAI(\'Pré-analyse. Titre:"\'+form.title+\'". Résumé:"\'+form.summary+\'". JSON: {"score":0-100,"validation":"faible|moyenne|élevée","forts":["p1"],"améliorer":["p1"]}\');\n    setAiPre(r||{score:65,validation:"moyenne",forts:["Sujet d\'intérêt public"],améliorer:["Manque de sources"]});\n    setLoadPre(false);\n  };\n\n  const submitArticle=async()=>{\n    if(!form.title||!form.cat||!form.summary)return;\n    setLoading(true);\n    const data={id:form.title.toLowerCase().replace(/\\s+/g,\'-\').replace(/[^a-z0-9-]/g,\'\').slice(0,30)+\'-\'+Date.now(),title:form.title,category:form.cat,summary:form.summary,content:form.content,tags:[],status:\'pending\',submitted_by:user.id,cred_score:50,votes_count:0,mojocoin_reward:0};\n    await supa.insert(\'wiki_articles\',data);\n    // Les MJC (+10) seront crédités automatiquement à la validation par 50 membres\n    setLoading(false);\n    setStep(\'success\');\n  };\n\n  if(step===\'success\')return(\n    <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:64}}>\n      <TopBar title="Soumission"/>\n      <div style={{flex:1,display:\'flex\',flexDirection:\'column\',alignItems:\'center\',justifyContent:\'center\',padding:\'32px 24px\',textAlign:\'center\'}}>\n        <div className="pi" style={{width:72,height:72,borderRadius:\'50%\',background:C.accent+\'18\',border:\'2px solid \'+C.accent,display:\'flex\',alignItems:\'center\',justifyContent:\'center\',fontSize:\'2rem\',marginBottom:20}}>✦</div>\n        <h2 style={{fontFamily:SERIF,fontSize:\'1.6rem\',marginBottom:8}}>Révélation soumise</h2>\n        <p style={{color:C.text2,fontSize:\'0.88rem\',lineHeight:1.6,marginBottom:24}}>En modération communautaire. Vous serez notifié à chaque étape.</p>\n        <p style={{fontSize:\'0.78rem\',color:C.text2,lineHeight:1.6,marginBottom:28}}>Votre article sera soumis à la communauté.<br/>Vous recevrez <strong style={{color:C.amber}}>10 MJC</strong> une fois validé par 50 membres.</p>\n        <button onClick={()=>{setStep(\'form\');setForm({title:\'\',cat:\'\',summary:\'\',content:\'\',sources:\'\'});setAiPre(null);setAiRT(null);}} className="tap" style={{width:\'100%\',background:C.surf2,border:\'1px solid \'+C.border2,color:C.text,padding:\'14px\',borderRadius:C.r,cursor:\'pointer\',fontWeight:600,fontSize:\'0.88rem\'}}>\n          Soumettre une autre révélation\n        </button>\n      </div>\n    </div>\n  );\n\n  const inp={width:\'100%\',background:C.surf2,border:\'1.5px solid \'+C.border,borderRadius:C.r2,padding:\'12px 14px\',color:C.text,fontSize:\'0.88rem\',outline:\'none\',transition:\'border-color .2s\',display:\'block\'};\n  const lbl={fontSize:\'0.58rem\',color:C.text3,fontFamily:MONO,letterSpacing:\'.1em\',marginBottom:6,display:\'block\'};\n\n  return(\n    <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:64}}>\n      <TopBar title="Déposer" sub="IA temps réel · Modération communautaire"/>\n      <div style={{flex:1,overflowY:\'auto\',padding:\'16px\'}}>\n        <div style={{display:\'flex\',flexDirection:\'column\',gap:13}}>\n          <div>\n            <label style={lbl}>TITRE</label>\n            <input value={form.title} onChange={e=>handleChange(\'title\',e.target.value)} placeholder="Ex: Opération Mockingbird" style={inp} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>\n          </div>\n          {(loadRT||aiRT)&&(\n            <div className="fi" style={{padding:\'9px 11px\',background:C.cyan+\'0a\',border:\'1px solid \'+C.cyan+\'1a\',borderRadius:C.r3,display:\'flex\',alignItems:\'center\',gap:9}}>\n              {loadRT&&<><Spin/><span style={{fontSize:\'0.68rem\',color:C.cyan,fontFamily:MONO}}>Claude...</span></>}\n              {aiRT&&!loadRT&&<div style={{flex:1}}><Bar s={aiRT.score} sm/>{aiRT.tip&&<p style={{fontSize:\'0.66rem\',color:C.text2,marginTop:4,fontStyle:\'italic\'}}>💡 {aiRT.tip}</p>}</div>}\n            </div>\n          )}\n          <div>\n            <label style={lbl}>RÉSUMÉ</label>\n            <textarea value={form.summary} onChange={e=>handleChange(\'summary\',e.target.value)} placeholder="L\'essentiel en 1-2 phrases" rows={2} style={{...inp,resize:\'none\',lineHeight:1.6,fontFamily:SERIF}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>\n          </div>\n          <div>\n            <label style={lbl}>CATÉGORIE</label>\n            <select value={form.cat} onChange={e=>handleChange(\'cat\',e.target.value)} style={{...inp,color:form.cat?C.text:C.text3}}>\n              <option value="">Sélectionner...</option>\n              {[\'Gouvernement\',\'Surveillance\',\'Finance\',\'Médical\',\'Militaire\',\'Environnement\',\'Faux Drapeau\',\'Médias\',\'Histoire\'].map(c=><option key={c} style={{background:C.surf2,color:C.text}}>{c}</option>)}\n            </select>\n          </div>\n          <div>\n            <label style={lbl}>DOSSIER COMPLET</label>\n            <textarea value={form.content} onChange={e=>handleChange(\'content\',e.target.value)} placeholder="Chronologie, preuves, acteurs..." rows={5} style={{...inp,resize:\'vertical\',lineHeight:1.65,fontFamily:SERIF}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>\n          </div>\n          <div>\n            <label style={lbl}>SOURCES</label>\n            <textarea value={form.sources} onChange={e=>handleChange(\'sources\',e.target.value)} placeholder="https://... | FOIA doc | archives.gov/..." rows={2} style={{...inp,resize:\'none\',fontFamily:MONO,fontSize:\'0.76rem\'}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>\n          </div>\n          <button onClick={preAnalyze} disabled={loadPre||!form.title} className="tap" style={{width:\'100%\',background:C.cyan+\'12\',color:C.cyan,border:\'1px solid \'+C.cyan+\'25\',padding:\'12px\',borderRadius:C.r2,cursor:\'pointer\',fontWeight:600,fontSize:\'0.8rem\',display:\'flex\',alignItems:\'center\',justifyContent:\'center\',gap:7}}>\n            {loadPre?<><Spin/><span>Analyse...</span></>:<span>🤖 Pré-analyse IA</span>}\n          </button>\n          {aiPre&&(\n            <div className="pi" style={{background:C.surf,border:\'1px solid \'+C.border2,borderRadius:C.r2,padding:\'13px\'}}>\n              <div style={{display:\'flex\',gap:11,marginBottom:9,flexWrap:\'wrap\'}}>\n                <div style={{flex:1,minWidth:90}}><div style={{fontSize:\'0.54rem\',color:C.text3,fontFamily:MONO,marginBottom:3}}>SCORE</div><Bar s={aiPre.score} sm/></div>\n                <div><div style={{fontSize:\'0.54rem\',color:C.text3,fontFamily:MONO,marginBottom:3}}>VALIDATION</div>\n                  <span style={{fontSize:\'0.62rem\',fontWeight:700,fontFamily:MONO,color:(aiPre.validation||\'\')===\'élevée\'?C.green:(aiPre.validation||\'\')===\'moyenne\'?C.amber:C.red}}>{(aiPre.validation||\'\').toUpperCase()}</span>\n                </div>\n              </div>\n              <div style={{display:\'grid\',gridTemplateColumns:\'1fr 1fr\',gap:9}}>\n                <div>{(aiPre.forts||[]).map(p=><div key={p} style={{fontSize:\'0.68rem\',color:C.green+\'70\',marginBottom:2}}>✓ {p}</div>)}</div>\n                <div>{(aiPre.améliorer||[]).map(p=><div key={p} style={{fontSize:\'0.68rem\',color:C.amber+\'70\',marginBottom:2}}>⚠ {p}</div>)}</div>\n              </div>\n            </div>\n          )}\n          <button onClick={submitArticle} disabled={loading||!form.title||!form.cat} className="tap" style={{width:\'100%\',background:loading||!form.title||!form.cat?C.surf2:C.accent,color:loading||!form.title||!form.cat?C.text3:\'#fff\',border:\'none\',padding:\'15px\',borderRadius:C.r,fontWeight:700,fontSize:\'0.92rem\',cursor:\'pointer\',display:\'flex\',alignItems:\'center\',justifyContent:\'center\',gap:8,transition:\'all .2s\'}}>\n            {loading?<><Spin/><span>Envoi...</span></>:\'Soumettre →\'}\n          </button>\n        </div>\n        <div style={{height:20}}/>\n      </div>\n    </div>\n  );\n}\n\n/* ══ PROFILE ══ */\nfunction Profile({user,onLogout}){\n  const[copied,setCopied]=useState(false);\n  const[txs,setTxs]=useState([]);\n  const[balance,setBalance]=useState(user.mojocoin_balance||0);\n\n  useEffect(()=>{\n    supa.query(\'transactions\',{filter:`user_id=eq.${user.id}`,order:\'created_at.desc\',limit:10,select:\'*\'}).then(data=>{if(Array.isArray(data))setTxs(data);});\n  },[]);\n\n  const copy=()=>{\n    const code=user.referral_code||\'MOJO-???\';\n    try{navigator.clipboard.writeText(code);}catch{const t=document.createElement(\'textarea\');t.value=code;document.body.appendChild(t);t.select();document.execCommand(\'copy\');document.body.removeChild(t);}\n    setCopied(true);setTimeout(()=>setCopied(false),1800);\n  };\n\n  const logout=async()=>{await supa.auth_logout();onLogout();};\n\n  return(\n    <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:64}}>\n      <TopBar title="Profil"\n        right={<button onClick={logout} style={{background:C.red+\'15\',border:\'1px solid \'+C.red+\'30\',color:C.red,padding:\'5px 11px\',borderRadius:20,cursor:\'pointer\',fontSize:\'0.7rem\',fontWeight:600,fontFamily:SANS}}>Déconnexion</button>}\n      />\n      <div style={{flex:1,overflowY:\'auto\'}}>\n        {/* User card */}\n        <div style={{padding:\'20px 16px 16px\',background:\'linear-gradient(180deg,\'+C.accent+\'06 0%,transparent 100%)\'}}>\n          <div style={{display:\'flex\',gap:14,alignItems:\'center\',marginBottom:16}}>\n            <Ava alias={user.alias||\'?\'} level={user.level||\'Nouveau\'} size={56}/>\n            <div style={{flex:1}}>\n              <div style={{fontWeight:700,fontSize:\'1.1rem\',marginBottom:5}}>{user.alias}</div>\n              <Pill level={user.level||\'Nouveau\'}/>\n            </div>\n            <div style={{textAlign:\'right\'}}>\n              <div style={{fontFamily:MONO,fontSize:\'1.3rem\',fontWeight:600,color:C.amber}}>{balance}</div>\n              <div style={{fontSize:\'0.55rem\',color:C.text3,fontFamily:MONO}}>MJC</div>\n            </div>\n          </div>\n          <div style={{display:\'grid\',gridTemplateColumns:\'repeat(3,1fr)\',gap:8}}>\n            {[[\'0\',\'Révélations\'],[\'0\',\'Votes\'],[\'0\',\'Filleuls\']].map(([v,l])=>(\n              <div key={l} style={{background:C.surf,border:\'1px solid \'+C.border,borderRadius:C.r3,padding:\'10px\',textAlign:\'center\'}}>\n                <div style={{fontFamily:SERIF,fontSize:\'1.3rem\',color:C.accent}}>{v}</div>\n                <div style={{fontSize:\'0.55rem\',color:C.text3,fontFamily:MONO}}>{l}</div>\n              </div>\n            ))}\n          </div>\n        </div>\n        <HR/>\n\n        {/* Abonnement */}\n        <div style={{padding:\'14px 16px\'}}>\n          <div style={{fontSize:\'0.58rem\',color:C.text3,fontFamily:MONO,letterSpacing:\'.1em\',marginBottom:9}}>ABONNEMENT</div>\n          <div style={{background:user.subscription_active?C.green+\'0a\':C.red+\'0a\',border:\'1px solid \'+(user.subscription_active?C.green:C.red)+\'22\',borderRadius:C.r2,padding:\'12px 14px\',display:\'flex\',justifyContent:\'space-between\',alignItems:\'center\'}}>\n            <div>\n              <div style={{fontWeight:600,fontSize:\'0.85rem\',marginBottom:3}}>\n                {user.subscription_active?\'✓ Actif\':\'✗ Inactif\'}\n              </div>\n              <div style={{fontSize:\'0.7rem\',color:C.text2}}>10 € / mois · Paiement CB</div>\n            </div>\n            {!user.subscription_active&&<button className="tap" style={{background:C.amber,color:\'#000\',border:\'none\',padding:\'7px 13px\',borderRadius:20,cursor:\'pointer\',fontSize:\'0.72rem\',fontWeight:700}}>Activer</button>}\n          </div>\n        </div>\n        <HR/>\n\n        {/* Code parrain */}\n        <div style={{padding:\'14px 16px\'}}>\n          <div style={{fontSize:\'0.58rem\',color:C.text3,fontFamily:MONO,letterSpacing:\'.1em\',marginBottom:9}}>CODE PARRAIN</div>\n          <div style={{background:C.surf,border:\'1px solid \'+C.border2,borderRadius:C.r2,padding:\'11px 13px\',display:\'flex\',alignItems:\'center\',gap:9}}>\n            <span style={{fontFamily:MONO,fontSize:\'0.88rem\',fontWeight:600,color:C.accent,flex:1,letterSpacing:\'.04em\'}}>{user.referral_code||\'Génération...\'}</span>\n            <button onClick={copy} className="tap" style={{background:copied?C.green:C.surf2,color:copied?\'#000\':C.text2,border:\'1px solid \'+C.border2,padding:\'5px 11px\',borderRadius:C.r3,cursor:\'pointer\',fontSize:\'0.7rem\',fontWeight:600,transition:\'all .18s\',whiteSpace:\'nowrap\'}}>\n              {copied?\'✓ Copié\':\'Copier\'}\n            </button>\n          </div>\n          <p style={{fontSize:\'0.66rem\',color:C.text3,marginTop:7}}>50 MJC par filleul parrainé</p>\n        </div>\n        <HR/>\n\n        {/* Transactions */}\n        <div style={{padding:\'14px 16px\'}}>\n          <div style={{fontSize:\'0.58rem\',color:C.text3,fontFamily:MONO,letterSpacing:\'.1em\',marginBottom:10}}>TRANSACTIONS RÉCENTES</div>\n          {txs.length===0&&<p style={{fontSize:\'0.78rem\',color:C.text2}}>Aucune transaction pour l\'instant.</p>}\n          {txs.map((tx,i)=>(\n            <div key={i} style={{display:\'flex\',justifyContent:\'space-between\',alignItems:\'center\',padding:\'9px 0\',borderBottom:\'1px solid \'+C.border}}>\n              <div><div style={{fontWeight:500,fontSize:\'0.8rem\',marginBottom:1}}>{tx.label}</div><div style={{color:C.text3,fontSize:\'0.6rem\',fontFamily:MONO}}>{new Date(tx.created_at).toLocaleDateString(\'fr-FR\')}</div></div>\n              <span style={{color:tx.type===\'earn\'?C.green:C.red,fontWeight:700,fontFamily:MONO,fontSize:\'0.78rem\',marginLeft:10}}>{tx.amount>0?\'+\':\'\'}{tx.amount} MJC</span>\n            </div>\n          ))}\n        </div>\n        <div style={{height:20}}/>\n      </div>\n    </div>\n  );\n}\n\n/* ══ APP ROOT ══ */\nfunction App(){\n  const[user,setUser]=useState(null);\n  const[tab,setTab]=useState(\'feed\');\n  const[wikiTarget,setWikiTarget]=useState(null);\n  const[checking,setChecking]=useState(true);\n\n  // Restore session on load\n  useEffect(()=>{\n    const token=localStorage.getItem(\'mojo_token\');\n    const saved=localStorage.getItem(\'mojo_user\');\n    if(token&&saved){\n      try{\n        window.__token=token;\n        const u=JSON.parse(saved);\n        window.__user=u;\n        setUser(u);\n      }catch(e){}\n    }\n    setChecking(false);\n  },[]);\n\n  const handleAuth=(u)=>{setUser(u);localStorage.setItem(\'mojo_user\',JSON.stringify(u));};\n  const handleLogout=()=>{setUser(null);localStorage.removeItem(\'mojo_token\');localStorage.removeItem(\'mojo_user\');};\n  const goToWiki=(art)=>{setWikiTarget(art);setTab(\'wiki\');};\n\n  if(checking){\n    return(\n      <div style={{minHeight:\'100vh\',background:C.bg,display:\'flex\',alignItems:\'center\',justifyContent:\'center\'}}>\n        <Spin/>\n      </div>\n    );\n  }\n\n  if(!user) return <Auth onAuth={handleAuth}/>;\n\n  const screens={\n    feed:<Feed user={user} onGoToWiki={goToWiki}/>,\n    wiki:<Wiki initialArticle={wikiTarget} onClearInitial={()=>setWikiTarget(null)}/>,\n    msgs:<Messages user={user}/>,\n    submit:<Submit user={user}/>,\n    profile:<Profile user={user} onLogout={handleLogout}/>,\n  };\n\n  return(\n    <div style={{display:\'flex\',flexDirection:\'column\',minHeight:\'100vh\',background:C.bg}}>\n      <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingBottom:64}}>\n        {screens[tab]||<Feed user={user} onGoToWiki={goToWiki}/>}\n      </div>\n      <BotBar tab={tab} setTab={setTab} unread={0}/>\n    </div>\n  );\n}\n\nvar splash=document.getElementById(\'splash\');\nif(splash){splash.style.opacity=\'0\';setTimeout(function(){if(splash.parentNode)splash.parentNode.removeChild(splash);},500);}\nReactDOM.render(<App/>,document.getElementById(\'root\'));';

function updateStatus(msg){
  var el = document.getElementById('sp-status');
  if(el) el.textContent = msg;
}

function hideSplash(){
  var s = document.getElementById('splash');
  if(s){ s.style.transition='opacity 0.4s'; s.style.opacity='0'; setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},400); }
}

function runApp(){
  updateStatus('Démarrage...');
  try{
    var script = document.createElement('script');
    script.type = 'text/babel';
    script.setAttribute('data-presets','react');
    script.textContent = window.__CODE__;
    document.head.appendChild(script);
    Babel.transformScriptTags();
    hideSplash();
  }catch(e){
    updateStatus('Erreur: '+e.message);
    console.error(e);
  }
}

function loadBabel(){
  updateStatus('Chargement...');
  // Vérifier si Babel est en cache
  if(window.Babel){runApp();return;}
  var script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js';
  script.onload = function(){ updateStatus('Compilation...'); setTimeout(runApp, 100); };
  script.onerror = function(){ updateStatus('Erreur réseau. Rechargez.'); };
  document.head.appendChild(script);
}

// Démarrer quand React est prêt
if(document.readyState === 'complete'){
  loadBabel();
} else {
  window.addEventListener('load', loadBabel);
}
</script>

</body>
</html>
