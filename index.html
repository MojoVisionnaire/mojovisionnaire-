<!DOCTYPE html>

<html lang="fr" style="color-scheme:dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="color-scheme" content="dark"/>
<title>mojoVisionnaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#07080e}
body{background:#07080e;color:#dde0ec;font-family:"Outfit",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button,input,textarea,select{font-family:"Outfit",sans-serif;-webkit-appearance:none;appearance:none;color-scheme:dark}
input,textarea,select{color:#dde0ec}
::-webkit-scrollbar{display:none}
::placeholder{color:#2e3048}
#splash{position:fixed;inset:0;background:#07080e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;transition:opacity 0.4s}
.sp-logo{font-family:"DM Serif Display",serif;font-size:2.8rem;color:#dde0ec}
.sp-logo span{color:#6e72ff}
.sp-bar{width:140px;height:3px;background:#1a1a2e;border-radius:3px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#6e72ff,#00d2ff);border-radius:3px;animation:ld 3.5s ease forwards}
.sp-sub{font-size:0.62rem;font-family:"Fira Code",monospace;color:#383a52;letter-spacing:.1em}
@keyframes ld{0%{width:0}50%{width:60%}90%{width:90%}100%{width:100%}}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pi{0%{transform:scale(.93);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0);opacity:0}40%{transform:scale(1);opacity:1}}
.fu{animation:fu .28s ease both}
.fi{animation:fi .2s ease both}
.su{animation:su .35s cubic-bezier(.16,1,.3,1) both}
.pi{animation:pi .2s cubic-bezier(.16,1,.3,1) both}
.tap{transition:transform .08s,opacity .08s}
.tap:active{transform:scale(.96);opacity:.82}
.typing span{display:inline-block;width:5px;height:5px;border-radius:50%;background:#6e72ff;margin:0 2px;animation:dotPulse 1.4s ease infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-logo">mojo<span>Visionnaire</span></div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
  <div class="sp-sub" id="sp-txt">Chargement...</div>
</div>
<div id="root"></div>
<script>
window.__APP__='\nconst{useState,useEffect,useRef,useCallback}=React;\n\n/* ══ SUPABASE CONFIG ══ */\nconst SUPA_URL=\'https://alydmyjnbdyrdioipkek.supabase.co\';\nconst SUPA_KEY=\'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFseWRteWpuYmR5cmRpb2lwa2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzgzNjksImV4cCI6MjA5MzcxNDM2OX0.l7dnJNUTQxdNIXlQKEDbPcx-wO3MXExYrbAbCuRdjtY\';\n\nconst db={\n  async get(table,filter,select){\n    select=select||\'*\';\n    let url=SUPA_URL+\'/rest/v1/\'+table+\'?select=\'+select;\n    if(filter)url+=\'&\'+filter;\n    const r=await fetch(url,{headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+(window.__token||SUPA_KEY)}});\n    return r.json();\n  },\n  async post(table,data){\n    const r=await fetch(SUPA_URL+\'/rest/v1/\'+table,{\n      method:\'POST\',\n      headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+(window.__token||SUPA_KEY),\'Content-Type\':\'application/json\',\'Prefer\':\'return=representation\'},\n      body:JSON.stringify(data)\n    });\n    return r.json();\n  },\n  async patch(table,data,filter){\n    const r=await fetch(SUPA_URL+\'/rest/v1/\'+table+\'?\'+filter,{\n      method:\'PATCH\',\n      headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+(window.__token||SUPA_KEY),\'Content-Type\':\'application/json\',\'Prefer\':\'return=representation\'},\n      body:JSON.stringify(data)\n    });\n    return r.json();\n  },\n  async signup(email,password,alias){\n    const r=await fetch(SUPA_URL+\'/auth/v1/signup\',{\n      method:\'POST\',\n      headers:{\'apikey\':SUPA_KEY,\'Content-Type\':\'application/json\'},\n      body:JSON.stringify({email,password,options:{data:{alias}}})\n    });\n    return r.json();\n  },\n  async login(email,password){\n    const r=await fetch(SUPA_URL+\'/auth/v1/token?grant_type=password\',{\n      method:\'POST\',\n      headers:{\'apikey\':SUPA_KEY,\'Content-Type\':\'application/json\'},\n      body:JSON.stringify({email,password})\n    });\n    return r.json();\n  },\n  async logout(){\n    if(window.__token){\n      await fetch(SUPA_URL+\'/auth/v1/logout\',{method:\'POST\',headers:{\'apikey\':SUPA_KEY,\'Authorization\':\'Bearer \'+window.__token}});\n    }\n    window.__token=null;\n    localStorage.removeItem(\'mojo_token\');\n    localStorage.removeItem(\'mojo_user\');\n  }\n};\n\n/* ══ WIKI EXEMPLES ══ */\nconst WIKI_EX=[\n  {id:\'mkUltra\',title:\'Operation MKUltra\',cat:\'Gouvernement\',year:1953,end:1973,mjc:150,votes:342,cred:98,\n   summary:"Programme secret CIA de contrôle mental via drogues et torture. Déclassifié en 1977.",\n   tags:[\'CIA\',\'Contrôle Mental\'],\n   content:"En 1953, la CIA lance MKUltra, un programme top secret utilisant le LSD, la privation de sommeil et la torture psychologique sur des sujets non consentants. En 1977, des documents déclassifiés révèlent l\'ampleur du programme suite aux travaux du Comité Church."},\n  {id:\'prism\',title:\'Programme PRISM — NSA\',cat:\'Surveillance\',year:2007,end:2013,mjc:220,votes:891,cred:99,\n   summary:"La NSA espionnait massivement via les géants du web. Révélé par Snowden en 2013.",\n   tags:[\'NSA\',\'Big Tech\'],\n   content:"En juin 2013, Edward Snowden révèle que la NSA accédait directement aux serveurs de Google, Apple et Facebook via PRISM. Des millions de données personnelles collectées sans mandat judiciaire."},\n  {id:\'northwoods\',title:\'Opération Northwoods\',cat:\'Faux Drapeau\',year:1962,end:1962,mjc:180,votes:567,cred:97,\n   summary:"Plan militaire US pour simuler des attentats contre ses propres citoyens.",\n   tags:[\'Militaire\',\'Cuba\'],\n   content:"En 1962, les chefs d\'état-major proposent à Kennedy de simuler des attaques terroristes pour justifier une invasion de Cuba. Kennedy refuse et limoge le général Lemnitzer. Déclassifié en 1997."},\n  {id:\'cointelpro\',title:\'COINTELPRO — FBI\',cat:\'Gouvernement\',year:1956,end:1971,mjc:195,votes:712,cred:96,\n   summary:"Programme secret FBI pour surveiller et détruire les mouvements politiques américains.",\n   tags:[\'FBI\',\'Surveillance\'],\n   content:"De 1956 à 1971, le FBI mène COINTELPRO ciblant les Black Panthers, MLK, NAACP. Méthodes : infiltration, désinformation, chantage. Révélé en 1971 après le cambriolage du bureau FBI de Media."},\n];\n\n/* ══ DESIGN TOKENS ══ */\nconst C={\n  bg:\'#07080e\',surf:\'#0d0e18\',surf2:\'#131420\',\n  border:\'#ffffff0a\',border2:\'#ffffff14\',\n  accent:\'#6e72ff\',green:\'#3ddc84\',amber:\'#ffb547\',red:\'#ff4d6d\',cyan:\'#00d2ff\',\n  text:\'#dde0ec\',text2:\'#7a7d9a\',text3:\'#383a52\',\n  r:\'14px\',r2:\'10px\',r3:\'7px\',\n};\nconst CAT_COL={Gouvernement:C.accent,Surveillance:C.cyan,Finance:C.amber,\'Faux Drapeau\':C.red,Médical:\'#c084fc\',Militaire:\'#fb923c\',Histoire:C.green,Médias:\'#f472b6\'};\nconst LVL_COL={Oracle:C.amber,Sentinel:C.red,Archiviste:C.green,Éveillé:C.cyan,Nouveau:C.text3};\nconst LVL_BG={Oracle:\'#ffb54718\',Sentinel:\'#ff4d6d18\',Archiviste:\'#3ddc8418\',Éveillé:\'#00d2ff18\',Nouveau:\'#38385218\'};\n\n/* ══ ATOMS ══ */\nconst Coin=({v,sm})=>(<span style={{display:\'inline-flex\',alignItems:\'center\',gap:3,color:C.amber,fontWeight:600,fontSize:sm?\'0.68rem\':\'0.78rem\',fontFamily:"\'Fira Code\',monospace"}}><span style={{width:sm?12:14,height:sm?12:14,borderRadius:\'50%\',background:\'linear-gradient(135deg,#ffb547,#ff7c00)\',display:\'flex\',alignItems:\'center\',justifyContent:\'center\',fontSize:sm?\'0.35rem\':\'0.42rem\',color:\'#000\',fontWeight:900,flexShrink:0}}>M</span>+{v}</span>);\nconst Pill=({level})=>(<span style={{fontSize:\'0.56rem\',fontFamily:"\'Fira Code\',monospace",color:LVL_COL[level]||C.text3,background:LVL_BG[level]||\'#38385218\',padding:\'2px 7px\',borderRadius:20,whiteSpace:\'nowrap\'}}>{level}</span>);\nconst CTag=({t})=>(<span style={{fontSize:\'0.56rem\',color:CAT_COL[t]||C.text2,background:(CAT_COL[t]||C.text2)+\'15\',border:\'1px solid \'+(CAT_COL[t]||C.text2)+\'25\',padding:\'2px 7px\',borderRadius:20,fontFamily:"\'Fira Code\',monospace",whiteSpace:\'nowrap\'}}>#{t}</span>);\nconst Bar=({s,sm})=>{const col=s>=80?C.green:s>=55?C.amber:C.red;return(<div style={{display:\'flex\',alignItems:\'center\',gap:5}}><div style={{flex:1,height:sm?2:3,background:\'#ffffff08\',borderRadius:4,overflow:\'hidden\'}}><div style={{width:s+\'%\',height:\'100%\',background:col,borderRadius:4,transition:\'width 1s ease\'}}/></div><span style={{fontSize:sm?\'0.54rem\':\'0.6rem\',color:col,fontFamily:"\'Fira Code\',monospace",fontWeight:600,minWidth:24}}>{s}%</span></div>);};\nconst Ava=({alias,level,size})=>{size=size||36;return(<div style={{width:size,height:size,borderRadius:\'50%\',background:\'linear-gradient(135deg,\'+(LVL_COL[level]||C.accent)+\'20,\'+(LVL_COL[level]||C.accent)+\'40)\',border:\'1.5px solid \'+(LVL_COL[level]||C.accent)+\'35\',display:\'flex\',alignItems:\'center\',justifyContent:\'center\',fontSize:size*.38+\'px\',fontWeight:700,color:LVL_COL[level]||C.accent,flexShrink:0}}>{alias?alias[0].toUpperCase():\'?\'}</div>);};\nconst Spin=()=>(<div style={{width:15,height:15,border:\'2px solid \'+C.border2,borderTop:\'2px solid \'+C.accent,borderRadius:\'50%\',animation:\'spin .6s linear infinite\'}}/>);\nconst HR=()=>(<div style={{height:1,background:C.border}}/>);\nconst ErrBox=({msg})=>msg?(<div style={{background:C.red+\'18\',border:\'1px solid \'+C.red+\'33\',borderRadius:C.r3,padding:\'10px 13px\',fontSize:\'0.8rem\',color:C.red,marginBottom:10}}>{msg}</div>):null;\n\n/* ══ AI CALL ══ */\nconst ai=async(prompt,max)=>{\n  try{\n    max=max||500;\n    const r=await fetch(\'https://api.anthropic.com/v1/messages\',{method:\'POST\',headers:{\'Content-Type\':\'application/json\'},body:JSON.stringify({model:\'claude-sonnet-4-20250514\',max_tokens:max,messages:[{role:\'user\',content:prompt}]})});\n    const d=await r.json();\n    const txt=d.content&&d.content.map(function(i){return i.text||\'\';}).join(\'\');\n    return JSON.parse(txt.replace(/```json|```/g,\'\').trim());\n  }catch(e){return null;}\n};\n\n/* ══ TOP BAR ══ */\nconst TopBar=({title,sub,onBack,right})=>(\n  <div style={{height:52,background:C.bg+\'ee\',borderBottom:\'1px solid \'+C.border,display:\'flex\',alignItems:\'center\',padding:\'0 16px\',gap:10,position:\'sticky\',top:0,zIndex:60,backdropFilter:\'blur(24px)\',WebkitBackdropFilter:\'blur(24px)\'}}>\n    {onBack&&<button onClick={onBack} style={{background:\'none\',border:\'none\',color:C.text2,cursor:\'pointer\',padding:\'4px 6px 4px 0\',display:\'flex\',alignItems:\'center\',flexShrink:0}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>}\n    <div style={{flex:1,minWidth:0}}>\n      <div style={{fontWeight:700,fontSize:\'0.98rem\',letterSpacing:\'-.02em\',overflow:\'hidden\',textOverflow:\'ellipsis\',whiteSpace:\'nowrap\',lineHeight:1.2}}>{title}</div>\n      {sub&&<div style={{fontSize:\'0.58rem\',color:C.text3,fontFamily:"\'Fira Code\',monospace",marginTop:1}}>{sub}</div>}\n    </div>\n    {right&&<div style={{display:\'flex\',gap:7,alignItems:\'center\',flexShrink:0}}>{right}</div>}\n  </div>\n);\n\n/* ══ BOTTOM BAR ══ */\nconst TABS=[\n  {id:\'feed\',label:\'Flux\',ic:function(a){return(<svg width="20" height="20" viewBox="0 0 24 24" fill={a?"currentColor":"none"} stroke="currentColor" strokeWidth={a?0:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>);}},\n  {id:\'wiki\',label:\'Wiki\',ic:function(a){return(<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>);}},\n  {id:\'msgs\',label:\'Messages\',ic:function(a){return(<svg width="20" height="20" viewBox="0 0 24 24" fill={a?"currentColor":"none"} stroke="currentColor" strokeWidth={a?0:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>);}},\n  {id:\'submit\',label:\'Déposer\',ic:function(a){return(<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.8} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>);}},\n  {id:\'profile\',label:\'Profil\',ic:function(a){return(<svg width="20" height="20" viewBox="0 0 24 24" fill={a?"currentColor":"none"} stroke="currentColor" strokeWidth={a?0:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>);}},\n];\nconst BotBar=({tab,setTab})=>(\n  <div style={{height:64,background:C.bg+\'ee\',borderTop:\'1px solid \'+C.border,display:\'flex\',alignItems:\'stretch\',position:\'fixed\',bottom:0,left:0,right:0,zIndex:60,backdropFilter:\'blur(24px)\',WebkitBackdropFilter:\'blur(24px)\',paddingBottom:\'env(safe-area-inset-bottom)\'}}>\n    {TABS.map(function(t){\n      const active=tab===t.id;\n      return(\n        <button key={t.id} onClick={function(){setTab(t.id);}} style={{flex:1,display:\'flex\',flexDirection:\'column\',alignItems:\'center\',justifyContent:\'center\',gap:3,background:\'none\',border:\'none\',cursor:\'pointer\',color:active?C.accent:C.text3,transition:\'color .18s\',position:\'relative\',padding:\'6px 0\'}}>\n          <div style={{transition:\'transform .18s\',transform:active?\'translateY(-1px)\':\'none\'}}>{t.ic(active)}</div>\n          <span style={{fontSize:\'0.54rem\',fontWeight:active?700:400}}>{t.label}</span>\n          {active&&<div style={{position:\'absolute\',bottom:0,width:18,height:2,background:C.accent,borderRadius:\'2px 2px 0 0\'}}/>}\n        </button>\n      );\n    })}\n  </div>\n);\n\n/* ══ AUTH ══ */\nfunction Auth({onAuth}){\n  const[mode,setMode]=useState(\'login\');\n  const[email,setEmail]=useState(\'\');\n  const[password,setPassword]=useState(\'\');\n  const[alias,setAlias]=useState(\'\');\n  const[refCode,setRefCode]=useState(\'\');\n  const[loading,setLoading]=useState(false);\n  const[err,setErr]=useState(\'\');\n  const[typed,setTyped]=useState(\'\');\n  const full="La vérité que l\'histoire a confirmée.";\n  useEffect(function(){\n    var i=0;\n    var t=setInterval(function(){\n      if(i<full.length){setTyped(full.slice(0,++i));}\n      else clearInterval(t);\n    },55);\n    return function(){clearInterval(t);};\n  },[]);\n\n  const submit=async function(){\n    setErr(\'\');setLoading(true);\n    try{\n      if(mode===\'register\'){\n        if(!alias||!email||!password||!refCode){setErr(\'Tous les champs sont requis.\');setLoading(false);return;}\n        // Vérifier code parrain\n        const refs=await db.get(\'users\',\'referral_code=eq.\'+encodeURIComponent(refCode),\'id,alias\');\n        if(!refs||refs.error||!Array.isArray(refs)||refs.length===0){\n          setErr(\'Code parrain invalide. Vérifiez le code et réessayez.\');setLoading(false);return;\n        }\n        const referrer=refs[0];\n        // Créer compte Auth\n        const res=await db.signup(email,password,alias);\n        if(res.error){setErr(res.error.message||\'Erreur lors de l\\\'inscription.\');setLoading(false);return;}\n        if(!res.access_token&&!res.user){setErr(\'Erreur inscription. Vérifiez votre email.\');setLoading(false);return;}\n        window.__token=res.access_token;\n        localStorage.setItem(\'mojo_token\',res.access_token);\n        const uid=res.user.id;\n        const code=\'MOJO-\'+alias.toUpperCase().replace(/[^A-Z0-9]/g,\'\').slice(0,5)+\'-\'+Math.random().toString(36).substring(2,6).toUpperCase();\n        // Insérer profil\n        await db.post(\'users\',{id:uid,email:email,alias:alias,level:\'Nouveau\',mojocoin_balance:0,referral_code:code,referred_by:referrer.id,subscription_active:false,months_active:0,verified:false});\n        // Parrainage\n        await db.post(\'referrals\',{referrer_id:referrer.id,referred_id:uid});\n        const u={id:uid,email:email,alias:alias,level:\'Nouveau\',mojocoin_balance:0,referral_code:code,subscription_active:false,months_active:0};\n        localStorage.setItem(\'mojo_user\',JSON.stringify(u));\n        onAuth(u);\n      } else {\n        const res=await db.login(email,password);\n        if(res.error){setErr(\'Email ou mot de passe incorrect.\');setLoading(false);return;}\n        window.__token=res.access_token;\n        localStorage.setItem(\'mojo_token\',res.access_token);\n        const users=await db.get(\'users\',\'id=eq.\'+res.user.id,\'*\');\n        if(!users||!Array.isArray(users)||users.length===0){setErr(\'Profil introuvable.\');setLoading(false);return;}\n        const u=users[0];\n        localStorage.setItem(\'mojo_user\',JSON.stringify(u));\n        onAuth(u);\n      }\n    }catch(e){setErr(\'Erreur réseau. Vérifiez votre connexion et réessayez.\');}\n    setLoading(false);\n  };\n\n  const inp={width:\'100%\',background:C.surf2,border:\'1.5px solid \'+C.border2,borderRadius:C.r2,padding:\'13px 15px\',fontSize:\'0.88rem\',outline:\'none\',color:C.text,transition:\'border-color .2s\',marginBottom:12,display:\'block\'};\n\n  return(\n    <div style={{minHeight:\'100vh\',background:C.bg,display:\'flex\',flexDirection:\'column\',padding:\'0 20px\'}}>\n      <div style={{flex:1,display:\'flex\',flexDirection:\'column\',paddingTop:56,paddingBottom:32}}>\n        <div className="fu" style={{marginBottom:28}}>\n          <div style={{display:\'inline-flex\',alignItems:\'center\',gap:6,background:C.accent+\'12\',border:\'1px solid \'+C.accent+\'28\',borderRadius:20,padding:\'4px 12px 4px 8px\',marginBottom:24}}>\n            <div style={{width:6,height:6,borderRadius:\'50%\',background:C.accent,animation:\'pulse 2s infinite\'}}/>\n
