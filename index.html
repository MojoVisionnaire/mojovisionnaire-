/* ══════ APP ROOT ══════ */
function App(){
const[screen,setScreen]=useState(‘landing’);
const[tab,setTab]=useState(‘feed’);
const[wikiTarget,setWikiTarget]=useState(null);
const[notifs,setNotifs]=useState(INIT_NOTIFS);

const unreadMsgs=INIT_CONVS.reduce((s,c)=>s+c.unread,0);
const unreadNotifs=notifs.filter(n=>!n.read).length;

const goToWiki=(art)=>{setWikiTarget(art);setTab(‘wiki’);};
const goToFeed=()=>setTab(‘feed’);

if(screen===‘landing’)return <Landing onEnter={()=>setScreen(‘app’)}/>;

const screens={
feed:<Feed onGoToWiki={goToWiki}/>,
wiki:<Wiki initialArticle={wikiTarget} onClearInitial={()=>setWikiTarget(null)} onGoToFeedPost={goToFeed}/>,
timeline:<Timeline onGoToWiki={goToWiki}/>,
msgs:<Messages/>,
notifs:<Notifs onGoToWiki={(art)=>{goToWiki(art);}} notifs={notifs} setNotifs={setNotifs}/>,
mojocoin:<MojoCoin/>,
};

return(
<div style={{display:‘flex’,flexDirection:‘column’,minHeight:‘100vh’,background:C.bg}}>
<div style={{flex:1,display:‘flex’,flexDirection:‘column’,paddingBottom:64}}>
{screens[tab]||<Feed onGoToWiki={goToWiki}/>}
</div>
<BotBar tab={tab} setTab={setTab} unreadMsgs={unreadMsgs} unreadNotifs={unreadNotifs}/>
</div>
);
}

ReactDOM.render(<App/>,document.getElementById(‘root’));
</script>
