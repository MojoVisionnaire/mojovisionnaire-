<!DOCTYPE html>

<html lang="fr" style="color-scheme:dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="color-scheme" content="dark"/>
<title>mojoVisionnaire</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#07080e;color:#dde0ec;font-family:"Outfit",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{min-height:100vh}
input,textarea,select,button{font-family:"Outfit",sans-serif;-webkit-appearance:none;color-scheme:dark;color:#dde0ec}
::placeholder{color:#2e3048}
::-webkit-scrollbar{display:none}
/* Splash */
#splash{position:fixed;inset:0;background:#07080e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .4s}
.spl{font-family:"DM Serif Display",serif;font-size:2.6rem;color:#dde0ec}.spl span{color:#6e72ff}
.spb{width:140px;height:3px;background:#1a1a2e;border-radius:3px;overflow:hidden}
.spf{height:100%;background:linear-gradient(90deg,#6e72ff,#00d2ff);border-radius:3px;animation:ld 1.8s ease forwards}
.sps{font-size:.6rem;font-family:"Fira Code",monospace;color:#383a52;letter-spacing:.1em}
@keyframes ld{from{width:0}to{width:100%}}
/* Screens */
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:64px}
.screen.active{display:flex}
/* TopBar */
.topbar{height:52px;background:#07080eee;border-bottom:1px solid #ffffff0a;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:60;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);flex-shrink:0}
/* BotBar */
.botbar{height:64px;background:#07080eee;border-top:1px solid #ffffff0a;display:flex;align-items:stretch;position:fixed;bottom:0;left:0;right:0;z-index:60;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:#383a52;position:relative;padding:6px 0;font-family:"Outfit",sans-serif;transition:color .18s}
.tab.on{color:#6e72ff}
.tab.on::after{content:"";position:absolute;bottom:0;width:18px;height:2px;background:#6e72ff;border-radius:2px 2px 0 0}
.tab svg{transition:transform .18s}
.tab.on svg{transform:translateY(-1px)}
.tab span{font-size:.54rem}
.tab.on span{font-weight:700}
/* Scrolls */
.feed-scroll,.wiki-scroll,.msg-scroll,.profile-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* Forms */
.inp{width:100%;background:#131420;border:1.5px solid #ffffff14;border-radius:10px;padding:13px 15px;font-size:.88rem;outline:none;color:#dde0ec;display:block;transition:border-color .2s}
.inp:focus{border-color:#6e72ff}
.lbl{font-size:.58rem;color:#383a52;font-family:"Fira Code",monospace;letter-spacing:.1em;display:block;margin-bottom:6px}
.err{background:#ff4d6d18;border:1px solid #ff4d6d33;border-radius:7px;padding:10px 13px;font-size:.78rem;color:#ff4d6d;margin-bottom:10px;word-break:break-word;line-height:1.5}
/* Buttons */
.btn{width:100%;background:#6e72ff;color:#fff;border:none;padding:14px;border-radius:14px;font-weight:700;font-size:.92rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;font-family:"Outfit",sans-serif}
.btn:active{opacity:.8}
.btn:disabled{background:#131420;color:#383a52;cursor:default;opacity:1}
.btn.ghost{background:none;border:1px solid #ffffff14;color:#7a7d9a}
.btn.amber{background:#ffb547;color:#000}
.paste-btn{background:#6e72ff18;border:1px solid #6e72ff30;color:#6e72ff;padding:0 14px;border-radius:10px;cursor:pointer;font-size:.7rem;font-weight:600;white-space:nowrap;min-height:48px;font-family:"Outfit",sans-serif}
.copy-btn{background:#131420;border:1px solid #ffffff14;color:#7a7d9a;padding:5px 11px;border-radius:7px;cursor:pointer;font-size:.7rem;font-weight:600;transition:all .18s;white-space:nowrap;font-family:"Outfit",sans-serif}
.copy-btn.ok{background:#3ddc84;color:#000}
.back-btn{background:none;border:none;color:#7a7d9a;cursor:pointer;padding:4px 6px 4px 0;display:flex;align-items:center;flex-shrink:0}
/* List items */
.post,.wiki-item{cursor:pointer;padding:12px 16px}
.post:active,.wiki-item:active{background:#0d0e18}
/* Compose */
.compose{padding:12px 16px;background:#0d0e18;border-bottom:1px solid #ffffff0a;animation:fu .3s ease}
/* Misc */
.hr{height:1px;background:#ffffff0a}
.spin{width:15px;height:15px;border:2px solid #ffffff14;border-top:2px solid #6e72ff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;display:inline-block}
.pill{font-size:.56rem;font-family:"Fira Code",monospace;padding:2px 7px;border-radius:20px;white-space:nowrap}
.tag{font-size:.56rem;padding:2px 7px;border-radius:20px;font-family:"Fira Code",monospace;white-space:nowrap}
.fu{animation:fu .28s ease both}
.fi{animation:fi .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="splash">
  <div class="spl">mojo<span>Visionnaire</span></div>
  <div class="spb"><div class="spf"></div></div>
  <div class="sps">Chargement...</div>
</div>
<div id="app"></div>
<script>

“use strict”;

// ═══════════════════════════════════════════════
// SÉCURITÉ : Clés obfusquées + Rate Limiting
// ═══════════════════════════════════════════════
var _c = function(b){ try{ return atob(b); }catch(e){ return “”; } };
var _U = _c(“aHR0cHM6Ly9hbHlkbXlqbmJkeXJkaW9pcGtlay5zdXBhYmFzZS5jbw==”);
var _K = _c(“ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW1Gc2VXUnRlV3B1WW1SNWNtUnBiMmx3YTJWcklpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnpneE16Z3pOamtzSW1WNGNDSTZNakE1TXpjeE5ETTJPWDAubDdkbkpOVVRReGROSVhsUUtFRGJQY3gtd08zTVhFeFlyYkFiQ3VSZGp0WQ==”);

// Rate Limiter — max N appels par fenêtre de temps
var RL = {
_buckets: {},
check: function(key, max, windowMs) {
var now = Date.now();
if (!this._buckets[key]) this._buckets[key] = [];
// Nettoyer les anciens appels
this._buckets[key] = this._buckets[key].filter(function(t){ return now - t < windowMs; });
if (this._buckets[key].length >= max) return false;
this._buckets[key].push(now);
return true;
}
};

// Sanitize inputs
var san = {
text: function(s, maxLen) {
if (typeof s !== “string”) return “”;
return s.replace(/<[^>]*>/g, “”).replace(/[<>”’&]/g, “”).trim().slice(0, maxLen || 500);
},
email: function(s) {
s = (s||””).toLowerCase().trim().slice(0, 254);
return /^[^\s@]+@[^\s@]+.[^\s@]+$/.test(s) ? s : “”;
},
code: function(s) {
return (s||””).toUpperCase().replace(/[^A-Z0-9-]/g, “”).trim().slice(0, 20);
},
alias: function(s) {
return (s||””).replace(/[^a-zA-Z0-9_-. ]/g, “”).trim().slice(0, 30);
},
password: function(s) {
return (s||””).slice(0, 128);
}
};

// Token
function tok(){ return window._mjtok || _K; }

// ═══════════════════════════════════════════════
// API CLIENT SÉCURISÉ
// ═══════════════════════════════════════════════
var api = {
_req: function(method, path, body) {
var opts = {
method: method,
headers: {
apikey: _K,
Authorization: “Bearer “ + tok(),
“Content-Type”: “application/json”,
Prefer: “return=representation”
}
};
if (body) opts.body = JSON.stringify(body);
return fetch(_U + path, opts)
.then(function(r) {
return r.text().then(function(t) {
var d; try { d = JSON.parse(t); } catch(e) { d = t; }
if (!r.ok) return { __err: true, status: r.status, msg: d && d.message ? d.message : String(d).slice(0, 200) };
return d;
});
})
.catch(function(e) { return { __err: true, msg: e.message }; });
},

findRef: function(code) {
// Rate limit: 5 tentatives / minute
if (!RL.check(“findRef”, 5, 60000)) return Promise.resolve({ __err: true, msg: “Trop de tentatives. Attendez 1 minute.” });
var c = san.code(code);
if (!c) return Promise.resolve({ __err: true, msg: “Code invalide.” });
return this._req(“GET”, “/rest/v1/users?select=id,alias,referral_code&referral_code=eq.” + encodeURIComponent(c));
},

getUser: function(id) {
if (!id) return Promise.resolve({ __err: true, msg: “ID manquant.” });
return this._req(“GET”, “/rest/v1/users?select=*&id=eq.” + encodeURIComponent(id));
},

addUser: function(d) {
return this._req(“POST”, “/rest/v1/users”, d);
},

addRef: function(d) {
return this._req(“POST”, “/rest/v1/referrals”, d);
},

signup: function(email, pw, alias) {
// Rate limit: 3 inscriptions / 10 minutes
if (!RL.check(“signup”, 3, 600000)) return Promise.resolve({ error: { message: “Trop de tentatives d’inscription. Réessayez dans 10 minutes.” } });
return fetch(_U + “/auth/v1/signup”, {
method: “POST”,
headers: { apikey: _K, “Content-Type”: “application/json” },
body: JSON.stringify({ email: email, password: pw, data: { alias: alias } })
}).then(function(r){ return r.json(); }).catch(function(e){ return { error: { message: e.message } }; });
},

login: function(email, pw) {
// Rate limit: 5 tentatives / 5 minutes
if (!RL.check(“login_” + email, 5, 300000)) return Promise.resolve({ error: { message: “Trop de tentatives. Attendez 5 minutes.” } });
return fetch(_U + “/auth/v1/token?grant_type=password”, {
method: “POST”,
headers: { apikey: _K, “Content-Type”: “application/json” },
body: JSON.stringify({ email: email, password: pw })
}).then(function(r){ return r.json(); }).catch(function(e){ return { error: { message: e.message } }; });
},

logout: function() {
if (window._mjtok) {
try { fetch(_U + “/auth/v1/logout”, { method: “POST”, headers: { apikey: _K, Authorization: “Bearer “ + window._mjtok } }); } catch(e) {}
}
window._mjtok = null;
localStorage.removeItem(“mj_tok”);
localStorage.removeItem(“mj_usr”);
},

posts: function() {
if (!RL.check(“posts”, 20, 60000)) return Promise.resolve([]);
return this._req(“GET”, “/rest/v1/posts?select=id,content,likes_count,comments_count,created_at,author_id,users(alias,level)&order=created_at.desc&limit=30”);
},

addPost: function(d) {
if (!RL.check(“addPost_” + (d.author_id||””), 5, 60000)) return Promise.resolve({ __err: true, msg: “Limite de publications atteinte (5/min).” });
return this._req(“POST”, “/rest/v1/posts”, d);
},

like: function(pid, uid) {
if (!RL.check(“like_” + uid, 30, 60000)) return Promise.resolve({});
return this._req(“POST”, “/rest/v1/likes”, { user_id: uid, post_id: pid });
},

wiki: function() {
return this._req(“GET”, “/rest/v1/wiki_articles?select=*&status=eq.verified&order=created_at.desc”);
},

addWiki: function(d) {
if (!RL.check(“addWiki_” + (d.submitted_by||””), 3, 3600000)) return Promise.resolve({ __err: true, msg: “Maximum 3 soumissions par heure.” });
return this._req(“POST”, “/rest/v1/wiki_articles”, d);
},

txs: function(uid) {
return this._req(“GET”, “/rest/v1/transactions?select=*&user_id=eq.” + encodeURIComponent(uid) + “&order=created_at.desc&limit=15”);
}
};

// ═══════════════════════════════════════════════
// WIKI EXEMPLES
// ═══════════════════════════════════════════════
var WX = [
{ id:“mkUltra”, title:“Operation MKUltra”, cat:“Gouvernement”, mjc:150, votes:342, cred:98,
summary:“Programme secret CIA de contrôle mental via drogues et torture. Déclassifié en 1977.”,
tags:[“CIA”,“Contrôle Mental”],
content:“En 1953, la CIA lance MKUltra, un programme top secret utilisant le LSD, la privation de sommeil et la torture psychologique sur des sujets non consentants. En 1977, des documents déclassifiés révèlent l’ampleur du programme suite aux travaux du Comité Church.” },
{ id:“prism”, title:“Programme PRISM — NSA”, cat:“Surveillance”, mjc:220, votes:891, cred:99,
summary:“La NSA espionnait massivement via les géants du web. Révélé par Snowden en 2013.”,
tags:[“NSA”,“Big Tech”],
content:“En juin 2013, Edward Snowden révèle que la NSA accédait directement aux serveurs de Google, Apple et Facebook via PRISM. Des millions de données personnelles collectées sans mandat judiciaire.” },
{ id:“northwoods”, title:“Opération Northwoods”, cat:“Faux Drapeau”, mjc:180, votes:567, cred:97,
summary:“Plan militaire US pour simuler des attentats contre ses propres citoyens.”,
tags:[“Militaire”,“Cuba”],
content:“En 1962, les chefs d’état-major proposent à Kennedy de simuler des attaques terroristes pour justifier une invasion de Cuba. Kennedy refuse et limoge le général Lemnitzer. Déclassifié en 1997.” },
{ id:“cointelpro”, title:“COINTELPRO — FBI”, cat:“Gouvernement”, mjc:195, votes:712, cred:96,
summary:“Programme secret FBI pour surveiller et détruire les mouvements politiques américains.”,
tags:[“FBI”,“Surveillance”],
content:“De 1956 à 1971, le FBI mène COINTELPRO ciblant les Black Panthers, MLK, NAACP. Méthodes : infiltration, désinformation, chantage. Révélé en 1971 après le cambriolage du bureau FBI de Media.” }
];

// ═══════════════════════════════════════════════
// DESIGN
// ═══════════════════════════════════════════════
var CAT = { Gouvernement:”#6e72ff”, Surveillance:”#00d2ff”, Finance:”#ffb547”, “Faux Drapeau”:”#ff4d6d”, Médical:”#c084fc”, Militaire:”#fb923c”, Histoire:”#3ddc84”, Médias:”#f472b6” };
var LVC = { Oracle:”#ffb547”, Sentinel:”#ff4d6d”, Archiviste:”#3ddc84”, Éveillé:”#00d2ff”, Nouveau:”#383a52” };
var LVB = { Oracle:”#ffb54718”, Sentinel:”#ff4d6d18”, Archiviste:”#3ddc8418”, Éveillé:”#00d2ff18”, Nouveau:”#38385218” };

// ═══════════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════════
function mk(tag, props, children) {
var e = document.createElement(tag);
if (props) {
Object.keys(props).forEach(function(k) {
if (k === “style” && typeof props[k] === “object”) { Object.assign(e.style, props[k]); }
else if (k.startsWith(“on”)) { e.addEventListener(k.slice(2).toLowerCase(), props[k]); }
else if (k === “cls”) { e.className = props[k]; }
else { e.setAttribute(k, props[k]); }
});
}
if (children) {
(Array.isArray(children) ? children : [children]).forEach(function(c) {
if (c == null || c === false) return;
if (typeof c === “string” || typeof c === “number”) e.appendChild(document.createTextNode(String(c)));
else if (c instanceof Node) e.appendChild(c);
});
}
return e;
}
function tx(s) { return document.createTextNode(String(s || “”)); }

// UI Components
function Coin(v, sm) {
var e = mk(“span”, {style:{display:“inline-flex”,alignItems:“center”,gap:“3px”,color:”#ffb547”,fontWeight:600,fontSize:sm?“0.68rem”:“0.78rem”,fontFamily:“Fira Code,monospace”}});
var m = mk(“span”, {style:{width:sm?“12px”:“14px”,height:sm?“12px”:“14px”,borderRadius:“50%”,background:“linear-gradient(135deg,#ffb547,#ff7c00)”,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:“0.4rem”,color:”#000”,fontWeight:900,flexShrink:0}}, “M”);
e.appendChild(m); e.appendChild(tx(”+” + v)); return e;
}
function Pill(level) {
return mk(“span”, {style:{fontSize:“0.56rem”,fontFamily:“Fira Code,monospace”,color:LVC[level]||”#383a52”,background:LVB[level]||”#38385218”,padding:“2px 7px”,borderRadius:“20px”,whiteSpace:“nowrap”}}, level);
}
function CTag(t) {
var col = CAT[t] || “#7a7d9a”;
return mk(“span”, {style:{fontSize:“0.56rem”,color:col,background:col+“15”,border:“1px solid “+col+“25”,padding:“2px 7px”,borderRadius:“20px”,fontFamily:“Fira Code,monospace”,whiteSpace:“nowrap”}}, “#” + t);
}
function Bar(s, sm) {
var col = s>=80 ? “#3ddc84” : s>=55 ? “#ffb547” : “#ff4d6d”;
var wrap = mk(“div”, {style:{display:“flex”,alignItems:“center”,gap:“5px”}});
var track = mk(“div”, {style:{flex:1,height:sm?“2px”:“3px”,background:”#ffffff08”,borderRadius:“4px”,overflow:“hidden”}});
var fill = mk(“div”, {style:{width:s+”%”,height:“100%”,background:col,borderRadius:“4px”,transition:“width 1s ease”}});
var label = mk(“span”, {style:{fontSize:sm?“0.54rem”:“0.6rem”,color:col,fontFamily:“Fira Code,monospace”,fontWeight:600,minWidth:“24px”}}, s + “%”);
track.appendChild(fill); wrap.appendChild(track); wrap.appendChild(label); return wrap;
}
function Ava(alias, level, size) {
size = size || 36;
var col = LVC[level] || “#6e72ff”;
return mk(“div”, {style:{width:size+“px”,height:size+“px”,borderRadius:“50%”,background:“linear-gradient(135deg,”+col+“20,”+col+“40)”,border:“1.5px solid “+col+“35”,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:(size*.38)+“px”,fontWeight:700,color:col,flexShrink:0}},
(alias ? alias[0] : “?”).toUpperCase());
}
function Spin() { return mk(“div”, {cls:“spin”}); }
function HR() { return mk(“div”, {cls:“hr”}); }
function ErrBox(msg) {
if (!msg) return null;
return mk(“div”, {cls:“err”}, msg);
}
function TopBar(title, sub, onBack, right) {
var d = mk(“div”, {cls:“topbar”});
if (onBack) {
var btn = mk(“button”, {cls:“back-btn”, onClick:onBack});
btn.innerHTML = ‘<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>’;
d.appendChild(btn);
}
var info = mk(“div”, {style:{flex:1,minWidth:0}});
var h = mk(“div”, {style:{fontWeight:700,fontSize:“0.98rem”,letterSpacing:”-.02em”,overflow:“hidden”,textOverflow:“ellipsis”,whiteSpace:“nowrap”,lineHeight:1.2}}, title);
info.appendChild(h);
if (sub) info.appendChild(mk(“div”, {style:{fontSize:“0.58rem”,color:”#383a52”,fontFamily:“Fira Code,monospace”,marginTop:“1px”}}, sub));
d.appendChild(info);
if (right) d.appendChild(right);
return d;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var S = { user:null, tab:“feed”, posts:[], wikiExtra:[], liked:{}, txs:[], wikiSel:null, compose:false };

// ═══════════════════════════════════════════════
// BOTTOM BAR
// ═══════════════════════════════════════════════
var TAB_ICONS = {
feed: ‘<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>’,
wiki: ‘<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>’,
msgs: ‘<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>’,
submit: ‘<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>’,
profile: ‘<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>’
};
var TAB_LABELS = { feed:“Flux”, wiki:“Wiki”, msgs:“Messages”, submit:“Déposer”, profile:“Profil” };

function makeBotbar() {
var bar = mk(“div”, {cls:“botbar”});
Object.keys(TAB_ICONS).forEach(function(id) {
var btn = mk(“button”, {cls:“tab” + (S.tab===id?” on”:””), id:“tab-”+id, onClick:function(){ switchTab(id); }});
btn.innerHTML = ‘<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">’ + TAB_ICONS[id] + ‘</svg><span>’ + TAB_LABELS[id] + ‘</span>’;
bar.appendChild(btn);
});
return bar;
}

function switchTab(id) {
S.tab = id;
document.querySelectorAll(”.tab”).forEach(function(b) {
b.className = “tab” + (b.id === “tab-”+id ? “ on” : “”);
});
document.querySelectorAll(”.screen”).forEach(function(s) {
s.classList.toggle(“active”, s.id === “screen-”+id);
});
if (id === “feed”) renderFeed();
if (id === “wiki”) renderWiki();
if (id === “msgs”) renderMsgs();
if (id === “submit”) renderSubmit();
if (id === “profile”) { loadTxs(); renderProfile(); }
}

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
function renderAuth() {
var root = mk(“div”, {style:{minHeight:“100vh”,background:”#07080e”,display:“flex”,flexDirection:“column”,padding:“0 20px”}});

scroll.appendChild(submitBtn);
scroll.appendChild(mk(“div”, {style:{height:“20px”}}));
}
draw();
scr.appendChild(scroll);
}

// ═══════════════════════════════════════════════
// PROFILE
// ═══════════════════════════════════════════════
function loadTxs() {
if (!S.user) return;
api.txs(S.user.id).then(function(d){ if(Array.isArray(d)){ S.txs=d; renderProfile(); } });
}

function renderProfile() {
var scr = document.getElementById(“screen-profile”); if (!scr) return;
scr.innerHTML = “”;
var u = S.user;
var logoutBtn = mk(“button”, {style:{background:”#ff4d6d15”,border:“1px solid #ff4d6d30”,color:”#ff4d6d”,padding:“5px 11px”,borderRadius:“20px”,cursor:“pointer”,fontSize:“0.7rem”,fontWeight:600}, onClick:function(){ api.logout(); location.reload(); }}, “Déconnexion”);
scr.appendChild(TopBar(“Profil”, null, null, logoutBtn));

var scroll = mk(“div”, {cls:“profile-scroll”});
// Header user
var ucard = mk(“div”, {style:{padding:“20px 16px 16px”,background:“linear-gradient(180deg,#6e72ff06,transparent)”}});
var urow = mk(“div”, {style:{display:“flex”,gap:“14px”,alignItems:“center”,marginBottom:“16px”}});
urow.appendChild(Ava(u.alias, u.level||“Nouveau”, 56));
var uinfo = mk(“div”, {style:{flex:1}});
uinfo.appendChild(mk(“div”, {style:{fontWeight:700,fontSize:“1.1rem”,marginBottom:“5px”}}, u.alias));
uinfo.appendChild(Pill(u.level||“Nouveau”));
var bal = mk(“div”, {style:{textAlign:“right”}});
bal.appendChild(mk(“div”, {style:{fontFamily:“Fira Code,monospace”,fontSize:“1.3rem”,fontWeight:600,color:”#ffb547”}}, u.mojocoin_balance||0));
bal.appendChild(mk(“div”, {style:{fontSize:“0.55rem”,color:”#383a52”,fontFamily:“Fira Code,monospace”}}, “MJC”));
urow.appendChild(uinfo); urow.appendChild(bal);
ucard.appendChild(urow); scroll.appendChild(ucard); scroll.appendChild(HR());

// Abonnement
var sub = mk(“div”, {style:{padding:“14px 16px”}});
sub.appendChild(mk(“div”, {cls:“lbl”}, “ABONNEMENT”));
var subCard = mk(“div”, {style:{background:u.subscription_active?”#3ddc840a”:”#ff4d6d0a”,border:“1px solid “+(u.subscription_active?”#3ddc8422”:”#ff4d6d22”),borderRadius:“10px”,padding:“12px 14px”,display:“flex”,justifyContent:“space-between”,alignItems:“center”}});
var subInfo = mk(“div”);
subInfo.appendChild(mk(“div”, {style:{fontWeight:600,fontSize:“0.85rem”,marginBottom:“3px”}}, u.subscription_active?“✓ Actif”:“✗ Inactif”));
subInfo.appendChild(mk(“div”, {style:{fontSize:“0.7rem”,color:”#7a7d9a”}}, “10 € / mois · Paiement CB”));
subCard.appendChild(subInfo);
if (!u.subscription_active) subCard.appendChild(mk(“button”, {cls:“btn amber”, style:{width:“auto”,padding:“7px 13px”,borderRadius:“20px”,fontSize:“0.72rem”}}, “Activer”));
sub.appendChild(subCard); scroll.appendChild(sub); scroll.appendChild(HR());

// Code parrain
var refSec = mk(“div”, {style:{padding:“14px 16px”}});
refSec.appendChild(mk(“div”, {cls:“lbl”}, “CODE PARRAIN”));
var refCard = mk(“div”, {style:{background:”#0d0e18”,border:“1px solid #ffffff14”,borderRadius:“10px”,padding:“11px 13px”,display:“flex”,alignItems:“center”,gap:“9px”}});
refCard.appendChild(mk(“span”, {style:{fontFamily:“Fira Code,monospace”,fontSize:“0.88rem”,fontWeight:600,color:”#6e72ff”,flex:1}}, u.referral_code||”…”));
var copyBtn = mk(“button”, {cls:“copy-btn”, onClick:function(){
try{ navigator.clipboard.writeText(u.referral_code||””); }catch(e){ var t=document.createElement(“textarea”);t.value=u.referral_code||””;document.body.appendChild(t);t.select();document.execCommand(“copy”);document.body.removeChild(t); }
copyBtn.textContent=“✓ Copié”; copyBtn.className=“copy-btn ok”;
setTimeout(function(){ copyBtn.textContent=“Copier”; copyBtn.className=“copy-btn”; }, 1800);
}}, “Copier”);
refCard.appendChild(copyBtn);
refSec.appendChild(refCard);
refSec.appendChild(mk(“p”, {style:{fontSize:“0.66rem”,color:”#383a52”,marginTop:“7px”}}, “50 MJC par filleul parrainé”));
scroll.appendChild(refSec); scroll.appendChild(HR());

// Retrait
var balance = u.mojocoin_balance||0;
var months = u.months_active||0;
var retSec = mk(“div”, {style:{padding:“14px 16px”}});
retSec.appendChild(mk(“div”, {cls:“lbl”}, “RETRAIT EN EUROS”));
var retCard = mk(“div”, {style:{background:”#0d0e18”,border:“1px solid #ffffff14”,borderRadius:“10px”,padding:“12px 14px”}});
function progBar(val, max, col) {
var r = mk(“div”);
var row = mk(“div”, {style:{display:“flex”,justifyContent:“space-between”,marginBottom:“4px”}});
var lab = mk(“span”, {style:{fontSize:“0.75rem”}}, val===“balance”?“Solde minimum”:“Ancienneté”);
var valEl = mk(“span”, {style:{fontFamily:“Fira Code,monospace”,fontSize:“0.72rem”,fontWeight:700,color:val>=max?col:”#ff4d6d”}}, val+” / “+max+(val===“balance”?” MJC”:” mois”));
row.appendChild(lab); row.appendChild(valEl);
var track = mk(“div”, {style:{height:“4px”,background:”#ffffff14”,borderRadius:“4px”,overflow:“hidden”,marginBottom:“8px”}});
var fill = mk(“div”, {style:{height:“100%”,width:Math.min(100,(val/max)*100)+”%”,background:val>=max?col:”#ffb547”,borderRadius:“4px”,transition:“width 1s ease”}});
track.appendChild(fill); r.appendChild(row); r.appendChild(track); return r;
}
var b1 = mk(“div”);
var br1 = mk(“div”, {style:{display:“flex”,justifyContent:“space-between”,marginBottom:“4px”}});
br1.appendChild(mk(“span”,{style:{fontSize:“0.75rem”}},“Solde minimum”));
br1.appendChild(mk(“span”,{style:{fontFamily:“Fira Code,monospace”,fontSize:“0.72rem”,fontWeight:700,color:balance>=500?”#3ddc84”:”#ff4d6d”}},balance+” / 500 MJC”));
var bt1 = mk(“div”,{style:{height:“4px”,background:”#ffffff14”,borderRadius:“4px”,overflow:“hidden”,marginBottom:“8px”}});
bt1.appendChild(mk(“div”,{style:{height:“100%”,width:Math.min(100,(balance/500)*100)+”%”,background:balance>=500?”#3ddc84”:”#ffb547”,borderRadius:“4px”}}));
b1.appendChild(br1);b1.appendChild(bt1);retCard.appendChild(b1);

var b2 = mk(“div”);
var br2 = mk(“div”, {style:{display:“flex”,justifyContent:“space-between”,marginBottom:“4px”}});
br2.appendChild(mk(“span”,{style:{fontSize:“0.75rem”}},“Ancienneté”));
br2.appendChild(mk(“span”,{style:{fontFamily:“Fira Code,monospace”,fontSize:“0.72rem”,fontWeight:700,color:months>=5?”#3ddc84”:”#ff4d6d”}},months+” / 5 mois”));
var bt2 = mk(“div”,{style:{height:“4px”,background:”#ffffff14”,borderRadius:“4px”,overflow:“hidden”,marginBottom:“8px”}});
bt2.appendChild(mk(“div”,{style:{height:“100%”,width:Math.min(100,(months/5)*100)+”%”,background:months>=5?”#3ddc84”:”#ffb547”,borderRadius:“4px”}}));
b2.appendChild(br2);b2.appendChild(bt2);retCard.appendChild(b2);

retCard.appendChild(mk(“p”,{style:{fontSize:“0.68rem”,color:”#383a52”,marginTop:“8px”}},“1 MJC = 0.10 € · Virement bancaire sous 3-5 jours”));
retSec.appendChild(retCard); scroll.appendChild(retSec); scroll.appendChild(HR());

// Transactions
var txSec = mk(“div”, {style:{padding:“14px 16px”}});
txSec.appendChild(mk(“div”, {cls:“lbl”}, “TRANSACTIONS”));
if (!S.txs || S.txs.length===0) {
txSec.appendChild(mk(“p”, {style:{fontSize:“0.78rem”,color:”#7a7d9a”}}, “Aucune transaction pour l’instant.”));
} else {
S.txs.forEach(function(tx) {
var row = mk(“div”, {style:{display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:“9px 0”,borderBottom:“1px solid #ffffff0a”}});
var left = mk(“div”);
left.appendChild(mk(“div”, {style:{fontWeight:500,fontSize:“0.8rem”,marginBottom:“1px”}}, san.text(tx.label||“Transaction”, 100)));
left.appendChild(mk(“div”, {style:{color:”#383a52”,fontSize:“0.6rem”,fontFamily:“Fira Code,monospace”}}, new Date(tx.created_at).toLocaleDateString(“fr-FR”)));
row.appendChild(left);
row.appendChild(mk(“span”, {style:{color:tx.type===“earn”?”#3ddc84”:”#ff4d6d”,fontWeight:700,fontFamily:“Fira Code,monospace”,fontSize:“0.78rem”,marginLeft:“10px”}}, (tx.amount>0?”+”:””)+tx.amount+” MJC”));
txSec.appendChild(row);
});
}
scroll.appendChild(txSec);
scroll.appendChild(mk(“div”, {style:{height:“20px”}}));
scr.appendChild(scroll);
}

// ═══════════════════════════════════════════════
// DÉMARRAGE
// ═══════════════════════════════════════════════
function startApp(user) {
S.user = user;
var app = document.getElementById(“app”);
app.innerHTML = “”;
[“feed”,“wiki”,“msgs”,“submit”,“profile”].forEach(function(id) {
app.appendChild(mk(“div”, {cls:“screen”+(id===“feed”?” active”:””), id:“screen-”+id}));
});
app.appendChild(makeBotbar());
renderFeed(); renderWiki(); renderMsgs(); renderSubmit(); renderProfile();
loadPosts(); loadTxs();
}

(function() {
// Safety timeout - if app doesn’t load in 4s, force show auth
setTimeout(function() {
var splash = document.getElementById(“splash”);
var app = document.getElementById(“app”);
if (splash && splash.style.opacity !== “0” && app && app.children.length === 0) {
splash.style.opacity = “0”;
setTimeout(function(){ if(splash.parentNode) splash.parentNode.removeChild(splash); }, 400);
app.appendChild(renderAuth());
}
}, 4000);

try { var tok = localStorage.getItem(“mj_tok”);
var usr = localStorage.getItem(“mj_usr”);
var splash = document.getElementById(“splash”);
function hideSplash() {
if (splash) { splash.style.opacity=“0”; setTimeout(function(){ if(splash.parentNode) splash.parentNode.removeChild(splash); }, 400); }
}
if (tok && usr) {
try {
var u = JSON.parse(usr);
if (u && u.id) { window._mjtok = tok; hideSplash(); startApp(u); return; }
} catch(e) {}
}
hideSplash();
document.getElementById(“app”).appendChild(renderAuth());
} catch(e) { document.getElementById(“app”).innerHTML = ’<div style="padding:40px;color:#ff4d6d;font-family:monospace;font-size:0.8rem">Erreur: ’ + e.message + ‘<br/><br/>’ + e.stack + ‘</div>’; var s=document.getElementById(“splash”); if(s)s.style.display=“none”; }
})();

</script>
